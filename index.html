// Кэш библиотеки колод из тренажёра (word_decks + deck_folders, без study_ префикса)
let deckLibraryCache = null;

async function loadDeckLibrary() {
    if (deckLibraryCache) return deckLibraryCache;
    const [foldersRes, decksRes] = await Promise.all([
        sb.from('deck_folders')
            .select('id, title, parent_folder_id, cover_emoji, "order"')
            .is('deleted_at', null)
            .eq('is_school_library', true)
            .order('"order"', { ascending: true }),
        sb.from('word_decks')
            .select('id, title, level, cover_emoji, folder_id, word_count')
            .is('deleted_at', null)
            .eq('is_school_library', true)
            .order('title', { ascending: true })
    ]);
    if (foldersRes.error || decksRes.error) {
        console.error('Deck library load error', foldersRes.error || decksRes.error);
        deckLibraryCache = { folders: [], decks: [], folderPaths: {} };
        return deckLibraryCache;
    }
    const folders = foldersRes.data || [];
    const decks   = decksRes.data || [];
    // Строим путь от корня для каждой папки: "Super Minds / SM1"
    const byId = {};
    folders.forEach(f => byId[f.id] = f);
    const folderPaths = {};
    function pathFor(id) {
        if (!id) return '';
        if (folderPaths[id]) return folderPaths[id];
        const f = byId[id];
        if (!f) return '';
        const parent = f.parent_folder_id ? pathFor(f.parent_folder_id) : '';
        folderPaths[id] = parent ? `${parent} / ${f.title}` : f.title;
        return folderPaths[id];
    }
    folders.forEach(f => pathFor(f.id));
    deckLibraryCache = { folders, decks, folderPaths };
    return deckLibraryCache;
}

// Парсер URL для video-слайдов
function parseVideoUrl(url) {
    if (!url) return null;
    let m;
    m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (m) return { provider: 'youtube', id: m[1] };
    m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m) return { provider: 'gdrive', id: m[1] };
    m = url.match(/rutube\.ru\/video\/([a-zA-Z0-9]+)/);
    if (m) return { provider: 'rutube', id: m[1] };
    return null;
}

async function doLogin() {

window.addEventListener('hashchange', handleRoute);

function navigateTo(hash) {
    if (window.location.hash === hash) {
        handleRoute(); // forced re-render
    } else {
        window.location.hash = hash;
    }
}

function handleRoute() {
    if (!currentUser) return;
    let hash = (window.location.hash || '#/').slice(1) || '/';
    // Отделяем query-string внутри хеша (#/lesson/4/run?student=UUID — параметры после ?)
    const qIdx = hash.indexOf('?');
    if (qIdx >= 0) hash = hash.substring(0, qIdx);

    // Если уходим из run mode — гасим таймер и слушатель клавиш + закрываем модалки
    const inRun = hash.includes('/run');
    if (!inRun) {
        if (runState.timer && runState.timer.intervalId) {
            clearInterval(runState.timer.intervalId);
            runState.timer.intervalId = null;
            runState.timer.running = false;
        }
        detachRunKeyboard();
        document.querySelectorAll('.run-iframe-modal').forEach(m => m.remove());
    }

    const parts = hash.split('/').filter(Boolean);

    if (parts.length === 0) {
        return showLibrary();
    }
    if (parts[0] === 'course' && parts[1]) {
        return showCourse(parseInt(parts[1]));
    }
    if (parts[0] === 'lesson' && parts[1]) {
        const lessonId = parseInt(parts[1]);
        const mode = parts[2] || 'edit';
        if (mode === 'run')  return showRunMode(lessonId);
        if (mode === 'edit') return showEditor(lessonId);
    }
    // fallback
    showLibrary();
}

async function onCreateUnit(courseId) {

async function onCreateLesson(unitId) {

    // получаем текущее количество уроков в юните для lesson_number
    const { count } = await sb.from('study_lessons')
        .select('*', { count: 'exact', head: true })

        title: title.trim(),
        lesson_number: next,
        order: next,

    }).select().single();

function renderAddPicker() {
    let sections = '';
    for (const sk of SKILLS) {
        let rows = '';
        for (const t of sk.types) {
            const m = SLIDE_TYPE_META[t];
            if (!m) continue;
            rows += `

    }
    return `
        <div class="add-picker" id="addPicker">
            <div class="add-pick-title">Выбери формат по сфере</div>
            ${sections}
        </div>
    `;

function toggleAddPicker(e) {
    if (e) e.stopPropagation();
    // Если уже открыт — закрыть
    const existing = document.getElementById('addPicker');
    if (existing) {
        existing.remove();
        editorState.pickerOpen = false;
        return;
    }
    const btn = (e && e.currentTarget) || document.querySelector('.ribbon-add');
    if (!btn) return;

    editorState.pickerOpen = true;

    // Создаём popover отдельно и крепим к body
    const wrap = document.createElement('div');
    wrap.innerHTML = renderAddPicker();
    const picker = wrap.firstElementChild;

    const rect = btn.getBoundingClientRect();
    picker.style.position = 'fixed';
    picker.style.left = (rect.right + 8) + 'px';
    // Picker «растёт» вверх от кнопки: нижний край совпадает с нижним краем кнопки
    picker.style.bottom = (window.innerHeight - rect.bottom) + 'px';
    picker.style.top = 'auto';
    picker.style.right = 'auto';

    document.body.appendChild(picker);

    // Защита от выхода за правый край экрана
    const pickerRect = picker.getBoundingClientRect();
    if (pickerRect.right > window.innerWidth - 12) {
        // если не вмещается справа — рендерим слева от кнопки
        picker.style.left = Math.max(12, rect.left - pickerRect.width - 8) + 'px';
    }
    // и за верхний край
    if (pickerRect.top < 12) {
        picker.style.bottom = 'auto';
        picker.style.top = '12px';
    }

    setTimeout(() => {
        document.addEventListener('click', closeAddPickerOnOutsideClick, { once: true });
    }, 50);
}

function closeAddPickerOnOutsideClick(e) {
    if (e.target.closest && e.target.closest('#addPicker')) {
        // клик внутри popover — оставляем открытым, ждём следующего клика
        document.addEventListener('click', closeAddPickerOnOutsideClick, { once: true });
        return;
    }
    const existing = document.getElementById('addPicker');
    if (existing) existing.remove();
    editorState.pickerOpen = false;
}

/* ============ DRAG-TO-REORDER ленты ============ */

let _dragSlideId = null;

function attachRibbonDragHandlers() {
    const ribbon = $('editorRibbon');
    if (!ribbon) return;
    ribbon.querySelectorAll('.ribbon-slide').forEach(el => {
        el.addEventListener('dragstart', (e) => {
            _dragSlideId = parseInt(el.getAttribute('data-id'));
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            try { e.dataTransfer.setData('text/plain', String(_dragSlideId)); } catch(_) {}
        });
        el.addEventListener('dragend', () => {
            el.classList.remove('dragging');
            ribbon.querySelectorAll('.ribbon-slide').forEach(s => s.classList.remove('drag-over'));
            _dragSlideId = null;
        });
        el.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            el.classList.add('drag-over');
        });
        el.addEventListener('dragleave', () => {
            el.classList.remove('drag-over');
        });
        el.addEventListener('drop', (e) => {
            e.preventDefault();
            el.classList.remove('drag-over');
            const dropId = parseInt(el.getAttribute('data-id'));
            if (_dragSlideId && dropId && _dragSlideId !== dropId) {
                reorderSlides(_dragSlideId, dropId);
            }
        });
    });
}

async function reorderSlides(dragId, dropId) {
    await flushSave();
    const slides = editorState.slides;
    const fromIdx = slides.findIndex(s => s.id === dragId);
    const toIdx   = slides.findIndex(s => s.id === dropId);
    if (fromIdx < 0 || toIdx < 0) return;

    const [moved] = slides.splice(fromIdx, 1);
    slides.splice(toIdx, 0, moved);
    // Пересчитываем order
    slides.forEach((s, i) => s.order = i + 1);

    renderEditor();
    editorState.saveStatus = 'saving';
    updateSaveIndicator();

    // Сохраняем все order в БД
    let anyError = null;
    for (const s of slides) {
        const { error } = await sb.from('study_slides').update({ order: s.order }).eq('id', s.id);
        if (error) { anyError = error; break; }
    }
    if (anyError) {
        editorState.saveStatus = 'error';
        toast('Не сохранилось: ' + anyError.message, 'error');
    } else {
        editorState.saveStatus = 'saved';
        toast('Порядок сохранён', 'success');
    }
    updateSaveIndicator();
    setTimeout(() => {
        if (editorState.saveStatus === 'saved') {
            editorState.saveStatus = 'idle';
            updateSaveIndicator();
        }
    }, 1500);
}

async function selectSlide(id) {

async function onPickAddSlideType(type, skill) {
    await flushSave();
    const m = SLIDE_TYPE_META[type];
    const maxOrder = editorState.slides.reduce((mx, s) => Math.max(mx, s.order || 0), 0);
    let initialMeta = {};
    if (type === 'task') initialMeta = initTaskMeta('open');
    else if (type === 'poll') initialMeta = { items: [
        { id: newId(), text: '' },
        { id: newId(), text: '' },
        { id: newId(), text: '' }
    ] };
    else if (type === 'rate') initialMeta = { ask_lesson: true, ask_teacher: true, ask_mood: true };
    else if (type === 'checkin') initialMeta = {
        mood_prompt: 'How are you today?',
        date_prompt: "What day is it today?",
        weather_prompt: "What's the weather like?"
    };
    else if (type === 'outro') initialMeta = { finish_lesson: false };
    else if (type === 'canvas') initialMeta = { blocks: [], bg: null };
    else if (type === 'reading') initialMeta = { intro: '', text: '', questions: [] };
    if (skill) initialMeta.skill = skill;
    const { data, error } = await sb.from('study_slides').insert({
        lesson_id: editorState.lessonId,
        slide_type: type,
        order: maxOrder + 1,
        cover_emoji: m.defaultEmoji,
        title: '',
        body: '',
        meta: initialMeta
    }).select().single();
    if (error) { toast('Ошибка: ' + error.message, 'error'); return; }
    editorState.slides.push(data);
    editorState.selectedId = data.id;
    editorState.pickerOpen = false;
    const picker = document.getElementById('addPicker');
    if (picker) picker.remove();
    renderEditor();
}

/* ============ PREVIEW ============ */

function renderSlidePreview(slide) {
    if (!slide) {
        return `<div class="muted" style="text-align:center;">
            <div style="font-size:48px; margin-bottom:8px;">📭</div>
            <div>В уроке пока нет слайдов.<br>Нажми <strong>+</strong> в ленте слева.</div>
        </div>`;
    }
    const t = slide.slide_type;
    const m = SLIDE_TYPE_META[t] || SLIDE_TYPE_META.text;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;

    if (t === 'intro' || t === 'outro') {
        return `
            <div class="slide-card slide-hero">
                ${chip}
                <div class="hero-center">
                    <div class="hero-emoji">${esc(slide.cover_emoji || m.defaultEmoji)}</div>
                    <h2 class="hero-title">${esc(stripLeadingEmoji(slide.title) || (t === 'intro' ? 'Без названия' : 'Great job!'))}</h2>
                    ${slide.body ? `<p class="subtitle">${esc(slide.body)}</p>` : ''}
                </div>
            </div>
        `;
    }
    if (t === 'vocab') {
        return `
            <div class="slide-card">
                ${chip}
                <h2>${esc(stripLeadingEmoji(slide.title) || '—')}</h2>
                <div class="slide-emoji-block">${esc(slide.cover_emoji || m.defaultEmoji)}</div>
                ${slide.body ? `<p class="subtitle">${esc(slide.body)}</p>` : ''}
            </div>
        `;
    }
    if (t === 'text') {
        return `
            <div class="slide-card">
                ${chip}
                ${slide.title ? `<h2 style="font-size:22px; text-align:left;">${esc(stripLeadingEmoji(slide.title))}</h2>` : ''}
                ${slide.image_url ? `<img class="slide-run-img" src="${esc(slide.image_url)}">` : ''}
                <div class="markdown">${md(slide.body || '_(пусто)_')}</div>
            </div>
        `;
    }
    if (t === 'explanation') {
        return `
            <div class="slide-card">
                ${chip}
                <h2 style="font-size:22px; text-align:left;">${esc(slide.title || '—')}</h2>
                ${slide.image_url ? `<img class="slide-run-img" src="${esc(slide.image_url)}">` : ''}
                <div class="markdown">${md(slide.body || '_(пусто)_')}</div>
            </div>
        `;
    }
    if (t === 'task') {
        return renderTaskPreview(slide, chip);
    }
    if (t === 'poll') {
        return renderPollPreview(slide, chip);
    }
    if (t === 'checkin') {
        return renderCheckinPreview(slide, chip);
    }
    if (t === 'deck') {
        return renderDeckPreview(slide, chip);
    }
    if (t === 'video') {
        return renderVideoPreview(slide, chip);
    }
    if (t === 'rate') {
        return renderRatePreview(slide, chip);
    }
    if (t === 'canvas') {
        return renderCanvasPreview(slide, chip);
    }
    if (t === 'reading') {
        const rm = slide.meta || {};
        const qn = (rm.questions || []).length;
        return `
            <div class="slide-card">
                ${chip}
                <h2 style="font-size:22px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Чтение')}</h2>
                ${slide.image_url ? `<img class="slide-run-img" src="${esc(slide.image_url)}">` : ''}
                ${rm.intro ? `<div class="reading-intro"><div class="reading-tag">Before</div><div class="markdown">${md(rm.intro)}</div></div>` : ''}
                <div class="reading-text markdown">${md(rm.text || '_(текст для чтения)_')}</div>
                ${qn ? `<p class="muted" style="font-size:13px;">Вопросов после текста: ${qn}</p>` : ''}
            </div>
        `;
    }
    // прочие типы (пока сюда нечего попасть)
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || m.label)}</h2>
            <p class="muted" style="text-align:center; font-size:13px;">Превью для типа <code>${esc(t)}</code> — в следующих шагах.</p>
        </div>
    `;
}

/* ============ DECK ============ */

function onDeckModePick(mode) {
    const slide = currentSlide();
    if (!slide) return;
    if (!slide.meta) slide.meta = {};
    slide.meta.deck_mode = (slide.meta.deck_mode === mode) ? null : mode;
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}

function onDeckSearch(q) {
    const sel = document.getElementById('deckSelect');
    if (!sel) return;
    const term = (q || '').trim().toLowerCase();
    sel.querySelectorAll('optgroup').forEach(g => {
        let any = false;
        g.querySelectorAll('option').forEach(o => {
            const match = !term || o.textContent.toLowerCase().includes(term) || (g.label || '').toLowerCase().includes(term);
            o.hidden = !match;
            if (match) any = true;
        });
        g.hidden = !any;
    });
}

function renderDeckForm(slide) {
    const m = slide.meta || {};
    const selectedId = m.deck_id;
    const lib = deckLibraryCache || { folders: [], decks: [], folderPaths: {} };

    // Группируем колоды по пути папки
    const groups = {};
    for (const d of lib.decks) {
        const path = lib.folderPaths[d.folder_id] || 'Без папки';
        (groups[path] ||= []).push(d);
    }
    const sortedPaths = Object.keys(groups).sort();

    let optgroups = '';
    for (const path of sortedPaths) {
        optgroups += `<optgroup label="${esc(path)}">`;
        for (const d of groups[path]) {
            const extras = [d.level, d.word_count ? d.word_count + ' слов' : ''].filter(Boolean).join(' · ');
            const label = `${d.cover_emoji || '📚'} ${d.title}${extras ? ' · ' + extras : ''}`;
            optgroups += `<option value="${d.id}" ${d.id === selectedId ? 'selected' : ''}>${esc(label)}</option>`;
        }
        optgroups += `</optgroup>`;
    }

    let html = '';
    html += renderFormField('Заголовок (опц.)',
        `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Тренировка слов">`);
    html += renderFormField('Описание (опц.)',
        `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Закрепляем новые слова">`);

    if (!lib.decks.length) {
        html += `<div class="editor-warning">⚠️ Колоды не загружены или их нет в библиотеке школы.</div>`;
    } else {
        html += `
            <div class="form-field">
                <label>Колода <span class="hint">· из библиотеки тренажёра</span></label>
                <input class="form-input" id="deckSearch" placeholder="🔍 Поиск по названию…" oninput="onDeckSearch(this.value)" style="margin-bottom:8px;">
                <select class="form-input select" id="deckSelect" data-meta-field="deck_id" data-meta-int="1">
                    <option value="">— Выбери колоду —</option>
                    ${optgroups}
                </select>
            </div>
        `;
        if (selectedId) {
            html += `
                <div class="form-field">
                    <label>Игра <span class="hint">· сразу открыть конкретную</span></label>
                    <div class="deck-mode-grid">
                        ${TRAINER_MODES.map(g => `<button class="deck-mode-pill ${m.deck_mode === g.key ? 'sel' : ''}" onclick="onDeckModePick('${g.key}')">${g.emoji} ${g.name}</button>`).join('')}
                    </div>
                    <div class="hint">не выбрано — откроется экран выбора игры</div>
                </div>
            `;
        }
    }

    if (selectedId) {
        const selected = lib.decks.find(d => d.id === selectedId);
        if (selected) {
            const path = lib.folderPaths[selected.folder_id] || 'Без папки';
            html += `
                <div style="background:var(--cream-deep); padding:10px 12px; border-radius:8px; font-size:12px; margin-bottom:10px;">
                    <div style="font-size:14px;">${esc(selected.cover_emoji || '📚')} <strong>${esc(selected.title)}</strong></div>
                    <div style="color:var(--text-mute); margin-top:3px;">
                        ${esc(path)}${selected.level ? ' · ' + esc(selected.level) : ''}${selected.word_count ? ' · ' + selected.word_count + ' слов' : ''}
                    </div>
                </div>
            `;
        }
    }
    return html;
}

function renderDeckPreview(slide, chip) {
    const m = slide.meta || {};
    const deckId = m.deck_id;
    const lib = deckLibraryCache || { folders: [], decks: [], folderPaths: {} };
    const deck = deckId ? lib.decks.find(d => d.id === deckId) : null;

    return `
        <div class="slide-card">
            ${chip}
            ${slide.title ? `<h2 style="font-size:22px; text-align:left;">${esc(stripLeadingEmoji(slide.title))}</h2>` : ''}

                    <span style="font-size:42px;">${esc(deck.cover_emoji || '📚')}</span>
                    <p style="font-size:16px; margin:0; font-weight:600;">${esc(deck.title)}</p>

    const url = m.video_url || '';
    const parsed = parseVideoUrl(url);

    let html = '';

        `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Daily routine song">`);
    html += renderFormField('Описание (опц.)',
        `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Послушай и подпевай">`);

        'YouTube, Google Drive или Rutube');

        if (parsed) {
            const providerName = { youtube: 'YouTube', gdrive: 'Google Drive', rutube: 'Rutube' }[parsed.provider];

                <img src="${esc(thumb)}" style="width:100%; height:100%; object-fit:cover;" alt="YouTube preview">
                <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
                    <span style="width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.95); display:inline-flex; align-items:center; justify-content:center; color:#2C2C2A; font-size:26px;">▶</span>
                </div>
            </div>
        `;
    } else if (parsed) {
        videoBlock = `
            <div style="background:#2C2C2A; border-radius:14px; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; color:white;">
                <span style="width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.95); display:inline-flex; align-items:center; justify-content:center; color:#2C2C2A; font-size:26px;">▶</span>
                <span style="font-size:12px; opacity:0.8;">${esc(parsed.provider)}</span>
            </div>
        `;

            <div style="background:var(--cream-deep); border-radius:14px; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; color:var(--text-mute); flex-direction:column; gap:6px;">

            ${videoBlock}
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}

/* ============ TASK PREVIEW ============ */

function renderTaskPreview(slide, chip) {
    const subtype = getTaskSubtype(slide) || 'choice';
    const subMeta = TASK_SUBTYPE_META[subtype] || TASK_SUBTYPE_META.choice;
    const subChip = `<span class="slide-type-chip" style="background:var(--green-light); color:var(--green-dark);">✓ ${esc(subMeta.label)}</span>`;

    if (subtype === 'open')       return renderOpenPreview(slide, subChip);
    if (subtype === 'choice')     return renderChoicePreview(slide, subChip);
    if (subtype === 'matching')   return renderMatchingPreview(slide, subChip);
    if (subtype === 'fill_blank') return renderFillBlankPreview(slide, subChip);
    if (subtype === 'ordering')   return renderOrderingPreview(slide, subChip);
    return `<div class="slide-card">${chip}<p class="muted">Неизвестный подтип</p></div>`;
}

function renderOpenPreview(slide, chip) {
    const m = slide.meta || {};
    const helpers = m.helper_words || [];
    const layout = m.layout || 'bottom';
    let helperChips = '';
    helpers.forEach(w => {
        if (w.text) helperChips += `<span class="task-word-chip">${esc(w.text)}</span>`;
    });
    const titleHtml       = `<h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Вопрос')}</h2>`;
    const instructionHtml = slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : '';
    const chipsHtml       = (helpers.length && helperChips) ? `<div class="task-word-chips" style="margin-top:4px;">${helperChips}</div>` : '';
    const textareaHtml    = `<textarea class="form-input open-answer" placeholder="Ответ ученика..." rows="3" disabled style="background:var(--cream); resize:none; border-style:dashed; cursor:default;"></textarea>`;

    if (layout === 'side') {
        return `
            <div class="slide-card">
                ${chip}
                <div class="task-open-side">
                    <div class="left">
                        ${titleHtml}
                        ${instructionHtml}
                        ${chipsHtml}
                    </div>
                    <div class="right">
                        ${textareaHtml}
                    </div>
                </div>
            </div>
        `;
    }
    if (layout === 'full') {
        return `
            <div class="slide-card task-open-full">
                ${chip}
                <div class="top-line">
                    ${titleHtml}
                    ${chipsHtml}
                </div>
                ${textareaHtml}
            </div>
        `;
    }
    // bottom (default)
    return `
        <div class="slide-card">
            ${chip}
            ${titleHtml}
            ${instructionHtml}
            ${chipsHtml}
            ${textareaHtml}
        </div>
    `;
}

function renderChoicePreview(slide, chip) {
    const m = slide.meta || {};
    const options = m.options || [];
    const correctId = m.correct_id;
    let optsHtml = '';
    options.forEach((o, i) => {
        const letter = String.fromCharCode(65 + i); // A,B,C...
        const correct = o.id === correctId;
        optsHtml += `
            <div class="task-option-box ${correct?'correct':''} ${o.img ? 'has-img' : ''}">
                ${o.img ? `<img class="task-opt-img" src="${esc(o.img)}">` : ''}
                <span class="task-option-letter">${letter}.</span>
                <span>${esc(o.text || (o.img ? '' : '(пусто)'))}</span>
                ${correct ? '<span style="margin-left:auto; color:var(--green-dark);">✓</span>' : ''}
            </div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Вопрос')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-options">${optsHtml || '<div class="muted" style="text-align:center;">Нет вариантов</div>'}</div>
            <button class="task-check-btn">Проверить</button>
        </div>
    `;
}

function renderMatchingPreview(slide, chip) {
    const pairs = (slide.meta || {}).pairs || [];
    let html = '';
    pairs.forEach(p => {
        html += `
            <div class="task-pair-side">${p.left_img ? `<img class="task-pair-img" src="${esc(p.left_img)}">` : ''}${esc(p.left || (p.left_img ? '' : '—'))}</div>
            <div class="arrow">⟷</div>
            <div class="task-pair-side">${p.right_img ? `<img class="task-pair-img" src="${esc(p.right_img)}">` : ''}${esc(p.right || (p.right_img ? '' : '—'))}</div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Соедини пары')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-pairs">${html || '<div class="muted">Нет пар</div>'}</div>
        </div>
    `;
}

function renderFillBlankPreview(slide, chip) {
    const m = slide.meta || {};
    const options = m.options || [];
    const correctId = m.correct_id;
    // В title — предложение с маркером ___ (тройное подчёркивание)
    const sentence = slide.title || 'Sentence with ___ blank.';
    const sentenceHtml = esc(sentence).replace(/___/g, '<span class="task-blank">_____</span>');
    let optsHtml = '';
    options.forEach(o => {
        const correct = o.id === correctId;
        optsHtml += `
            <div class="task-option-box ${correct?'correct':''}" style="display:inline-flex;">
                <span>${esc(o.text || '(пусто)')}</span>
                ${correct ? '<span style="margin-left:6px; color:var(--green-dark);">✓</span>' : ''}
            </div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <p class="task-sentence">${sentenceHtml}</p>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">${optsHtml || '<div class="muted">Нет вариантов</div>'}</div>
        </div>
    `;
}

function renderOrderingPreview(slide, chip) {
    const words = (slide.meta || {}).words || [];
    // В превью покажем слова в обратном порядке как "перемешанные" — детерминированно
    const shuffled = [...words].reverse();
    let chipsHtml = '';
    shuffled.forEach(w => {
        chipsHtml += `<span class="task-word-chip">${esc(w.text || '—')}</span>`;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Составь предложение')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-target-line">сюда перетащи слова</div>
            <div class="task-word-chips">${chipsHtml || '<div class="muted">Нет слов</div>'}</div>
            <div class="muted" style="font-size:11px;">Правильный порядок: ${words.map(w => esc(w.text || '—')).join(' ')}</div>
        </div>
    `;
}

function rerenderPreview() {
    const stage = $('editorPreview');
    if (!stage) return;
    const s = currentSlide();
    stage.style.setProperty('--slide-bg', (s && s.slide_type !== 'canvas' && s.meta && s.meta.bgColor) ? s.meta.bgColor : '');
    stage.innerHTML = renderSlidePreview(s);
}

function onPreviewClick() {
    // открывает run mode (когда будет готов)
    if (editorState.lessonId) {
        flushAndNavigate('#/lesson/' + editorState.lessonId + '/run');
    }
}

/* ============================================================
   POLL · форма редактирования, превью
   ============================================================ */

function renderPollForm(slide) {
    const m = slide.meta || {};
    const items = m.items || [];
    let html = '';
    html += renderFormField('Заголовок опроса',
        `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="What I can do today">`);
    html += renderFormField('Описание (опц.)',
        `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Отметь чему ты научился">`);

    let rows = '';
    items.forEach((it, i) => {
        rows += `
            <div class="word-edit-row" data-row-id="${it.id}">
                <span class="word-order-num">${i + 1}.</span>
                <input class="form-input" type="text" value="${esc(it.text || '')}"
                       placeholder="I can name 4 types of homes"
                       data-poll-item-id="${it.id}">
                <button class="x-btn" onclick="onPollItemDelete('${it.id}')" title="Удалить" ${items.length <= 1 ? 'disabled' : ''}>×</button>
            </div>
        `;
    });
    const canAdd = items.length < 8;
    html += `
        <div class="form-field">
            <label>Пункты опроса <span class="hint">· ученик отметит галочкой что освоил</span></label>
            <div>${rows}</div>

function onPollItemAdd() {
    const slide = currentSlide();
    if (!slide || !slide.meta) return;
    if (!slide.meta.items) slide.meta.items = [];
    if (slide.meta.items.length >= 8) return;
    slide.meta.items.push({ id: newId(), text: '' });
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onPollItemDelete(itemId) {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.items) return;
    if (slide.meta.items.length <= 1) return;
    slide.meta.items = slide.meta.items.filter(x => x.id !== itemId);
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onPollItemInput(e) {
    const el = e.currentTarget;
    const id = el.getAttribute('data-poll-item-id');
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.items) return;
    const it = slide.meta.items.find(x => x.id === id);
    if (it) {
        it.text = el.value;
        markDirty();
        rerenderPreview();
    }
}

// Хелпер: текущая неделя (Пн-Вс) + название месяца
function getCurrentWeekDates() {
    const today = new Date();
    const dow = today.getDay(); // 0=Sun ... 6=Sat
    const monOffset = dow === 0 ? -6 : 1 - dow;
    const monday = new Date(today);
    monday.setDate(today.getDate() + monOffset);
    const dayNamesEn = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const dayKeysShort = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                        'July', 'August', 'September', 'October', 'November', 'December'];
    const arr = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        arr.push({
            label: dayNamesEn[i],
            key: dayKeysShort[i],
            date: d.getDate(),
            iso: d.toISOString().slice(0, 10),
            month_name: monthNames[d.getMonth()]
        });
    }
    return { days: arr, month_name: monthNames[today.getMonth()] };
}

    const { days: week, month_name } = getCurrentWeekDates();

    week.forEach(d => {

        body += renderVideoForm(slide);
    } else if (t === 'rate') {

function taskPickImageUpload(onUrl) {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = async () => {
        const f = inp.files && inp.files[0];
        if (!f) return;
        toast('Загружаю картинку…', 'info');
        try {
            const blob = await processImageToWebp(f, 800, 800, 'contain');
            const path = `lessons/${editorState.lessonId}/tasks/t_${Math.random().toString(36).slice(2, 9)}.webp`;
            const { error } = await sb.storage.from('classroom-media').upload(path, blob, { contentType: 'image/webp', upsert: false });
            if (error) throw error;
            onUrl(sb.storage.from('classroom-media').getPublicUrl(path).data.publicUrl);
            toast('Готово', 'success');
        } catch (e) { console.error('task image', e); toast('Не загрузилось: ' + (e.message || e), 'error'); }
    };
    inp.click();
}

    slide.meta.helper_words = slide.meta.helper_words.filter(w => w.id !== wId);
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onTaskHelperInput(e) {
    const el = e.currentTarget;
    const id = el.getAttribute('data-helper-id');
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.helper_words) return;
    const w = slide.meta.helper_words.find(x => x.id === id);
    if (w) {
        w.text = el.value;
        markDirty();
        rerenderPreview();
    }
}

function attachFormHandlers() {
    const form = $('editorForm');
    if (!form) return;
    form.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('input', onFieldInput);
        el.addEventListener('change', onFieldInput);
    });
    // task: choice/fill_blank options
    form.querySelectorAll('[data-opt-id]').forEach(el => {
        el.addEventListener('input', onTaskOptInput);
        el.addEventListener('change', onTaskOptInput);
    });
    // task: matching pairs
    form.querySelectorAll('[data-pair-id]').forEach(el => {
        el.addEventListener('input', onTaskPairInput);
    });
    // task: ordering words
    form.querySelectorAll('[data-word-id]').forEach(el => {
        el.addEventListener('input', onTaskWordInput);
    });
    // task/open: helper words
    form.querySelectorAll('[data-helper-id]').forEach(el => {
        el.addEventListener('input', onTaskHelperInput);
    });
    // Поля, которые сохраняются в slide.meta (deck_id, video_url, ...)
    form.querySelectorAll('[data-meta-field]').forEach(el => {
        el.addEventListener('input', onMetaFieldInput);
        el.addEventListener('change', onMetaFieldInput);
    });
    // Boolean чекбоксы в meta (rate.ask_*, outro.finish_lesson, ...)
    form.querySelectorAll('[data-meta-bool]').forEach(el => {
        el.addEventListener('change', onMetaBoolInput);
    });
    // poll items
    form.querySelectorAll('[data-poll-item-id]').forEach(el => {
        el.addEventListener('input', onPollItemInput);
    });
}

function onMetaBoolInput(e) {
    const el = e.currentTarget;
    const field = el.getAttribute('data-meta-bool');
    const slide = currentSlide();
    if (!slide) return;
    if (!slide.meta) slide.meta = {};
    slide.meta[field] = !!el.checked;
    markDirty();
    rerenderPreview();
}

function onTaskOptInput(e) {
    const el = e.currentTarget;
    const optId = el.getAttribute('data-opt-id');
    const slide = currentSlide();
    if (!slide || !slide.meta) return;

    if (el.hasAttribute('data-opt-radio')) {
        if (el.checked) {
            slide.meta.correct_id = optId;
            markDirty();
            rerenderPreview();
        }
        return;
    }
    const field = el.getAttribute('data-opt-field');
    const opt = (slide.meta.options || []).find(o => o.id === optId);
    if (opt) {
        opt[field] = el.value;
        markDirty();
        rerenderPreview();
    }
}

function onTaskPairInput(e) {
    const el = e.currentTarget;
    const pairId = el.getAttribute('data-pair-id');
    const field = el.getAttribute('data-pair-field');
    const slide = currentSlide();
    if (!slide || !slide.meta) return;
    const p = (slide.meta.pairs || []).find(x => x.id === pairId);
    if (p) {
        p[field] = el.value;
        markDirty();
        rerenderPreview();
    }
}

function onTaskWordInput(e) {
    const el = e.currentTarget;
    const wordId = el.getAttribute('data-word-id');
    const slide = currentSlide();
    if (!slide || !slide.meta) return;
    const w = (slide.meta.words || []).find(x => x.id === wordId);
    if (w) {
        w.text = el.value;
        markDirty();
        rerenderPreview();
    }
}

function onFieldInput(e) {
    const el = e.currentTarget;
    const field = el.getAttribute('data-field');
    const slide = currentSlide();
    if (!slide) return;
    const isTypeChange = el.hasAttribute('data-typechange');

    if (isTypeChange) {
        const newType = el.value;
        const oldType = slide.slide_type;
        slide.slide_type = newType;
        // Если эмоджи был дефолтным для предыдущего типа — обновим под новый
        const wasDefault = Object.values(SLIDE_TYPE_META).some(m => m.defaultEmoji === slide.cover_emoji);
        if (!slide.cover_emoji || wasDefault) {
            slide.cover_emoji = SLIDE_TYPE_META[newType].defaultEmoji;
        }
        // Инициализация meta при переключении в task
        if (newType === 'task' && !getTaskSubtype(slide)) {
            slide.meta = initTaskMeta('choice');
        }
        // При уходе из task сохраняем meta (не очищаем — вдруг вернётся)
        markDirty();
        // Перерендериваем форму (поля меняются) + превью + ленту
        $('editorForm').innerHTML = renderEditorForm(slide);
        attachFormHandlers();
        rerenderPreview();
        $('editorRibbon').innerHTML = renderRibbon();
        return;
    }

    slide[field] = el.value;
    markDirty();
    rerenderPreview();
    // Если поменялся заголовок — обновим ленту? Эмоджи в ленте от title не зависит. Не нужно.
}

// Обработчик полей, которые сохраняются в slide.meta (deck_id, video_url, и т.п.)
function onMetaFieldInput(e) {
    const el = e.currentTarget;
    const field = el.getAttribute('data-meta-field');
    const slide = currentSlide();
    if (!slide) return;
    if (!slide.meta) slide.meta = {};
    let val = el.value;
    if (el.hasAttribute('data-meta-int')) {
        val = parseInt(val) || null;
    }
    slide.meta[field] = val;
    markDirty();
    rerenderPreview();
}

async function onPickEmoji() {
    const slide = currentSlide();
    if (!slide) return;
    const cur = slide.cover_emoji || SLIDE_TYPE_META[slide.slide_type].defaultEmoji;
    const next = prompt('Введи эмоджи для слайда (например 🪥):', cur);
    if (next === null) return;
    slide.cover_emoji = next.trim() || SLIDE_TYPE_META[slide.slide_type].defaultEmoji;
    markDirty();
    // обновить форму (отобразить новое эмоджи в кнопке) + превью + ленту
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
    $('editorRibbon').innerHTML = renderRibbon();
}

async function onDeleteSlide() {
    const slide = currentSlide();
    if (!slide) return;
    if (!confirm('Удалить слайд? Действие нельзя отменить.')) return;
    const { error } = await sb.from('study_slides').delete().eq('id', slide.id);
    if (error) { toast('Ошибка: ' + error.message, 'error'); return; }
    editorState.slides = editorState.slides.filter(s => s.id !== slide.id);
    // выбрать соседний
    if (editorState.slides.length) {
        const idx = Math.max(0, getSlideIndex(slide.id) - 1);
        // getSlideIndex уже не найдёт удалённый — берём idx из старого порядка приближённо
        editorState.selectedId = (editorState.slides[idx] || editorState.slides[0]).id;
    } else {
        editorState.selectedId = null;
    }
    renderEditor();
    toast('Слайд удалён', 'success');
}

/* ============ AUTOSAVE ============ */

function markDirty() {
    editorState.saveStatus = 'dirty';
    updateSaveIndicator();
    if (editorState.saveTimer) clearTimeout(editorState.saveTimer);
    editorState.saveTimer = setTimeout(doSave, 1000);
}

async function doSave() {
    const slide = currentSlide();
    if (!slide) return;
    editorState.saveTimer = null;
    editorState.saveStatus = 'saving';
    updateSaveIndicator();
    const payload = {
        slide_type:    slide.slide_type,
        title:         slide.title,
        body:          slide.body,
        cover_emoji:   slide.cover_emoji,
        image_url:     slide.image_url,
        meta:          slide.meta || {},
        teacher_notes: slide.teacher_notes,
        updated_at:    new Date().toISOString()
    };
    const { error } = await sb.from('study_slides').update(payload).eq('id', slide.id);
    if (error) {
        editorState.saveStatus = 'error';
        toast('Не сохранилось: ' + error.message, 'error');
    } else {
        editorState.saveStatus = 'saved';
    }
    updateSaveIndicator();
    if (editorState.saveStatus === 'saved') {
        setTimeout(() => {
            if (editorState.saveStatus === 'saved') {
                editorState.saveStatus = 'idle';
                updateSaveIndicator();
            }
        }, 2000);
    }
}

async function flushSave() {
    if (editorState.saveTimer) {
        clearTimeout(editorState.saveTimer);
        editorState.saveTimer = null;
        await doSave();
    }
}

async function flushAndNavigate(hash) {
    await flushSave();
    navigateTo(hash);
}

window.addEventListener('beforeunload', (e) => {
    if (editorState.saveStatus === 'dirty' || editorState.saveTimer) {
        // Принудительный sync save через fetch с keepalive не реализован — просто предупредим
        e.preventDefault();
        e.returnValue = '';
    }
});

/* ============ MARKDOWN (мини) ============ */

function md(text) {
    if (!text) return '';
    let out = esc(text);
    out = out.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    out = out.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    out = out.replace(/\n/g, '<br>');
    return out;
}

/* ================================================================
   SCREEN · CANVAS SLIDE  (модель B — свободный холст с блоками)
   Блоки живут в slide.meta.blocks; фон — slide.meta.bg (URL).
   Координаты блоков — в пикселях системы 1280x720; холст
   масштабируется через transform: scale(), drag-математика делит
   экранную дельту на canvasScale.
   ================================================================ */
const CANVAS_W = 1280, CANVAS_H = 720;
let canvasScale = 1;
let canvasDrag = null;

function canvasMeta(slide) {
    if (!slide.meta) slide.meta = {};
    if (!Array.isArray(slide.meta.blocks)) slide.meta.blocks = [];
    return slide.meta;
}
function canvasBlocks(slide) { return canvasMeta(slide).blocks; }
function findBlock(slide, id) { return canvasBlocks(slide).find(b => b.id === id) || null; }
function selectedBlock() {
    const s = currentSlide();
    if (!s || s.slide_type !== 'canvas') return null;
    return findBlock(s, editorState.selectedBlockId);
}
function newBlockId() { return 'b_' + Math.random().toString(36).slice(2, 9); }
function maxZ(slide) { const bs = canvasBlocks(slide); return bs.length ? Math.max(...bs.map(b => b.z || 0)) : 0; }
function cvClamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function makeBlock(type, x, y) {
    const s = currentSlide();
    const base = { id: newBlockId(), type, x: Math.round(x), y: Math.round(y), z: maxZ(s) + 1 };
    if (type === 'text')    return { ...base, w: 480, h: 90,  text: 'Текст', color: '#2C2C2A', size: 44, weight: 700, align: 'left' };
    if (type === 'image')   return { ...base, w: 380, h: 250, url: '' };
    if (type === 'shape')   return { ...base, w: 320, h: 200, shape: 'rect', fill: 'rgba(127,119,221,0.25)', stroke: '#7F77DD', radius: 16 };
    if (type === 'hotspot') return { ...base, w: 240, h: 160, reveal: '✓' };
    return base;
}

/* ---------- EDITOR: рендер холста ---------- */
function renderCanvasPreview(slide, chip) {
    const m = canvasMeta(slide);
    const bg = `${m.bgColor ? `background-color:${m.bgColor};` : ''}${m.bg ? `background-image:url('${esc(m.bg)}'); background-size:cover; background-position:center;` : ''}`;
    const blocks = canvasBlocks(slide).slice().sort((a, b) => (a.z || 0) - (b.z || 0))
        .map(b => renderCanvasBlock(b, b.id === editorState.selectedBlockId)).join('');
    const empty = canvasBlocks(slide).length ? '' :
        `<div class="cv-empty-hint">Пустой холст<span>добавь блоки справа →</span></div>`;
    return `<div class="cv-edit-wrap" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()">
        <div class="cv-chip-row">${chip}<span class="cv-hint">кликни блок · тащи мышкой · угол = размер</span></div>
        <div class="cv-frame" id="cvFrame">
            <div class="cv-stage" id="cvStage" style="${bg}">${blocks}${empty}</div>
        </div>
    </div>`;
}

function renderCanvasBlock(b, isSel) {
    const pos = `left:${b.x}px; top:${b.y}px; width:${b.w}px; height:${b.h}px; z-index:${b.z || 1};`;
    let inner = '';
    if (b.type === 'text') {
        inner = `<div class="cv-text" style="color:${esc(b.color)}; font-size:${b.size}px; font-weight:${b.weight}; text-align:${b.align};">${esc(b.text || '')}</div>`;
    } else if (b.type === 'image') {
        inner = b.url
            ? `<img src="${esc(b.url)}" class="cv-img" draggable="false">`
            : `<div class="cv-img-empty">🖼<span>загрузи картинку</span></div>`;
    } else if (b.type === 'shape') {
        const rad = b.shape === 'ellipse' ? '50%' : (b.radius || 0) + 'px';
        inner = `<div class="cv-shape" style="background:${b.fill}; border:3px solid ${b.stroke}; border-radius:${rad};"></div>`;
    } else if (b.type === 'hotspot') {
        inner = `<div class="cv-hotspot"><span class="cv-hot-tag">тап-зона</span>${b.reveal ? `<span class="cv-hot-peek">→ ${esc(b.reveal)}</span>` : ''}</div>`;
    }
    const handles = isSel
        ? `<span class="cv-handle nw"></span><span class="cv-handle ne"></span><span class="cv-handle sw"></span><span class="cv-handle se" data-resize="1"></span>`
        : '';
    return `<div class="cv-block ${b.type} ${isSel ? 'sel' : ''}" data-block-id="${b.id}" style="${pos}">${inner}${handles}</div>`;
}

/* ---------- EDITOR: фит / масштаб ---------- */
function fitAllCanvases() {
    document.querySelectorAll('.cv-frame').forEach(frame => {
        const stage = frame.querySelector('.cv-stage');
        if (!stage) return;
        const w = frame.clientWidth;
        if (!w) return;
        const sc = w / CANVAS_W;
        stage.style.transform = `scale(${sc})`;
        frame.style.height = (CANVAS_H * sc) + 'px';
        if (frame.id === 'cvFrame') canvasScale = sc;
    });
}
window.addEventListener('resize', fitAllCanvases);

/* ---------- EDITOR: drag / resize / select ---------- */
function attachCanvasHandlers() {
    const slide = currentSlide();
    const stage = document.getElementById('cvStage');
    if (!stage || !slide || slide.slide_type !== 'canvas') return;
    fitAllCanvases();
    requestAnimationFrame(fitAllCanvases);
    stage.addEventListener('mousedown', onCanvasStageMouseDown);
    stage.addEventListener('dragover', e => { e.preventDefault(); stage.classList.add('drop'); });
    stage.addEventListener('dragleave', () => stage.classList.remove('drop'));
    stage.addEventListener('drop', onCanvasDrop);
}

function onCanvasStageMouseDown(e) {
    const blockEl = e.target.closest('.cv-block');
    const isHandle = !!e.target.closest('[data-resize]');
    if (blockEl && isHandle) { startCanvasOp(e, blockEl.dataset.blockId, 'resize'); return; }
    if (blockEl) { canvasSelectBlock(blockEl.dataset.blockId); startCanvasOp(e, blockEl.dataset.blockId, 'move'); return; }
    canvasSelectBlock(null);
}

function startCanvasOp(e, id, mode) {
    e.preventDefault();
    const b = findBlock(currentSlide(), id);
    if (!b) return;
    canvasDrag = { id, mode, sx: e.clientX, sy: e.clientY, ox: b.x, oy: b.y, ow: b.w, oh: b.h };
    document.addEventListener('mousemove', onCanvasMouseMove);
    document.addEventListener('mouseup', onCanvasMouseUp);
}

function onCanvasMouseMove(e) {
    if (!canvasDrag) return;
    const dx = (e.clientX - canvasDrag.sx) / (canvasScale || 1);
    const dy = (e.clientY - canvasDrag.sy) / (canvasScale || 1);
    const el = document.querySelector(`.cv-block[data-block-id="${canvasDrag.id}"]`);
    if (!el) return;
    if (canvasDrag.mode === 'move') {
        const nx = cvClamp(canvasDrag.ox + dx, -canvasDrag.ow + 40, CANVAS_W - 40);
        const ny = cvClamp(canvasDrag.oy + dy, -canvasDrag.oh + 40, CANVAS_H - 40);
        el.style.left = nx + 'px';
        el.style.top = ny + 'px';
    } else {
        const nw = cvClamp(canvasDrag.ow + dx, 40, CANVAS_W);
        const nh = cvClamp(canvasDrag.oh + dy, 30, CANVAS_H);
        el.style.width = nw + 'px';
        el.style.height = nh + 'px';
    }
}

function onCanvasMouseUp() {
    document.removeEventListener('mousemove', onCanvasMouseMove);
    document.removeEventListener('mouseup', onCanvasMouseUp);
    if (!canvasDrag) return;
    const b = findBlock(currentSlide(), canvasDrag.id);
    const el = document.querySelector(`.cv-block[data-block-id="${canvasDrag.id}"]`);
    if (b && el) {
        b.x = Math.round(parseFloat(el.style.left));
        b.y = Math.round(parseFloat(el.style.top));
        b.w = Math.round(parseFloat(el.style.width));
        b.h = Math.round(parseFloat(el.style.height));
        markDirty();
    }
    canvasDrag = null;
}

function canvasSelectBlock(id) {
    editorState.selectedBlockId = id;
    rerenderCanvasAll();
}

/* перерисовать холст + панель свойств, сохранив выбор */
function rerenderCanvasAll() {
    const slide = currentSlide();
    const prev = document.getElementById('editorPreview');
    if (prev) prev.innerHTML = renderSlidePreview(slide);
    const form = document.getElementById('editorForm');
    if (form) { form.innerHTML = renderEditorForm(slide); attachFormHandlers(); }
    attachCanvasHandlers();
}

/* ---------- EDITOR: операции с блоками ---------- */
function canvasAddBlock(type) {
    const slide = currentSlide();
    if (!slide) return;
    const n = canvasBlocks(slide).length;
    const b = makeBlock(type, 220 + (n % 5) * 40, 170 + (n % 5) * 40);
    canvasBlocks(slide).push(b);
    editorState.selectedBlockId = b.id;
    markDirty();
    rerenderCanvasAll();
}

function canvasDeleteBlock() {
    const slide = currentSlide();
    const id = editorState.selectedBlockId;
    if (!id) return;
    slide.meta.blocks = canvasBlocks(slide).filter(b => b.id !== id);
    editorState.selectedBlockId = null;
    markDirty();
    rerenderCanvasAll();
}

function canvasBlockZ(dir) {
    const slide = currentSlide();
    const b = selectedBlock();
    if (!b) return;
    if (dir === 'front') b.z = maxZ(slide) + 1;
    else b.z = Math.min(...canvasBlocks(slide).map(x => x.z || 0)) - 1;
    markDirty();
    rerenderCanvasAll();
}

/* живое обновление поля выбранного блока (без перерисовки формы — фокус остаётся в инпуте) */
function canvasUpdateField(field, val, isInt) {
    const b = selectedBlock();
    if (!b) return;
    b[field] = isInt ? (parseInt(val) || 0) : val;
    markDirty();
    const slide = currentSlide();
    const prev = document.getElementById('editorPreview');
    if (prev) prev.innerHTML = renderSlidePreview(slide);
    attachCanvasHandlers();
}

/* ---------- EDITOR: загрузка изображений в Supabase Storage ---------- */
/* выбор файла → модалка «как вставить» */
function canvasInsertImage() {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = () => {
        const file = inp.files && inp.files[0];
        if (file) showImagePlacementModal(file);
    };
    inp.click();
}

function showImagePlacementModal(file) {
    if (!file.type.startsWith('image/')) { toast('Это не изображение', 'error'); return; }
    const url = URL.createObjectURL(file);
    const modal = document.createElement('div');
    modal.className = 'cv-img-modal';
    modal.innerHTML = `
        <div class="cv-img-card">
            <button class="cv-img-x" title="Закрыть">✕</button>
            <div class="cv-img-prev"><img src="${url}" alt=""></div>
            <div class="cv-img-q">Как вставить изображение?</div>
            <div class="cv-img-opts">
                <button class="cv-img-opt" data-mode="bg"><span class="ico">🖼</span><span class="tx"><b>Фон слайда</b><i>на весь слайд, с обрезкой под 16:9</i></span></button>
                <button class="cv-img-opt" data-mode="fit"><span class="ico">🔲</span><span class="tx"><b>Во весь слайд</b><i>целиком, по размеру, без обрезки</i></span></button>
                <button class="cv-img-opt" data-mode="block"><span class="ico">✋</span><span class="tx"><b>Перетаскиваемый блок</b><i>обычная картинка, двигаешь мышкой</i></span></button>
            </div>
        </div>`;
    document.body.appendChild(modal);
    const close = () => { URL.revokeObjectURL(url); modal.remove(); };
    modal.addEventListener('click', e => { if (e.target === modal) close(); });
    modal.querySelector('.cv-img-x').addEventListener('click', close);
    modal.querySelectorAll('.cv-img-opt').forEach(btn => {
        btn.addEventListener('click', async () => {
            const mode = btn.dataset.mode;
            close();
            await canvasApplyImage(file, mode);
        });
    });
}

/* заменить картинку в уже выбранном image-блоке (размер блока сохраняется) */
function canvasReplaceSelectedImage() {
    const b = selectedBlock();
    if (!b || b.type !== 'image') return;
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = async () => {
        const file = inp.files && inp.files[0];
        if (file) await canvasApplyImage(file, 'replace');
    };
    inp.click();
}

async function canvasApplyImage(file, mode, dropX, dropY) {
    const slide = currentSlide();
    if (!slide) return;
    if (!file.type.startsWith('image/')) { toast('Это не изображение', 'error'); return; }
    toast('Загружаю картинку…', 'info');
    try {
        const isBg = mode === 'bg';
        const blob = await processImageToWebp(file, isBg ? CANVAS_W : 1280, isBg ? CANVAS_H : 1280, isBg ? 'cover' : 'contain');
        const path = `lessons/${editorState.lessonId}/${slide.id}/${newBlockId()}.webp`;
        const { error: upErr } = await sb.storage.from('classroom-media').upload(path, blob, { contentType: 'image/webp', upsert: false });
        if (upErr) throw upErr;
        const url = sb.storage.from('classroom-media').getPublicUrl(path).data.publicUrl;
        if (isBg) {
            canvasMeta(slide).bg = url;
        } else if (mode === 'replace') {
            const b = selectedBlock();
            if (b && b.type === 'image') b.url = url;
        } else {
            const dims = await blobDims(blob);
            const ar = dims.w / dims.h || 1.4;
            let w, h, x, y;
            if (mode === 'fit') {
                const sc = Math.min(1200 / dims.w, 660 / dims.h);
                w = Math.round(dims.w * sc); h = Math.round(dims.h * sc);
                x = Math.round((CANVAS_W - w) / 2); y = Math.round((CANVAS_H - h) / 2);
            } else {
                w = 460; h = Math.round(w / ar);
                if (dropX != null) { x = dropX; y = dropY; }
                else { x = Math.round((CANVAS_W - w) / 2); y = Math.round((CANVAS_H - h) / 2); }
            }
            const b = makeBlock('image', x, y);
            b.url = url; b.w = w; b.h = h;
            canvasBlocks(slide).push(b);
            editorState.selectedBlockId = b.id;
        }
        markDirty();
        rerenderCanvasAll();
        toast('Готово', 'success');
    } catch (err) {
        console.error('canvas upload', err);
        toast('Не загрузилось: ' + (err.message || err), 'error');
    }
}

function processImageToWebp(file, maxW, maxH, mode) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(url);
            let tw, th, sx = 0, sy = 0, sw = img.width, sh = img.height;
            if (mode === 'cover') {
                tw = maxW; th = maxH;
                const ar = maxW / maxH, iar = img.width / img.height;
                if (iar > ar) { sw = img.height * ar; sx = (img.width - sw) / 2; }
                else { sh = img.width / ar; sy = (img.height - sh) / 2; }
            } else {
                const sc = Math.min(maxW / img.width, maxH / img.height, 1);
                tw = Math.max(1, Math.round(img.width * sc));
                th = Math.max(1, Math.round(img.height * sc));
            }
            const c = document.createElement('canvas');
            c.width = tw; c.height = th;
            c.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, tw, th);
            c.toBlob(b => b ? resolve(b) : reject(new Error('toBlob failed')), 'image/webp', 0.85);
        };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('битый файл изображения')); };
        img.src = url;
    });
}

function blobDims(blob) {
    return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(blob);
        img.onload = () => { URL.revokeObjectURL(url); resolve({ w: img.width, h: img.height }); };
        img.onerror = () => resolve({ w: 4, h: 3 });
        img.src = url;
    });
}

async function onCanvasDrop(e) {
    e.preventDefault();
    const stage = document.getElementById('cvStage');
    if (stage) stage.classList.remove('drop');
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    const rect = stage.getBoundingClientRect();
    const x = (e.clientX - rect.left) / (canvasScale || 1);
    const y = (e.clientY - rect.top) / (canvasScale || 1);
    await canvasApplyImage(file, 'block', Math.round(x), Math.round(y));
}

function cvHexToRgba(hex, a) {
    let h = (hex || '#7F77DD').replace('#', '');
    if (h.length === 3) h = h.split('').map(c => c + c).join('');
    const n = parseInt(h, 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
}
function cvRgbaToHex(rgba) {
    if (!rgba) return '#7F77DD';
    if (rgba[0] === '#') return rgba;
    const m = rgba.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
    if (!m) return '#7F77DD';
    return '#' + [1, 2, 3].map(i => (+m[i]).toString(16).padStart(2, '0')).join('');
}

        if (b.type === 'text') {

async function showRunMode(lessonId) {
    const main = $('appMain');
    main.innerHTML = `<div class="loader">Загружаю урок…</div>`;

    const { data: lesson, error: lErr } = await sb.from('study_lessons')
        .select('id, title, lesson_type')
        .eq('id', lessonId)
        .is('deleted_at', null)
        .maybeSingle();
    if (lErr || !lesson) {
        main.innerHTML = `<div class="empty"><div class="emoji">😕</div><div class="title">Урок не найден</div></div>`;
        return;
    }

    const { data: slides, error: sErr } = await sb.from('study_slides')
        .select('*')
        .eq('lesson_id', lessonId)
        .order('"order"', { ascending: true })
        .order('id', { ascending: true });
    if (sErr || !slides || !slides.length) {
        main.innerHTML = `
            <div class="empty">
                <div class="emoji">📭</div>
                <div class="title">В уроке нет слайдов</div>
                ${hasEditAccess(currentUser) ? `<button class="btn btn-primary" onclick="navigateTo('#/lesson/${lessonId}/edit')" style="margin-top:14px;">Открыть редактор</button>` : ''}
            </div>`;
        return;
    }

    if (slides.some(s => s.slide_type === 'deck')) {
        await loadDeckLibrary();
    }

    runState.lessonId = lessonId;
    runState.lesson = lesson;
    runState.slides = slides;
    runState.currentIdx = 0;
    runState.notesOpen = false;
    runState.hotspots = {};
    loadCheckinAudioMap();
    runState.interactions = {};
    runState.timer = { value: 0, running: false, intervalId: null };
    runState.runId = null;
    runState.studentName = null;
    runState.studentId = null;
    runState.mkLessonId = null;

    // Парсим query-params: ?student=UUID&mk_lesson=UUID
    // Параметры могут быть как в location.search, так и в hash после ? (для hash-роутинга)
    try {
        const all = new URLSearchParams(window.location.search);
        const hash = window.location.hash || '';
        const qIdx = hash.indexOf('?');
        if (qIdx >= 0) {
            const hashParams = new URLSearchParams(hash.substring(qIdx + 1));
            for (const [k, v] of hashParams) all.set(k, v);
        }
        const studentParam = all.get('student');
        const mkLessonParam = all.get('mk_lesson');
        if (mkLessonParam) runState.mkLessonId = mkLessonParam;

        if (studentParam) {
            // Если выглядит как UUID — грузим имя из БД, иначе используем как display name
            if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(studentParam)) {
                runState.studentId = studentParam;
                const { data: st } = await sb.from('students').select('id, name').eq('id', studentParam).maybeSingle();
                runState.studentName = st ? st.name : null;
            } else {
                runState.studentName = studentParam;
            }
        }
    } catch(_) {}

    renderRunMode();
    attachRunKeyboard();
}

function renderRunRibbon() {
    let html = '';
    runState.slides.forEach((s, i) => {
        const meta = SLIDE_TYPE_META[s.slide_type] || SLIDE_TYPE_META.text;
        const emoji = s.cover_emoji || meta.defaultEmoji;
        const title = stripLeadingEmoji(s.title) || meta.label;
        const cls = i === runState.currentIdx ? 'run-ribbon-slide current' : 'run-ribbon-slide';
        html += `
            <div class="${cls}" onclick="runJumpTo(${i})" title="${i+1}. ${esc(title)}">
                <div class="rs-head">
                    <span class="rs-num">${i+1}</span>
                    <span class="rs-emoji">${esc(emoji)}</span>
                </div>
                <div class="rs-title">${esc(title)}</div>
            </div>
        `;
    });
    return html;
}

function runJumpTo(idx) {
    if (idx === runState.currentIdx) return;
    if (idx < 0 || idx >= runState.slides.length) return;
    runState.currentIdx = idx;
    renderRunMode();
}

function renderRunSlide(slide) {
    const t = slide.slide_type;
    if (t === 'task')  return renderRunTask(slide);
    if (t === 'poll')  return renderRunPoll(slide);
    if (t === 'checkin') return renderRunCheckin(slide);
    if (t === 'deck')  return renderRunDeck(slide);
    if (t === 'video') return renderRunVideo(slide);
    if (t === 'rate')  return renderRunRate(slide);
    if (t === 'outro') return renderRunOutro(slide);
    if (t === 'canvas') return renderCanvasRun(slide);
    if (t === 'reading') return renderRunReading(slide);
    if (t === 'text' || t === 'explanation' || t === 'vocab') return renderRunSimple(slide);

    return renderSlidePreview(slide);

function renderRunTask(slide) {
    const subtype = getTaskSubtype(slide) || 'open';
    const subMeta = TASK_SUBTYPE_META[subtype] || TASK_SUBTYPE_META.open;
    const chip = `<span class="slide-type-chip" style="background:var(--green-light); color:var(--green-dark);">✓ ${esc(subMeta.label)}</span>`;
    if (subtype === 'open')       return renderRunOpen(slide, chip);

function renderRunOpen(slide, chip) {
    const m = slide.meta || {};

                        ${chipsHtml}

                    ${titleHtml}
                    ${chipsHtml}

                ${textareaHtml}

            ${instructionHtml}
            ${chipsHtml}

function renderRunChoice(slide, chip) {
    const m = slide.meta || {};
    const options = m.options || [];
    const correctId = m.correct_id;
    const interaction = getInteraction(slide.id);
    const selectedId = interaction.choiceSelected;
    const revealed = interaction.choiceRevealed;

    let optsHtml = '';
    options.forEach((o, i) => {
        const letter = String.fromCharCode(65 + i);
        let cls = 'task-option-box';
        if (revealed) {
            if (o.id === correctId) cls += ' revealed-correct';
            else if (o.id === selectedId) cls += ' revealed-wrong';
        } else if (o.id === selectedId) {
            cls += ' selected';
        }
        optsHtml += `
            <div class="${cls} ${o.img ? 'has-img' : ''}" onclick="onRunChoicePick(${slide.id}, '${o.id}')">
                ${o.img ? `<img class="task-opt-img" src="${esc(o.img)}">` : ''}
                <span class="task-option-letter">${letter}.</span>
                <span style="flex:1;">${esc(o.text || (o.img ? '' : '(пусто)'))}</span>
                ${revealed && o.id === correctId ? '<span style="color:var(--green-dark); font-weight:700;">✓</span>' : ''}
                ${revealed && o.id === selectedId && o.id !== correctId ? '<span style="color:var(--red); font-weight:700;">✗</span>' : ''}
            </div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:24px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Вопрос')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-options">${optsHtml}</div>
            ${!revealed
                ? `<button class="task-check-btn" onclick="onRunChoiceCheck(${slide.id})" ${!selectedId ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>Проверить</button>`
                : `<button class="task-check-btn" onclick="onRunChoiceReset(${slide.id})">Попробовать снова</button>`}
        </div>
    `;
}

function renderRunMatching(slide, chip) {
    const pairs = (slide.meta || {}).pairs || [];
    const interaction = getInteraction(slide.id);
    const matched = interaction.matchedPairs || [];
    const leftSelected = interaction.leftSelected;

    // Правую колонку детерминированно перемешиваем (reverse)
    const rightItems = [...pairs].reverse();

    let leftHtml = '';
    pairs.forEach(p => {
        const me = matched.find(mp => mp.leftId === p.id);
        let cls = 'task-pair-side';
        if (me) cls += ' matched';
        else if (leftSelected === p.id) cls += ' selected';
        leftHtml += `
            <div class="${cls}" onclick="onRunMatchLeftClick(${slide.id}, '${p.id}')">
                ${me ? `<span class="task-pair-num">${me.num}</span>` : ''}
                ${p.left_img ? `<img class="task-pair-img" src="${esc(p.left_img)}">` : ''}
                ${p.left ? `<span>${esc(p.left)}</span>` : (p.left_img ? '' : '<span>—</span>')}
            </div>
        `;
    });
    let rightHtml = '';
    rightItems.forEach(p => {
        const me = matched.find(mp => mp.rightId === p.id);
        let cls = 'task-pair-side';
        if (me) cls += ' matched';
        rightHtml += `
            <div class="${cls}" onclick="onRunMatchRightClick(${slide.id}, '${p.id}')">
                ${me ? `<span class="task-pair-num">${me.num}</span>` : ''}
                ${p.right_img ? `<img class="task-pair-img" src="${esc(p.right_img)}">` : ''}
                ${p.right ? `<span>${esc(p.right)}</span>` : (p.right_img ? '' : '<span>—</span>')}
            </div>
        `;
    });

    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:24px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Соедини пары')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px 24px;">
                <div style="display:flex; flex-direction:column; gap:10px;">${leftHtml}</div>
                <div style="display:flex; flex-direction:column; gap:10px;">${rightHtml}</div>
            </div>
            ${matched.length ? `<button class="task-check-btn" onclick="onRunMatchReset(${slide.id})">Сбросить</button>` : ''}
        </div>
    `;
}

/* ============ RUN · DECK / VIDEO ============ */

function renderRunDeck(slide) {
    const m = SLIDE_TYPE_META.deck;

function renderRunVideo(slide) {
    const m = SLIDE_TYPE_META.video;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const meta = slide.meta || {};
    const url = meta.video_url || '';
    const parsed = parseVideoUrl(url);
    let videoBlock;
    if (parsed && parsed.provider === 'youtube') {
        videoBlock = `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${parsed.id}" allowfullscreen></iframe></div>`;
    } else if (parsed && parsed.provider === 'gdrive') {
        videoBlock = `<div class="video-wrap"><iframe src="https://drive.google.com/file/d/${parsed.id}/preview" allowfullscreen></iframe></div>`;
    } else if (parsed && parsed.provider === 'rutube') {
        videoBlock = `<div class="video-wrap"><iframe src="https://rutube.ru/play/embed/${parsed.id}" allowfullscreen></iframe></div>`;
    } else {
        videoBlock = `<div class="video-wrap"><div class="video-placeholder">
            <span style="font-size:56px; opacity:0.4;">🎥</span>
            <span style="font-size:14px;">Видео не настроено</span>
        </div></div>`;
    }
    return `
        <div class="slide-card">
            ${chip}
            ${slide.title ? `<h2 style="text-align:left;">${esc(stripLeadingEmoji(slide.title))}</h2>` : ''}
            ${videoBlock}
            ${slide.body ? `<p class="task-instruction" style="font-size:15px;">${esc(slide.body)}</p>` : ''}
        </div>

}

/* ============ RUN · POLL ============ */

function renderRunPoll(slide) {
    const m = SLIDE_TYPE_META.poll;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const items = (slide.meta || {}).items || [];
    const interaction = getInteraction(slide.id);
    const checked = interaction.pollChecked || {};
    const saving = !!interaction.pollSaving;
    const saved = !!interaction.pollSaved;

    let rows = '';
    items.forEach(it => {
        if (!it.text) return;
        const isChecked = !!checked[it.id];
        rows += `
            <div class="poll-row ${isChecked ? 'checked' : ''}" onclick="onRunPollToggle(${slide.id}, '${it.id}')">
                <span class="poll-check ${isChecked ? 'on' : ''}">${isChecked ? '✓' : ''}</span>
                <span class="poll-text">${esc(it.text)}</span>
            </div>
        `;
    });

    return `
        <div class="slide-card">
            ${chip}
            <h2 style="text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'What I can do')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="poll-list">${rows}</div>
            <div style="display:flex; gap:10px; align-items:center; flex-shrink:0; margin-top:6px;">
                <button class="task-check-btn" onclick="onRunPollSave(${slide.id})" ${saving ? 'disabled' : ''}>
                    ${saving ? 'Сохраняю...' : (saved ? '✓ Сохранено' : 'Сохранить ответы')}
                </button>
                ${saved ? '<span style="color:var(--green-dark); font-size:13px;">Готово!</span>' : ''}
            </div>
        </div>
    `;
}

function onRunPollToggle(slideId, itemId) {
    const i = getInteraction(slideId);
    if (!i.pollChecked) i.pollChecked = {};
    i.pollChecked[itemId] = !i.pollChecked[itemId];
    i.pollSaved = false;
    rerenderRunStage();
}

async function onRunPollSave(slideId) {
    const i = getInteraction(slideId);
    const slide = runState.slides.find(s => s.id === slideId);
    if (!slide) return;
    const items = (slide.meta || {}).items || [];
    const checked = i.pollChecked || {};
    const answers = items
        .filter(it => it.text)
        .map(it => ({ item_id: it.id, item_text: it.text, answer: !!checked[it.id] }));

    i.pollSaving = true;
    rerenderRunStage();

    // Создаём run если ещё нет
    await ensureRunId();

    const { error } = await sb.from('study_poll_responses').insert({
        run_id: runState.runId,
        slide_id: slideId,
        student_id: runState.studentId || null,
        answers: answers
    });

    i.pollSaving = false;
    if (error) {
        toast('Не удалось сохранить: ' + error.message, 'error');
    } else {
        i.pollSaved = true;
        toast('Ответы сохранены', 'success');
    }
    rerenderRunStage();
}

/* ============ RUN · RATE ============ */

function renderRunRate(slide) {
    const m = SLIDE_TYPE_META.rate;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const meta = slide.meta || {};
    const interaction = getInteraction(slide.id);
    const vals = interaction.rateValues || {};
    const saving = !!interaction.rateSaving;
    const saved = !!interaction.rateSaved;

    const rows = [];
    if (meta.ask_lesson  !== false) rows.push({ key: 'lesson',  label: 'Lesson',  emoji: '📚' });
    if (meta.ask_teacher !== false) rows.push({ key: 'teacher', label: 'Teacher', emoji: '🧑‍🏫' });
    if (meta.ask_mood    !== false) rows.push({ key: 'mood',    label: 'Mood',    emoji: '✨' });

    const faces = [{ e: '😞', v: 1, cls: 'bad' }, { e: '😐', v: 2, cls: 'mid' }, { e: '😄', v: 3, cls: 'good' }];

    let rowsHtml = '';
    rows.forEach(r => {
        const cur = vals[r.key];
        const faceHtml = faces.map(f =>
            `<button class="rate2-face ${f.cls} ${cur === f.v ? 'selected' : ''}" onclick="onRunRateSet(${slide.id}, '${r.key}', ${f.v})">${f.e}</button>`
        ).join('');
        rowsHtml += `
            <div class="rate2-card">
                <div class="rate2-label">${r.emoji} ${esc(r.label)}</div>
                <div class="rate2-faces">${faceHtml}</div>
            </div>
        `;
    });

    return `
        <div class="slide-card rate2-wrap">
            ${chip}
            <h2 style="text-align:center;">${esc(stripLeadingEmoji(slide.title) || 'Rate the lesson')}</h2>
            ${slide.body ? `<p class="task-instruction" style="text-align:center;">${esc(slide.body)}</p>` : ''}
            <div class="rate2-grid">${rowsHtml}</div>
            <div class="rate2-foot">
                <button class="task-check-btn rate2-save" onclick="onRunRateSave(${slide.id})" ${saving ? 'disabled' : ''}>
                    ${saving ? 'Saving…' : (saved ? '✓ Saved' : 'Save')}
                </button>
                ${saved ? '<span class="rate2-thanks">Thanks! 🎉</span>' : ''}
            </div>
        </div>
    `;
}

function onRunRateSet(slideId, key, val) {
    const i = getInteraction(slideId);
    if (!i.rateValues) i.rateValues = {};
    i.rateValues[key] = val;
    i.rateSaved = false;
    rerenderRunStage();
}

async function onRunRateSave(slideId) {
    const i = getInteraction(slideId);
    const vals = i.rateValues || {};
    if (!vals.lesson && !vals.teacher && !vals.mood) {
        toast('Сначала поставь хотя бы одну оценку', 'error');

    i.rateSaving = true;
    rerenderRunStage();

    const { error } = await sb.from('study_lesson_ratings').insert({
        run_id: runState.runId,
        lesson_id: runState.lessonId,
        student_id: runState.studentId || null,
        lesson_rating:  vals.lesson  || null,
        teacher_rating: vals.teacher || null,
        mood_rating:    vals.mood    || null
    });
    i.rateSaving = false;
    if (error) {
        toast('Не удалось сохранить: ' + error.message, 'error');
    } else {
        i.rateSaved = true;
        toast('Оценка сохранена', 'success');
    }
    rerenderRunStage();
}

/* ============ RUN · CHECKIN ============ */

function renderRunCheckin(slide) {
    const m = SLIDE_TYPE_META.checkin;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const meta = slide.meta || {};
    const interaction = getInteraction(slide.id);
    const sel = interaction.checkin || {};
    const saving = !!interaction.checkinSaving;

    week.forEach(d => {

            <button class="checkin-day ${isSel ? 'selected' : ''}"

                <span class="checkin-day-num">${d.date}</span>

    // Weather buttons

    weatherOptions.forEach(o => {
        const isSel = sel.weather === o.key;
        weatherHtml += `<button class="checkin-emoji-btn ${isSel ? 'selected' : ''}" onclick="onRunCheckinPick(${slide.id}, 'weather', '${o.key}')">${o.emoji}</button>`;
    });

            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}

            <div class="checkin-block run">

                <button class="task-check-btn" onclick="onRunCheckinSave(${slide.id})" ${!canSave || saving ? 'disabled' : ''}>

function onRunCheckinPick(slideId, field, value) {
    const i = getInteraction(slideId);
    if (!i.checkin) i.checkin = {};
    i.checkin[field] = value;
    i.checkinSaved = false;
    if (field === 'mood')    { const o = CHECKIN_MOODS.find(x => x.key === value);   if (o) playCheckinAudio(value, o.say); }
    if (field === 'weather') { const o = CHECKIN_WEATHER.find(x => x.key === value); if (o) playCheckinAudio(value, o.say); }

function onRunCheckinPickDay(slideId, dayKey, dateNum, dateIso, monthName) {

    { const full = DOW_FULL[dayKey] || ''; playCheckinAudio(full.toLowerCase(), full); }

async function onRunCheckinSave(slideId) {
    const i = getInteraction(slideId);
    const sel = i.checkin || {};
    if (!sel.mood || !sel.day_of_week || !sel.weather) {

/* ============ RUN · OUTRO ============ */

function renderRunOutro(slide) {
    // Базовая outro-карточка через стандартный preview
    const base = renderSlidePreview(slide);
    const meta = slide.meta || {};
    if (!meta.finish_lesson) return base;
    // Вставляем кнопку перед последним </div> (закрытие slide-card)
    const lastDiv = base.lastIndexOf('</div>');
    if (lastDiv < 0) return base;
    const button = `
        <div style="display:flex; justify-content:center; margin-top:14px; flex-shrink:0;">
