<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WowSpeak Classroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   WowSpeak Classroom — single-file app
   v1 · скелет: auth + библиотека + курс с юнитами + заготовки
   ================================================================ */

:root {
    --cream: #FFFBF2;
    --cream-deep: #F1EFE8;
    --white: #FFFFFF;

    --purple:       #7F77DD;
    --purple-dark:  #3C3489;
    --purple-light: #EEEDFE;

    --orange:       #BA7517;
    --orange-light: #FAEEDA;
    --orange-dark:  #854F0B;

    --green:        #639922;
    --green-dark:   #27500A;
    --green-light:  #EAF3DE;

    --red:          #A32D2D;
    --red-light:    #FCEBEB;
    --red-mid:      #F0997B;

    --teal:         #0F6E56;
    --teal-light:   #E1F5EE;
    --teal-mid:     #5DCAA5;

    --blue-light:   #E6F1FB;
    --blue-dark:    #0C447C;

    --coral-light:  #FAECE7;
    --coral-dark:   #712B13;

    --pink-light:   #FBEAF0;
    --pink-dark:    #72243E;

    --text:         #2C2C2A;
    --text-soft:    #5F5E5A;
    --text-mute:    #888780;

    --border:       #E8E3D6;
    --border-soft:  #C8C4B6;

    --font-heading: 'Fredoka', system-ui, -apple-system, sans-serif;
    --font-body:    'Nunito', system-ui, -apple-system, sans-serif;
    --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 22px;
    --r-pill: 999px;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--cream);
    background-image: radial-gradient(circle, rgba(120,80,40,0.08) 1px, transparent 1px);
    background-size: 20px 20px;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
}

h1, h2, h3, h4 {
    font-family: var(--font-heading);
    font-weight: 500;
    margin: 0;
    color: var(--text);
}

button { font-family: inherit; }
input, textarea, select { font-family: inherit; }

a { color: var(--purple-dark); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ============== LOGIN ============== */

.login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.login-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 20px rgba(60,40,20,0.04);
}
.login-logo {
    font-family: var(--font-heading);
    font-size: 28px;
    font-weight: 600;
    color: var(--purple-dark);
    text-align: center;
    margin-bottom: 6px;
}
.login-logo .accent { color: var(--orange); }
.login-sub {
    text-align: center;
    color: var(--text-mute);
    font-size: 13px;
    margin-bottom: 28px;
}
.form-group {
    margin-bottom: 14px;
}
.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 4px;
}
.form-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-size: 15px;
    background: var(--white);
    transition: border-color .15s, box-shadow .15s;
}
.form-input:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px var(--purple-light);
}
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: var(--r-pill);
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    transition: transform .12s, background .15s, opacity .15s;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
    background: var(--purple);
    color: var(--white);
}
.btn-primary:hover { background: var(--purple-dark); }
.btn-secondary {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--cream-deep); }
.btn-ghost {
    background: transparent;
    color: var(--text-soft);
}
.btn-ghost:hover { background: var(--cream-deep); }
.btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red-mid);
}
.btn-danger:hover { background: var(--red-light); }
.btn-full { width: 100%; }
.btn-large { padding: 12px 24px; font-size: 15px; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.login-actions { margin-top: 22px; }
.login-foot {
    text-align: center;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-mute);
}
.login-foot a {
    color: var(--purple-dark);
    cursor: pointer;
}

/* ============== HEADER ============== */

#mainApp { display: none; }

.app-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.app-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 16px;
    color: var(--purple-dark);
}
.app-logo .badge {
    width: 26px;
    height: 26px;
    background: var(--purple);
    color: var(--white);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
}
.app-logo .study {
    color: var(--orange);
    font-weight: 500;
}

.subsite-switch {
    display: flex;
    gap: 4px;
    background: var(--cream-deep);
    padding: 3px;
    border-radius: var(--r-pill);
    margin-left: auto;
}
.subsite-btn {
    padding: 5px 12px;
    border-radius: var(--r-pill);
    border: none;
    background: transparent;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.subsite-btn:hover { background: rgba(255,255,255,0.5); text-decoration: none; }
.subsite-btn.active {
    background: var(--white);
    color: var(--purple-dark);
    box-shadow: 0 1px 3px rgba(60,40,20,0.08);
}

.user-block {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
}
.user-name { font-weight: 600; color: var(--text); }
.user-role-badge {
    background: var(--purple-light);
    color: var(--purple-dark);
    padding: 2px 9px;
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 600;
    font-family: var(--font-mono);
    text-transform: lowercase;
}
.user-role-badge.teacher {
    background: var(--green-light);
    color: var(--green-dark);
}
.logout-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-mute);
    padding: 4px 8px;
    border-radius: var(--r-sm);
    font-size: 18px;
}
.logout-btn:hover { background: var(--cream-deep); color: var(--text); }

/* ============== MAIN CONTAINER ============== */

.app-main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 60px;
}

.page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}
.page-title {
    font-size: 24px;
    font-family: var(--font-heading);
    font-weight: 500;
}

/* ============== TABS ============== */

.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}
.tab {
    padding: 8px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-soft);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.tab:hover { background: var(--white); }
.tab.active {
    background: var(--purple);
    color: var(--white);
    border-color: var(--purple);
}

/* ============== COURSE GRID ============== */

.course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
}

.course-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    text-decoration: none;
}
.course-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(60,40,20,0.08);
    text-decoration: none;
}
.course-cover {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
}
.course-body {
    padding: 14px 16px;
}
.course-title {
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 4px;
    color: var(--text);
}
.course-meta {
    font-size: 12px;
    color: var(--text-mute);
    display: flex;
    align-items: center;
    gap: 6px;
}
.level-badge {
    background: var(--purple-light);
    color: var(--purple-dark);
    padding: 2px 9px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
}

.course-card-create {
    background: transparent;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--text-mute);
    cursor: pointer;
    min-height: 170px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-body);
    transition: border-color .15s, color .15s;
}
.course-card-create:hover {
    border-color: var(--purple);
    color: var(--purple-dark);
}
.course-card-create .plus { font-size: 32px; line-height: 1; }

/* ============== COURSE DETAIL ============== */

.crumbs {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-mute);
}
.crumbs a {
    color: var(--text-soft);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

.course-hero {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 18px;
    display: flex;
    gap: 18px;
    align-items: center;
    margin-bottom: 24px;
}
.course-hero-cover {
    width: 90px;
    height: 90px;
    border-radius: var(--r-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    flex-shrink: 0;
}
.course-hero-body { flex: 1; min-width: 0; }
.course-hero-kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-mute);
}
.course-hero-title {
    font-family: var(--font-heading);
    font-size: 22px;
    font-weight: 500;
    margin: 2px 0 6px;
}
.course-hero-desc {
    font-size: 13px;
    color: var(--text-soft);
    margin: 0 0 8px;
}
.course-hero-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-soft);
}

/* ============== UNITS ============== */

.unit-section { margin-bottom: 20px; }
.unit-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px 10px;
    cursor: pointer;
    user-select: none;
}
.unit-emoji { font-size: 22px; }
.unit-kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
}
.unit-title {
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 500;
}
.unit-count {
    font-size: 12px;
    color: var(--text-mute);
}
.unit-actions { margin-left: auto; display: flex; gap: 4px; }

.lesson-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-left: 12px;
}
.lesson-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 12px;
    align-items: center;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 10px 14px;
}
.lesson-num {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--cream-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
}
.lesson-title {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    color: var(--text);
}
.lesson-meta {
    font-size: 11px;
    color: var(--text-mute);
    margin: 2px 0 0;
    display: flex;
    gap: 10px;
    align-items: center;
}
.lesson-meta span { display: inline-flex; align-items: center; gap: 3px; }
.lesson-actions { display: flex; gap: 6px; align-items: center; }

.icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text-mute);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}
.icon-btn:hover { background: var(--cream-deep); color: var(--text); }

.add-row {
    background: transparent;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    padding: 8px;
    font-size: 12px;
    color: var(--text-mute);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-family: var(--font-body);
    font-weight: 600;
    align-self: flex-start;
    margin-left: 12px;
}
.add-row:hover { border-color: var(--purple); color: var(--purple-dark); }
.add-row.wide { align-self: stretch; padding: 14px; margin-left: 0; }

/* ============== EDITOR ============== */

.editor-shell {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: visible;
}
.editor-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    border-radius: var(--r-lg) var(--r-lg) 0 0;
}
.editor-crumbs {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-mute);
    flex-wrap: wrap;
}
.editor-crumbs a { color: var(--text-soft); cursor: pointer; }
.editor-crumbs .here { color: var(--text); font-weight: 600; }
.editor-tools { display: flex; align-items: center; gap: 14px; }

.save-ind {
    font-size: 12px;
    color: var(--text-mute);
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.save-ind.saved   { color: var(--green-dark); }
.save-ind.saving  { color: var(--orange-dark); }
.save-ind.error   { color: var(--red); }

.editor-3pane {
    display: grid;
    grid-template-columns: 100px 1fr 380px;
    gap: 16px;
    padding: 16px;
    min-height: 520px;
}
@media (max-width: 1100px) {
    .editor-3pane { grid-template-columns: 90px 1fr 320px; }
}
@media (max-width: 880px) {
    .editor-3pane { grid-template-columns: 80px 1fr; }
    .form-pane { grid-column: 1 / -1; }
}

.ribbon {
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    max-height: 70vh;
    overflow-y: auto;
}
.ribbon-slide {
    position: relative;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    height: 68px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    transition: border-color .12s, background .12s;
}
.ribbon-slide:hover { border-color: var(--border-soft); }
.ribbon-slide.sel {
    border: 2px solid var(--purple);
    background: var(--purple-light);
}
.ribbon-slide.dragging  { opacity: 0.35; }
.ribbon-slide.drag-over { border: 2px dashed var(--purple); transform: scale(1.04); }
.rs-num {
    position: absolute;
    top: 3px;
    left: 5px;
    font-size: 10px;
    color: var(--text-mute);
    font-family: var(--font-mono);
    font-weight: 600;
}
.rs-typeicon {
    position: absolute;
    bottom: 3px;
    right: 5px;
    font-size: 11px;
}
.ribbon-add {
    background: transparent;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    padding: 10px;
    color: var(--text-mute);
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    font-family: var(--font-body);
    flex-shrink: 0;
}
.ribbon-add:hover { border-color: var(--purple); color: var(--purple-dark); }

.add-picker {
    /* position задаётся через JS (fixed) — чтобы не клипался overflow ленты */
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 6px;
    z-index: 1000;
    box-shadow: 0 8px 28px rgba(60,40,20,0.15);
    width: 280px;
}
.add-pick-title {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-mute);
    padding: 6px 10px 4px;
}
.add-pick-row {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 10px;
    align-items: center;
    padding: 7px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    border: none;
    background: transparent;
    text-align: left;
    width: 100%;
    font-family: var(--font-body);
}
.add-pick-row:hover { background: var(--cream-deep); }
.add-pick-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}
.add-pick-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    display: block;
}
.add-pick-desc {
    font-size: 11px;
    color: var(--text-mute);
    line-height: 1.2;
    margin-top: 2px;
    display: block;
}

.preview-pane, .form-pane {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
}
.preview-stage {
    flex: 1;
    background: var(--cream);
    background-image: radial-gradient(circle, rgba(120,80,40,0.08) 1px, transparent 1px);
    background-size: 16px 16px;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 24px;
    min-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.preview-stage:hover { border-color: var(--border-soft); }

.slide-card {
    background: var(--slide-bg, var(--white));
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 24px 26px;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.slide-type-chip {
    display: inline-flex;
    align-self: flex-start;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
}
.slide-card h2 {
    font-family: var(--font-heading);
    font-size: 28px;
    margin: 0;
    text-align: center;
    font-weight: 500;
    line-height: 1.2;
}
.slide-emoji-block {
    background: var(--cream-deep);
    border-radius: var(--r-lg);
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 84px;
    line-height: 1;
}

/* Intro/outro: heroic centered composition (без серой плашки) */
.slide-card.slide-hero {
    justify-content: center;
}
.hero-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
}
.hero-emoji {
    font-size: 92px;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
}
.hero-title {
    font-family: var(--font-heading);
    font-size: 38px;
    font-weight: 500;
    margin: 0;
    line-height: 1.1;
}
.slide-card.slide-hero .subtitle {
    text-align: center;
    color: var(--text-soft);
    margin: 0;
    white-space: pre-line;
    line-height: 1.5;
    font-size: 17px;
}
.slide-card .subtitle {
    text-align: center;
    font-size: 17px;
    color: var(--text-soft);
    margin: 0;
    white-space: pre-line;
    line-height: 1.5;
}
.slide-card .markdown {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
}
.slide-card .markdown strong { font-weight: 600; }
.slide-card .markdown em { font-style: italic; }
.slide-card .markdown code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--cream-deep);
    padding: 1px 6px;
    border-radius: 4px;
}

.form-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
}
.form-field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.form-field label .hint {
    font-weight: 400;
    color: var(--text-mute);
    font-size: 11px;
}
/* ============== CHECKIN ============== */
.checkin-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 0;
}
.checkin-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
}
.run-stage .checkin-label { font-size: 18px; }

.checkin-mood {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.checkin-emoji-btn {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 30px;
    cursor: pointer;
    transition: transform .12s, border-color .12s, background .12s;
    line-height: 1;
}
.checkin-emoji-btn:hover { transform: scale(1.05); border-color: var(--purple); }
.checkin-emoji-btn.selected {
    background: var(--purple-light);
    border-color: var(--purple);
}
.run-stage .checkin-emoji-btn { font-size: 44px; padding: 10px 18px; }

.checkin-week {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}
.checkin-month {
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-soft);
    padding: 4px 0;
    letter-spacing: 0.3px;
}
.run-stage .checkin-month { font-size: 18px; padding: 6px 0; }
.checkin-day {
    background: var(--white);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 8px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
    font-family: inherit;
}
.checkin-day:hover { border-color: var(--purple); }
.checkin-day.selected {
    background: var(--purple);
    border-color: var(--purple);
    color: var(--white);
}
.checkin-day-label {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0.8;
}
.checkin-day-num {
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
}
.run-stage .checkin-day { padding: 12px 4px; }
.run-stage .checkin-day-label { font-size: 12px; }
.run-stage .checkin-day-num { font-size: 24px; }

/* ============== POLL ============== */
.poll-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.poll-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
}
.poll-row:hover { background: var(--cream-deep); }
.poll-row.checked {
    background: var(--green-light);
    border-color: var(--green);
}
.poll-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border-soft);
    background: var(--white);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    flex-shrink: 0;
}
.poll-check.on {
    background: var(--green);
    border-color: var(--green);
}
.poll-text { flex: 1; }
.run-stage .poll-row { font-size: 18px; padding: 14px 18px; }
.run-stage .poll-check { width: 28px; height: 28px; font-size: 17px; }

/* ============== RATE ============== */
.rate-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.rate-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 0;
}
.rate-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    min-width: 110px;
}
.rate-faces {
    display: flex;
    gap: 6px;
}
.rate-face {
    font-size: 26px;
    opacity: 0.4;
    padding: 4px 6px;
}
.rate-face-btn {
    background: transparent;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 32px;
    cursor: pointer;
    transition: transform .12s, border-color .12s, background .12s;
    opacity: 0.5;
}
.rate-face-btn:hover { opacity: 1; transform: scale(1.1); }
.rate-face-btn.selected {
    opacity: 1;
    border-color: var(--purple);
    background: var(--purple-light);
}
.run-stage .rate-row { padding: 10px 0; gap: 16px; }
.run-stage .rate-label { font-size: 18px; min-width: 140px; }
.run-stage .rate-face-btn { font-size: 42px; padding: 6px 14px; }

/* Toggle строка в форме редактора */
.rate-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-soft);
}
.rate-toggle input[type=checkbox] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    margin: 0;
}
.rate-toggle:hover { color: var(--text); }

/* Form input.select */
.form-input.select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='%23888780' stroke-width='1.5'%3e%3cpath d='m4 6 4 4 4-4'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 14px;
    padding-right: 32px;
}

/* Layout-toggle для выбора раскладки open-задачи */
.layout-toggle {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
}
.layout-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-soft);
    transition: background .12s, border-color .12s;
}
.layout-btn:hover { background: var(--cream-deep); }
.layout-btn.active {
    border-color: var(--purple);
    border-width: 2px;
    padding: 8px 5px;
    background: var(--purple-light);
    color: var(--purple-dark);
    font-weight: 600;
}
.layout-icon {
    width: 36px;
    height: 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--white);
    border: 1px solid var(--border-soft);
    padding: 3px;
    border-radius: 4px;
}
.layout-icon.side { flex-direction: row; }
.layout-icon .li-row {
    background: var(--text-mute);
    height: 2.5px;
    border-radius: 1px;
}
.layout-icon .li-row.tall { height: 8px; margin-top: 2px; }
.layout-icon .li-row.huge { flex: 1; }
.layout-icon .li-col {
    flex: 1;
    background: var(--text-mute);
    border-radius: 2px;
}
.layout-btn.active .layout-icon { border-color: var(--purple); }
.layout-btn.active .layout-icon .li-row,
.layout-btn.active .layout-icon .li-col {
    background: var(--purple);
}

/* Раскладка task-open: side (вопрос слева, textarea справа) */
.task-open-side {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: stretch;
}
.task-open-side .left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
}
.task-open-side .right {
    display: flex;
    min-width: 0;
}
.task-open-side .right textarea.open-answer {
    width: 100%;
}
.run-stage .task-open-side {
    flex: 1;
    min-height: 0;
}
.run-stage .task-open-side .left { overflow-y: auto; }
.run-stage .task-open-side .right textarea.open-answer {
    height: 100%;
    max-height: 100%;
    min-height: 0;
    resize: none;
}

/* Раскладка task-open: full (вопрос мелкий сверху, textarea на весь слайд) */
.task-open-full .top-line {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.task-open-full .top-line h2 {
    font-size: 18px !important;
    margin: 0;
    line-height: 1.2;
    font-weight: 600;
}
.task-open-full .top-line .task-word-chips {
    margin-top: 0;
}
.run-stage .slide-card.task-open-full > textarea.open-answer {
    flex: 1;
    height: auto;
    min-height: 200px;
    max-height: none;
}
.run-stage .slide-card.task-open-full .top-line h2 {
    font-size: clamp(16px, 1.6vw, 22px) !important;
}

.row-type-emoji {
    display: grid;
    grid-template-columns: 1fr 60px;
    gap: 8px;
}
.form-field-emoji {
    height: 38px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
}
.form-field-emoji:hover { background: var(--cream-deep); }

textarea.form-input { resize: vertical; min-height: 38px; padding: 8px 14px; line-height: 1.5; }

.form-pane-foot {
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
}
.form-pane-foot button { width: auto; }

/* ============== TASK / SUBTYPES ============== */

.subtype-pills {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}
.subtype-pill {
    padding: 5px 12px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
}
.subtype-pill.active {
    background: var(--green-light);
    color: var(--green-dark);
    border-color: var(--green);
}
.subtype-pill:hover:not(.active) { background: var(--cream-deep); }

.list-add-btn {
    background: transparent;
    border: 1.5px dashed var(--border-soft);
    border-radius: var(--r-md);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-mute);
    cursor: pointer;
    width: 100%;
    font-family: var(--font-body);
    font-weight: 600;
    margin-top: 4px;
}
.list-add-btn:hover { border-color: var(--purple); color: var(--purple-dark); }
.list-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.x-btn {
    background: transparent;
    border: none;
    color: var(--text-mute);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    line-height: 1;
    width: 24px;
    height: 24px;
    border-radius: 4px;
}
.x-btn:hover { color: var(--red); background: var(--red-light); }

.opt-edit-row {
    display: grid;
    grid-template-columns: 22px 1fr 28px;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
}
.opt-edit-row input[type=radio] {
    width: 16px; height: 16px;
    accent-color: var(--green-dark);
    cursor: pointer;
    margin: 0;
    justify-self: center;
}

.pair-edit-row {
    display: grid;
    grid-template-columns: 1fr 18px 1fr 28px;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
}
.pair-edit-row .arrow { color: var(--text-mute); text-align: center; font-size: 13px; }

.word-edit-row {
    display: grid;
    grid-template-columns: 24px 1fr 28px;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
}
.word-order-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-align: center;
    background: var(--cream-deep);
    border-radius: 4px;
    padding: 2px 0;
}

/* === Preview: task subtypes === */

.task-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.task-option-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 9px 14px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.task-option-letter {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--purple);
    width: 18px;
}
.task-option-box.correct {
    background: var(--green-light);
    border-color: var(--green);
}
.task-option-box.correct .task-option-letter { color: var(--green-dark); }

.task-pairs {
    display: grid;
    grid-template-columns: 1fr 18px 1fr;
    gap: 8px 12px;
    align-items: center;
}
.task-pair-side {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 8px 12px;
    text-align: center;
    font-size: 14px;
}
.task-pairs .arrow { color: var(--text-mute); text-align: center; font-size: 14px; }

.task-sentence {
    font-size: 17px;
    line-height: 1.8;
    color: var(--text);
    margin: 0;
}
.task-blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 2px dashed var(--border-soft);
    text-align: center;
    color: var(--text-mute);
    padding: 0 8px;
    margin: 0 4px;
    font-style: italic;
    font-size: 14px;
}

.task-target-line {
    border: 1.5px dashed var(--border-soft);
    border-radius: var(--r-md);
    min-height: 44px;
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    color: var(--text-mute);
    font-size: 12px;
    font-style: italic;
}
.task-word-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.task-word-chip {
    background: var(--cream-deep);
    padding: 6px 14px;
    border-radius: var(--r-pill);
    font-size: 14px;
    color: var(--text);
    cursor: grab;
}

.task-check-btn {
    align-self: flex-start;
    background: var(--purple-light);
    color: var(--purple-dark);
    border: none;
    padding: 6px 16px;
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
}

.task-instruction {
    font-size: 13px;
    color: var(--text-mute);
    margin: 0;
}

.editor-warning {
    background: var(--orange-light);
    color: var(--orange-dark);
    padding: 8px 12px;
    border-radius: var(--r-sm);
    font-size: 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 6px;
}

/* ============== RUN MODE ============== */

.run-shell {
    position: fixed;
    inset: 0;
    background: var(--cream);
    background-image: radial-gradient(circle, rgba(120,80,40,0.10) 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: 200;
    display: flex;
    flex-direction: row;
    padding: 14px;
    gap: 14px;
    overflow: hidden;
}
.run-ribbon {
    width: 180px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    padding-right: 4px;
}
.run-ribbon-slide {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 10px 10px;
    min-height: 58px;
    text-align: left;
    transition: border-color .12s, background .12s, transform .1s;
    overflow: hidden;
    flex-shrink: 0;
}
.run-ribbon-slide:hover { transform: translateX(2px); }
.run-ribbon-slide.current {
    border: 2px solid var(--purple);
    background: var(--purple-light);
}
.run-ribbon-slide .rs-head {
    display: flex;
    align-items: center;
    gap: 6px;
}
.run-ribbon-slide .rs-num {
    font-size: 11px;
    color: var(--text-mute);
    font-family: var(--font-mono);
    font-weight: 600;
    min-width: 14px;
}
.run-ribbon-slide .rs-emoji {
    font-size: 17px;
    line-height: 1;
}
.run-ribbon-slide .rs-title {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
}
.run-ribbon-slide.current .rs-title {
    color: var(--purple-dark);
    font-weight: 700;
}

.run-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
    overflow: hidden;
}

.run-progress {
    height: 6px;
    background: var(--cream-deep);
    border-radius: var(--r-pill);
    overflow: hidden;
    flex-shrink: 0;
}
.run-progress-bar {
    height: 100%;
    background: var(--purple);
    border-radius: var(--r-pill);
    transition: width .3s ease-out;
}
.run-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6px;
    gap: 14px;
    flex-shrink: 0;
}
.run-counter {
    font-size: 14px;
    color: var(--text-soft);
    font-weight: 600;
}
.run-student-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--purple-light);
    color: var(--purple-dark);
    padding: 5px 14px 5px 5px;
    border-radius: var(--r-pill);
    font-size: 14px;
    font-weight: 600;
}
.run-student-chip .avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--purple);
    color: var(--white);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
}
.run-close {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-size: 18px;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.run-close:hover { background: var(--cream-deep); }

.run-stage {
    flex: 1;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 8px;
    min-height: 0;
    overflow: hidden;
}
.run-stage .slide-card {
    max-width: 1200px;
    width: 100%;
    height: 100%;
    padding: 28px 40px;
    gap: 16px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}
.run-stage .slide-type-chip { flex-shrink: 0; align-self: flex-start; }
.run-stage .slide-card h2 {
    font-size: clamp(24px, 2.6vw, 34px);
    line-height: 1.2;
    flex-shrink: 0;
}
.run-stage .slide-emoji-block {
    flex: 1;
    min-height: 200px;
    font-size: clamp(80px, 16vh, 160px);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Hero (intro/outro) в run-mode — увеличиваем всё */
.run-stage .slide-card.slide-hero {
    justify-content: center;
}
.run-stage .hero-emoji {
    font-size: clamp(140px, 28vh, 280px);
}
.run-stage .hero-title {
    font-size: clamp(38px, 5vw, 64px);
}
.run-stage .slide-card.slide-hero .subtitle {
    font-size: clamp(20px, 2.2vw, 28px);
    line-height: 1.45;
}
.run-stage .slide-card .subtitle {
    font-size: clamp(16px, 1.8vw, 22px);
    line-height: 1.45;
    flex-shrink: 0;
}
.run-stage .slide-card .task-instruction {
    font-size: 18px;
    line-height: 1.5;
    flex-shrink: 0;
}
.run-stage .task-options,
.run-stage .task-word-chips {
    flex-shrink: 0;
}
.run-stage textarea.open-answer {
    width: 100%;
    height: 220px;
    min-height: 120px;
    max-height: 50vh;
    padding: 14px 18px;
    font-size: 18px;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    font-family: var(--font-body);
    background: var(--cream);
    resize: vertical;
    line-height: 1.5;
    flex-shrink: 0;
}
.run-stage textarea.open-answer:focus {
    border-style: solid;
    border-color: var(--purple);
    background: var(--white);
    outline: none;
}
.run-stage .video-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    max-height: calc(100vh - 280px);
    margin: 0 auto;
    position: relative;
    flex-shrink: 0;
}
.run-stage .video-wrap iframe,
.run-stage .video-wrap .video-placeholder {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 14px;
}
.run-stage .video-wrap .video-placeholder {
    background: var(--cream-deep);
    color: var(--text-mute);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
}
.run-stage .deck-card-block {
    background: var(--cream-deep);
    border-radius: 18px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    justify-content: center;
    min-height: 240px;
    flex-shrink: 0;
}
.run-stage .task-option-box {
    cursor: pointer;
    padding: 14px 20px;
    font-size: 17px;
    transition: background .15s, border-color .15s;
}
.run-stage .task-option-box:hover { background: var(--white); }
.run-stage .task-option-box.selected {
    border-color: var(--purple) !important;
    border-width: 2px !important;
    background: var(--purple-light);
}
.run-stage .task-option-box.revealed-correct {
    background: var(--green-light);
    border-color: var(--green);
    border-width: 2px;
}
.run-stage .task-option-box.revealed-wrong {
    background: var(--red-light);
    border-color: var(--red-mid);
    border-width: 2px;
}
.run-stage .task-pair-side {
    cursor: pointer;
    padding: 14px 18px;
    font-size: 17px;
    transition: background .15s, border-color .15s;
}
.run-stage .task-pair-side:hover { background: var(--white); }
.run-stage .task-pair-side.selected {
    border-color: var(--purple) !important;
    border-width: 2px !important;
    background: var(--purple-light);
}
.run-stage .task-pair-side.matched {
    background: var(--green-light);
    border-color: var(--green);
}
.task-pair-num {
    display: inline-block;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--purple);
    color: var(--white);
    font-size: 11px;
    line-height: 22px;
    text-align: center;
    margin-right: 8px;
    font-weight: 700;
}
.run-stage textarea.open-answer {
    width: 100%;
    min-height: 100px;
    padding: 14px 18px;
    font-size: 18px;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    font-family: var(--font-body);
    background: var(--cream);
    resize: vertical;
    line-height: 1.5;
}
.run-stage textarea.open-answer:focus {
    border-style: solid;
    border-color: var(--purple);
    background: var(--white);
    outline: none;
}

.run-bottombar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 0 6px;
    flex-shrink: 0;
}
.run-nav {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-size: 26px;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.run-nav:hover { background: var(--cream-deep); }
.run-nav.next {
    background: var(--purple);
    color: var(--white);
    border: none;
}
.run-nav.next:hover { background: var(--purple-dark); }
.run-nav:disabled { opacity: 0.3; cursor: not-allowed; }

.run-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}
.run-timer {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    padding: 5px 12px 5px 14px;
}
.run-timer .clock-icon { color: var(--orange-dark); font-size: 16px; }
.run-timer .time {
    font-family: var(--font-mono);
    font-size: 17px;
    font-weight: 600;
    min-width: 50px;
    text-align: center;
}
.run-timer .time.warn { color: var(--red); }
.run-timer .timer-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--orange-light);
    border: none;
    color: var(--orange-dark);
    cursor: pointer;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.run-points {
    border: none;
    padding: 10px 16px;
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
    font-size: 15px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-body);
    transition: transform .12s;
}
.run-points:active { transform: scale(0.94); }
.run-points.p1  { background: var(--green-light); color: var(--green-dark); }
.run-points.p5  { background: #C0DD97; color: #173404; }
.run-points.p10 { background: var(--green); color: var(--white); }

.run-notes-tab {
    background: transparent;
    border: 1px dashed var(--border-soft);
    border-radius: var(--r-md);
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text-mute);
    cursor: pointer;
    align-self: center;
    font-family: var(--font-body);
    font-weight: 600;
    flex-shrink: 0;
}
.run-notes-tab:hover { background: var(--white); color: var(--text-soft); }
.run-notes-drawer {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 18px;
    max-height: 28vh;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    flex-shrink: 0;
}
.run-notes-drawer .empty { color: var(--text-mute); font-style: italic; }

.points-flash {
    position: fixed;
    pointer-events: none;
    font-size: 64px;
    font-weight: 800;
    color: var(--green);
    z-index: 9999;
    animation: pointsFlash 1s ease-out forwards;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
@keyframes pointsFlash {
    0%   { opacity: 0; transform: translateY(0) scale(0.5); }
    25%  { opacity: 1; transform: translateY(-20px) scale(1.3); }
    100% { opacity: 0; transform: translateY(-100px) scale(1); }
}

.run-iframe-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.run-iframe-modal iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: var(--r-lg);
    background: white;
    max-width: 1500px;
    max-height: none;
}
.run-iframe-modal .close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    border: none;
    cursor: pointer;
    font-size: 20px;
}

/* ============== EMPTY / LOADING ============== */

.empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-mute);
}
.empty .emoji { font-size: 48px; margin-bottom: 12px; }
.empty .title {
    font-family: var(--font-heading);
    font-size: 18px;
    color: var(--text);
    margin-bottom: 6px;
}

.loader {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-mute);
    font-size: 13px;
}

/* ============== UTILS ============== */

.hidden { display: none !important; }
.muted { color: var(--text-mute); }
.kicker { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-mute); }

/* ============== TOAST ============== */

#toastContainer {
    position: fixed;
    top: 80px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
}
.toast {
    background: var(--text);
    color: var(--white);
    padding: 10px 16px;
    border-radius: var(--r-md);
    font-size: 13px;
    max-width: 320px;
    pointer-events: auto;
    animation: toastIn .25s ease-out;
}
.toast.error { background: var(--red); }
.toast.success { background: var(--green); }
@keyframes toastIn {
    from { transform: translateX(20px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
}


/* ============ CANVAS SLIDE (модель B — холст с блоками в meta.blocks) ============ */
.cv-edit-wrap { width: 100%; cursor: default; }
.cv-chip-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.cv-hint { font-size: 12px; color: var(--text-mute); }
.cv-frame { position: relative; width: 100%; background: var(--white); border: 1px solid var(--border); border-radius: var(--r-md); overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.cv-stage { position: absolute; top: 0; left: 0; width: 1280px; height: 720px; transform-origin: top left; background: #FFFFFF; }
.cv-stage.drop { outline: 4px dashed var(--purple); outline-offset: -4px; }
.cv-empty-hint { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--text-mute); font-size: 46px; text-align: center; pointer-events: none; font-family: var(--font-heading); }
.cv-empty-hint span { font-size: 24px; }
.cv-block { position: absolute; box-sizing: border-box; cursor: move; user-select: none; }
.cv-block.sel { outline: 2px solid var(--purple); outline-offset: 1px; }
.cv-block .cv-text, .cv-rblock .cv-text { width: 100%; height: 100%; overflow: hidden; line-height: 1.15; font-family: var(--font-heading); white-space: pre-wrap; word-break: break-word; padding: 2px 6px; box-sizing: border-box; }
.cv-block .cv-img, .cv-rblock .cv-img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
.cv-img-empty { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; background: var(--cream-deep); border: 2px dashed var(--border-soft); border-radius: 10px; color: var(--text-mute); font-size: 44px; text-align: center; font-family: var(--font-body); }
.cv-img-empty span { font-size: 18px; }
.cv-block .cv-shape, .cv-rblock .cv-shape { width: 100%; height: 100%; box-sizing: border-box; }
.cv-hotspot { width: 100%; height: 100%; box-sizing: border-box; border: 3px dashed var(--orange); background: rgba(186,117,23,0.10); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
.cv-hot-tag { font-family: var(--font-heading); color: var(--orange-dark); font-size: 22px; }
.cv-hot-peek { font-family: var(--font-body); color: var(--orange); font-size: 18px; opacity: .8; }
.cv-handle { position: absolute; width: 16px; height: 16px; background: var(--white); border: 2px solid var(--purple); border-radius: 50%; }
.cv-handle.nw { left: -8px; top: -8px; }
.cv-handle.ne { right: -8px; top: -8px; }
.cv-handle.sw { left: -8px; bottom: -8px; }
.cv-handle.se { right: -8px; bottom: -8px; cursor: nwse-resize; }
/* form side */
.cv-add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cv-add-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 6px; background: var(--cream-deep); border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer; font-size: 26px; font-family: var(--font-body); transition: .12s; }
.cv-add-btn:hover { border-color: var(--purple); background: var(--purple-light); }
.cv-add-btn span { font-size: 13px; color: var(--text-soft); }
.cv-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.cv-prop-head { display: flex; align-items: center; justify-content: space-between; margin: 8px 0 10px; padding-top: 12px; border-top: 1px solid var(--border); font-family: var(--font-heading); color: var(--purple-dark); font-size: 15px; }
.cv-z-btns { display: flex; gap: 4px; }
.cv-prop-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cv-color { padding: 2px; height: 38px; cursor: pointer; }
.btn-xs { padding: 3px 9px; font-size: 14px; min-width: 32px; }
/* run mode */
.cv-run-wrap { width: 100%; display: flex; justify-content: center; }
.cv-run-frame { max-width: 1040px; }
.cv-rblock { position: absolute; box-sizing: border-box; }
.cv-hotspot-run { cursor: pointer; border-radius: 14px; transition: .15s; display: flex; align-items: center; justify-content: center; }
.cv-hotspot-run:hover { background: rgba(186,117,23,0.08); }
.cv-hotspot-run.on { background: rgba(99,153,34,0.18); box-shadow: 0 0 0 4px var(--green); }
.cv-hot-reveal { font-family: var(--font-heading); color: var(--green-dark); font-size: 30px; background: rgba(255,255,255,0.88); padding: 6px 16px; border-radius: var(--r-pill); }
/* image placement modal */
.cv-img-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 24px; }
.cv-img-card { position: relative; background: var(--white); border-radius: var(--r-lg); padding: 22px; width: 100%; max-width: 440px; box-shadow: 0 18px 50px rgba(0,0,0,.25); }
.cv-img-x { position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 50%; background: var(--cream-deep); border: none; cursor: pointer; font-size: 16px; color: var(--text-soft); }
.cv-img-prev { width: 100%; height: 150px; background: var(--cream-deep); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 14px; }
.cv-img-prev img { max-width: 100%; max-height: 100%; object-fit: contain; }
.cv-img-q { font-family: var(--font-heading); font-size: 18px; color: var(--text); margin-bottom: 14px; }
.cv-img-opts { display: flex; flex-direction: column; gap: 8px; }
.cv-img-opt { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--cream); border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer; text-align: left; transition: .12s; }
.cv-img-opt:hover { border-color: var(--purple); background: var(--purple-light); }
.cv-img-opt .ico { font-size: 26px; flex: none; }
.cv-img-opt .tx { display: flex; flex-direction: column; gap: 2px; }
.cv-img-opt .tx b { font-family: var(--font-body); font-weight: 700; font-size: 15px; color: var(--text); }
.cv-img-opt .tx i { font-style: normal; font-size: 12px; color: var(--text-mute); }
/* check-in: крупные, но влезает в окно */
.run-stage .checkin-run-card { gap: 14px; padding: 24px 40px; }
.run-stage .checkin-run-card h2 { font-size: 28px; }
.run-stage .checkin-run-card .checkin-block.run { padding: 6px 0; gap: 10px; }
.run-stage .checkin-run-card .checkin-label { font-size: 19px; }
.run-stage .checkin-run-card .checkin-month { font-size: 18px; padding: 4px 0; }
.run-stage .checkin-run-card .checkin-mood.run { gap: 12px; }
.run-stage .checkin-run-card .checkin-emoji-btn { font-size: 42px; padding: 12px 18px; border-radius: 14px; }
.run-stage .checkin-run-card .checkin-week.run { gap: 8px; }
.run-stage .checkin-run-card .checkin-day { padding: 12px 4px; }
.run-stage .checkin-run-card .checkin-day-num { font-size: 24px; }
.run-stage .checkin-run-card .checkin-day-label { font-size: 12px; }
/* rate slide — крупные карточки, 2 сверху + 1 по центру снизу */
.rate2-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 14px 0; }
.rate2-card { flex: 0 1 400px; max-width: 460px; background: var(--cream); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 28px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.rate2-label { font-family: var(--font-heading); font-size: 24px; color: var(--text); text-align: center; }
.rate2-faces { display: flex; gap: 16px; }
.rate2-face { width: 88px; height: 88px; border-radius: 50%; border: 2px solid var(--border); background: var(--white); font-size: 46px; line-height: 1; cursor: pointer; transition: transform .12s, border-color .12s, background .12s, filter .12s, opacity .12s; display: flex; align-items: center; justify-content: center; filter: grayscale(0.55); opacity: 0.62; }
.rate2-face:hover { transform: scale(1.1); filter: none; opacity: 1; }
.rate2-face.selected { filter: none; opacity: 1; transform: scale(1.08); }
.rate2-face.bad.selected  { background: var(--red-light);    border-color: var(--red); }
.rate2-face.mid.selected  { background: var(--orange-light); border-color: var(--orange); }
.rate2-face.good.selected { background: var(--green-light);  border-color: var(--green); }
.rate2-foot { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 12px; }
.rate2-thanks { color: var(--green-dark); font-size: 14px; font-weight: 700; }
/* deck: game-mode pills + play button */
.deck-mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.deck-mode-pill { display: flex; align-items: center; gap: 6px; padding: 10px 12px; background: var(--cream-deep); border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer; font-family: var(--font-body); font-size: 14px; color: var(--text); text-align: left; transition: .12s; }
.deck-mode-pill:hover { border-color: var(--purple); background: var(--purple-light); }
.deck-mode-pill.sel { background: var(--purple); border-color: var(--purple); color: var(--white); font-weight: 700; }
.deck-play-btn { margin-top: 14px; display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; font-family: var(--font-heading); font-size: 22px; color: var(--white); background: var(--purple); border: none; border-radius: var(--r-pill); cursor: pointer; box-shadow: 0 6px 18px rgba(127,119,221,.4); transition: transform .12s, box-shadow .12s; }
.deck-play-btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 10px 26px rgba(127,119,221,.5); }
.deck-play-btn .dp-emoji { font-size: 28px; }

/* check-in audio recorder modal */
.ck-audio-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 600; display: flex; align-items: center; justify-content: center; padding: 24px; }
.cka-card { position: relative; background: var(--white); border-radius: var(--r-lg); padding: 24px; width: 100%; max-width: 560px; max-height: 86vh; display: flex; flex-direction: column; box-shadow: 0 18px 50px rgba(0,0,0,.25); }
.cka-x { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%; background: var(--cream-deep); border: none; cursor: pointer; font-size: 16px; color: var(--text-soft); }
.cka-head { font-family: var(--font-heading); font-size: 20px; color: var(--text); }
.cka-sub { font-size: 13px; color: var(--text-mute); margin: 6px 0 14px; }
.cka-scroll { overflow-y: auto; padding-right: 4px; }
.cka-group-title { font-family: var(--font-heading); font-size: 14px; color: var(--purple-dark); margin: 14px 0 8px; }
.cka-grid { display: flex; flex-direction: column; gap: 6px; }
.cka-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--cream); border: 1px solid var(--border); border-radius: var(--r-md); }
.cka-item.has { border-color: var(--green); background: var(--green-light); }
.cka-emoji { font-size: 22px; flex: none; width: 26px; text-align: center; }
.cka-word { flex: 1; font-size: 15px; color: var(--text); }
.cka-status { font-size: 12px; color: var(--text-mute); min-width: 64px; text-align: right; }
.cka-item.has .cka-status { color: var(--green-dark); }
.cka-btns { display: flex; gap: 4px; flex: none; }
.cka-b { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; padding: 0; }
.cka-b:hover:not(:disabled) { border-color: var(--purple); }
.cka-b:disabled { opacity: 0.35; cursor: default; }
.cka-b.active { background: var(--red); border-color: var(--red); color: var(--white); animation: ckaPulse 1s infinite; }
@keyframes ckaPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
/* lesson types */
.lesson-type-sel { font-family: var(--font-body); font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--white); color: var(--text); cursor: pointer; }
.lesson-type-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: var(--r-pill); background: var(--purple-light); color: var(--purple-dark); font-weight: 600; font-size: 12px; }
/* canvas bg color swatches */
.cv-swatch-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }

/* ================================================================
   Своя озвучка чек-ина: файлы в classroom-media/checkin-audio/{key}.{ext}
   В уроке играет файл, если есть; иначе — системный синтез речи.
   ================================================================ */
const CHECKIN_AUDIO_ITEMS = [
    ...CHECKIN_MOODS.map(m => ({ group: 'Настроение', key: m.key, word: m.say, emoji: m.emoji })),
    ...['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday']
        .map(d => ({ group: 'Дни недели', key: d, word: d[0].toUpperCase() + d.slice(1), emoji: '📅' })),
    ...CHECKIN_WEATHER.map(w => ({ group: 'Погода', key: w.key, word: w.say, emoji: w.emoji }))
];

let checkinAudioMap = {};

async function loadCheckinAudioMap() {
    try {
        const { data, error } = await sb.storage.from('classroom-media').list('checkin-audio', { limit: 300 });
        if (error) throw error;
        const map = {};
        (data || []).forEach(f => {
            if (!f.name || f.name.startsWith('.')) return;
            const key = f.name.replace(/\.[^.]+$/, '');
            map[key] = sb.storage.from('classroom-media').getPublicUrl('checkin-audio/' + f.name).data.publicUrl;
        });
        checkinAudioMap = map;
    } catch (_) { /* нет select-политики или пусто — тихо фолбэк на синтез */ }
}

function playCheckinAudio(audioKey, fallbackWord) {
    const tryUrl = (url, onFail) => {
        try {
            const a = new Audio(url);
            const p = a.play();
            if (p && p.catch) p.catch(onFail);
        } catch (_) { onFail(); }
    };
    const mapped = checkinAudioMap[audioKey];
    if (mapped) { tryUrl(mapped, () => speak(fallbackWord)); return; }
    // Фолбэк по соглашению: checkin-audio/{key}.mp3 — работает и без list()/select-политики
    const conv = sb.storage.from('classroom-media').getPublicUrl('checkin-audio/' + audioKey + '.mp3').data.publicUrl;
    tryUrl(conv, () => speak(fallbackWord));
}

/* ---------- Рекордер (редактор) ---------- */
let _ckRec = null; // { recorder, stream, key, word }

async function openCheckinAudioModal() {
    await loadCheckinAudioMap();
    const modal = document.createElement('div');
    modal.className = 'ck-audio-modal';
    modal.id = 'ckAudioModal';
    modal.innerHTML = renderCheckinAudioModal();
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) closeCheckinAudioModal(); });
}

function closeCheckinAudioModal() {
    if (_ckRec && _ckRec.stream) _ckRec.stream.getTracks().forEach(t => t.stop());
    _ckRec = null;
    const m = document.getElementById('ckAudioModal');
    if (m) m.remove();
}

function ckRefresh() {
    const m = document.getElementById('ckAudioModal');
    if (m) m.innerHTML = renderCheckinAudioModal();
}

function renderCheckinAudioModal() {
    const groups = {};
    CHECKIN_AUDIO_ITEMS.forEach(it => { (groups[it.group] = groups[it.group] || []).push(it); });
    let body = '';
    Object.keys(groups).forEach(g => {
        body += `<div class="cka-group-title">${g}</div><div class="cka-grid">`;
        groups[g].forEach(it => {
            const has = !!checkinAudioMap[it.key];
            const rec = _ckRec && _ckRec.key === it.key;
            body += `
                <div class="cka-item ${has ? 'has' : ''}">
                    <span class="cka-emoji">${it.emoji}</span>
                    <span class="cka-word">${esc(it.word)}</span>
                    <span class="cka-status">${rec ? '● запись…' : (has ? '✓ есть' : '')}</span>
                    <div class="cka-btns">
                        <button class="cka-b" title="Прослушать" ${has ? '' : 'disabled'} onclick="ckPlay('${it.key}')">▶</button>
                        <button class="cka-b ${rec ? 'active' : ''}" title="Записать с микрофона" onclick="ckToggleRecord('${it.key}', '${esc(it.word)}')">${rec ? '■' : '🎙'}</button>
                        <button class="cka-b" title="Загрузить файл" onclick="ckUpload('${it.key}')">📁</button>
                        <button class="cka-b" title="Удалить" ${has ? '' : 'disabled'} onclick="ckDelete('${it.key}')">🗑</button>
                    </div>
                </div>`;
        });
        body += `</div>`;
    });
    return `
        <div class="cka-card">
            <button class="cka-x" onclick="closeCheckinAudioModal()">✕</button>
            <div class="cka-head">🎙 Своя озвучка чек-ина</div>
            <div class="cka-sub">Запиши голос с микрофона (🎙) или загрузи готовый файл (📁) для каждого слова. В уроке будет играть твой файл, иначе — системный голос.</div>
            <div class="cka-scroll">${body}</div>
        </div>`;
}

function ckPlay(key) {
    const url = checkinAudioMap[key];
    if (url) { try { new Audio(url).play(); } catch (_) {} }
}

async function ckToggleRecord(key, word) {
    if (_ckRec && _ckRec.key === key) { ckStopRecord(); return; }
    if (_ckRec) ckStopRecord();
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        let mime = '';
        if (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/webm')) mime = 'audio/webm';
        else if (window.MediaRecorder && MediaRecorder.isTypeSupported('audio/mp4')) mime = 'audio/mp4';
        const rec = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
        const chunks = [];
        rec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
        rec.onstop = async () => {
            const type = rec.mimeType || mime || 'audio/webm';
            const blob = new Blob(chunks, { type });
            try { stream.getTracks().forEach(t => t.stop()); } catch (_) {}
            const ext = type.includes('mp4') ? 'm4a' : (type.includes('ogg') ? 'ogg' : 'webm');
            await ckUploadBlob(key, blob, ext);
        };
        _ckRec = { recorder: rec, stream, key, word };
        rec.start();
        ckRefresh();
    } catch (e) {
        toast('Нет доступа к микрофону: ' + (e.message || e), 'error');
    }
}

function ckStopRecord() {
    if (_ckRec && _ckRec.recorder && _ckRec.recorder.state !== 'inactive') {
        _ckRec.recorder.stop();
    }
}

function ckUpload(key) {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'audio/*';
    inp.onchange = async () => {
        const f = inp.files && inp.files[0];
        if (!f) return;
        const ext = (f.name.split('.').pop() || 'mp3').toLowerCase().replace(/[^a-z0-9]/g, '') || 'mp3';
        await ckUploadBlob(key, f, ext);
    };
    inp.click();
}

async function ckDeleteFiles(key) {
    try {
        const { data } = await sb.storage.from('classroom-media').list('checkin-audio', { limit: 300 });
        const toRemove = (data || []).filter(f => f.name.replace(/\.[^.]+$/, '') === key).map(f => 'checkin-audio/' + f.name);
        if (toRemove.length) await sb.storage.from('classroom-media').remove(toRemove);
    } catch (_) {}
}

async function ckUploadBlob(key, blob, ext) {
    toast('Сохраняю озвучку…', 'info');
    try {
        await ckDeleteFiles(key);
        const path = 'checkin-audio/' + key + '.' + ext;
        const { error } = await sb.storage.from('classroom-media').upload(path, blob, { contentType: blob.type || 'audio/' + ext, upsert: true });
        if (error) throw error;
        _ckRec = null;
        await loadCheckinAudioMap();
        ckRefresh();
        toast('Готово', 'success');
    } catch (e) {
        _ckRec = null;
        console.error('checkin audio upload', e);
        toast('Не загрузилось: ' + (e.message || e), 'error');
        ckRefresh();
    }
}

async function ckDelete(key) {
    await ckDeleteFiles(key);
    await loadCheckinAudioMap();
    ckRefresh();
    toast('Удалено', 'success');
}


/* ================================================================
   Импорт PPTX → canvas-слайды с редактируемыми блоками
   (клиентский разбор zip+XML; текст и картинки с координатами).
   Не поддерживается пока: таблицы, чарты, SmartArt, группы,
   векторные emf/wmf-картинки — такие элементы пропускаются.
   ================================================================ */
const PPTX_EMU_PER_PX = 9525;
const PPTX_IMG_EXTS = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp', 'svg'];
let _jszipPromise = null;

function ensureJSZip() {
    if (window.JSZip) return Promise.resolve(window.JSZip);
    if (_jszipPromise) return _jszipPromise;
    _jszipPromise = new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload = () => res(window.JSZip);
        s.onerror = () => rej(new Error('Не удалось загрузить JSZip'));
        document.head.appendChild(s);
    });
    return _jszipPromise;
}

function _px(parseXmlStr) { return new DOMParser().parseFromString(parseXmlStr, 'application/xml'); }
function _findAll(node, ln, out) {
    out = out || [];
    if (!node || !node.childNodes) return out;
    for (let i = 0; i < node.childNodes.length; i++) {
        const c = node.childNodes[i];
        if (c.nodeType === 1) { if (c.localName === ln) out.push(c); _findAll(c, ln, out); }
    }
    return out;
}
function _findFirst(node, ln) { const a = _findAll(node, ln); return a.length ? a[0] : null; }
function _children(node, ln) {
    const out = [];
    if (!node || !node.childNodes) return out;
    for (let i = 0; i < node.childNodes.length; i++) {
        const c = node.childNodes[i];
        if (c.nodeType === 1 && c.localName === ln) out.push(c);
    }
    return out;
}
function _attr(node, name) {
    if (!node || !node.attributes) return null;
    for (let i = 0; i < node.attributes.length; i++) {
        const a = node.attributes[i];
        if (a.localName === name || a.name === name) return a.value;
    }
    return null;
}
function _xfrm(sp) {
    const xf = _findFirst(sp, 'xfrm'); if (!xf) return null;
    const off = _children(xf, 'off')[0] || _findFirst(xf, 'off');
    const ext = _children(xf, 'ext')[0] || _findFirst(xf, 'ext');
    if (!off || !ext) return null;
    const x = parseInt(_attr(off, 'x')), y = parseInt(_attr(off, 'y'));
    const cx = parseInt(_attr(ext, 'cx')), cy = parseInt(_attr(ext, 'cy'));
    if (![x, y, cx, cy].every(n => Number.isFinite(n))) return null;
    return { x, y, w: cx, h: cy };
}
function _pptxFit(cx, cy) {
    const wpx = cx / PPTX_EMU_PER_PX, hpx = cy / PPTX_EMU_PER_PX;
    const s = Math.min(CANVAS_W / wpx, CANVAS_H / hpx);
    return { scale: s, offX: (CANVAS_W - wpx * s) / 2, offY: (CANVAS_H - hpx * s) / 2 };
}
function _mapRect(r, fit) {
    return {
        x: Math.round(fit.offX + (r.x / PPTX_EMU_PER_PX) * fit.scale),
        y: Math.round(fit.offY + (r.y / PPTX_EMU_PER_PX) * fit.scale),
        w: Math.round((r.w / PPTX_EMU_PER_PX) * fit.scale),
        h: Math.round((r.h / PPTX_EMU_PER_PX) * fit.scale)
    };
}
function _pptxText(sp) {
    const paras = _findAll(sp, 'p');
    const lines = [];
    let color = null, sizePt = null, bold = false, align = null;
    for (const p of paras) {
        const pPr = _children(p, 'pPr')[0];
        if (pPr && !align) align = _attr(pPr, 'algn');
        let line = '';
        for (const r of _children(p, 'r')) {
            const t = _children(r, 't')[0];
            if (t && t.textContent != null) line += t.textContent;
            const rPr = _children(r, 'rPr')[0];
            if (rPr) {
                if (sizePt == null && _attr(rPr, 'sz')) sizePt = parseInt(_attr(rPr, 'sz')) / 100;
                if (_attr(rPr, 'b') === '1') bold = true;
                if (!color) { const sf = _findFirst(rPr, 'srgbClr'); if (sf) color = '#' + _attr(sf, 'val'); }
            }
        }
        lines.push(line);
    }
    const text = lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
    const am = { l: 'left', ctr: 'center', r: 'right', just: 'left' };
    return { text, color, sizePt, bold, align: am[align] || 'left' };
}
function _parseRels(str) {
    const map = {};
    if (!str) return map;
    _findAll(_px(str), 'Relationship').forEach(rel => {
        const id = _attr(rel, 'Id'), tgt = _attr(rel, 'Target');
        if (id && tgt) map[id] = tgt;
    });
    return map;
}
function _blipEmbed(node) {
    const blip = _findFirst(node, 'blip'); if (!blip) return null;
    for (let k = 0; k < blip.attributes.length; k++) if (blip.attributes[k].localName === 'embed') return blip.attributes[k].value;
    return null;
}

async function parsePptxBrowser(zip) {
    const presStr = await zip.file('ppt/presentation.xml').async('string');
    const presRelsF = zip.file('ppt/_rels/presentation.xml.rels');
    const rels = _parseRels(presRelsF ? await presRelsF.async('string') : '');
    const pres = _px(presStr);
    const sldSz = _findFirst(pres, 'sldSz');
    const cx = sldSz ? parseInt(_attr(sldSz, 'cx')) : 12192000;
    const cy = sldSz ? parseInt(_attr(sldSz, 'cy')) : 6858000;
    const fit = _pptxFit(cx, cy);

    const sldIds = _findAll(_findFirst(pres, 'sldIdLst') || pres, 'sldId');
    const paths = [];
    sldIds.forEach(s => {
        let rId = null;
        for (let i = 0; i < s.attributes.length; i++) {
            const a = s.attributes[i];
            if (a.localName === 'id' && (a.value || '').indexOf('rId') === 0) rId = a.value;
        }
        const tgt = rId && rels[rId];
        if (tgt) paths.push('ppt/' + tgt.replace(/^\.\.\//, '').replace(/^ppt\//, ''));
    });

    const slides = [];
    let skipped = 0;
    for (const path of paths) {
        const xmlStr = await zip.file(path).async('string');
        const doc = _px(xmlStr);
        const name = path.split('/').pop();
        const relsF = zip.file('ppt/slides/_rels/' + name + '.rels');
        const srels = _parseRels(relsF ? await relsF.async('string') : '');
        const spTree = _findFirst(doc, 'spTree');
        const blocks = [];
        let z = 1;
        if (spTree) {
            for (let i = 0; i < spTree.childNodes.length; i++) {
                const node = spTree.childNodes[i];
                if (node.nodeType !== 1) continue;
                if (node.localName === 'sp') {
                    const tx = _pptxText(node);
                    if (!tx.text) continue;
                    const g = _xfrm(node);
                    const rect = g ? _mapRect(g, fit) : { x: 120, y: 70 + z * 26, w: 760, h: 100 };
                    const fontPx = tx.sizePt ? Math.max(10, Math.round(tx.sizePt * (96 / 72) * fit.scale)) : 28;
                    blocks.push({ id: 'b_' + Math.random().toString(36).slice(2, 8), type: 'text', x: rect.x, y: rect.y, w: rect.w, h: rect.h, z: z++, text: tx.text, color: tx.color || '#2C2C2A', size: fontPx, weight: tx.bold ? 700 : 400, align: tx.align });
                } else if (node.localName === 'pic') {
                    const g = _xfrm(node); if (!g) { skipped++; continue; }
                    const rId = _blipEmbed(node);
                    const tgt = rId && srels[rId]; if (!tgt) { skipped++; continue; }
                    let media = tgt.replace(/^\.\.\//, ''); if (!media.startsWith('ppt/')) media = 'ppt/' + media;
                    const ext = (media.split('.').pop() || '').toLowerCase();
                    if (!zip.file(media) || PPTX_IMG_EXTS.indexOf(ext) < 0) { skipped++; continue; }
                    const rect = _mapRect(g, fit);
                    blocks.push({ id: 'b_' + Math.random().toString(36).slice(2, 8), type: 'image', x: rect.x, y: rect.y, w: rect.w, h: rect.h, z: z++, url: '', _media: media, _ext: ext });
                } else if (node.localName === 'graphicFrame' || node.localName === 'grpSp') {
                    skipped++;
                }
            }
        }
        slides.push({ blocks });
    }
    return { slides, skipped };
}

async function importPptx() {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = '.pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation';
    inp.onchange = async () => {
        const file = inp.files && inp.files[0];
        if (!file) return;
        await runPptxImport(file);
    };
    inp.click();
}

async function runPptxImport(file) {
    try {
        toast('Загружаю движок чтения…', 'info');
        const JSZipLib = await ensureJSZip();
        toast('Читаю презентацию…', 'info');
        const zip = await JSZipLib.loadAsync(file);
        const parsed = await parsePptxBrowser(zip);
        if (!parsed.slides.length) { toast('В файле не найдено слайдов', 'error'); return; }

        let maxOrder = editorState.slides.reduce((mx, s) => Math.max(mx, s.order || 0), 0);
        let firstNewId = null;
        const lessonId = editorState.lessonId;

        for (let si = 0; si < parsed.slides.length; si++) {
            toast(`Импорт: слайд ${si + 1} из ${parsed.slides.length}…`, 'info');
            const sb_slide = parsed.slides[si];
            const { data: row, error } = await sb.from('study_slides').insert({
                lesson_id: lessonId,
                slide_type: 'canvas',
                order: ++maxOrder,
                cover_emoji: '🖼',
                title: '',
                body: '',
                meta: { blocks: [], bg: null }
            }).select().single();
            if (error) { toast('Ошибка создания слайда: ' + error.message, 'error'); return; }
            if (!firstNewId) firstNewId = row.id;

            // выгрузка картинок этого слайда
            for (const b of sb_slide.blocks) {
                if (b.type === 'image' && b._media) {
                    try {
                        const blob = await zip.file(b._media).async('blob');
                        const path = `lessons/${lessonId}/${row.id}/b_${Math.random().toString(36).slice(2, 9)}.${b._ext}`;
                        const ct = b._ext === 'svg' ? 'image/svg+xml' : (b._ext === 'jpg' ? 'image/jpeg' : 'image/' + b._ext);
                        const { error: upErr } = await sb.storage.from('classroom-media').upload(path, blob, { contentType: ct, upsert: false });
                        if (upErr) throw upErr;
                        b.url = sb.storage.from('classroom-media').getPublicUrl(path).data.publicUrl;
                    } catch (e) {
                        console.error('pptx image upload', e);
                        b.url = ''; // картинка не загрузилась — блок останется пустым
                    }
                }
                delete b._media; delete b._ext;
            }

            await sb.from('study_slides').update({ meta: { blocks: sb_slide.blocks, bg: null } }).eq('id', row.id);
            row.meta = { blocks: sb_slide.blocks, bg: null };
            editorState.slides.push(row);
        }

        if (firstNewId) { editorState.selectedId = firstNewId; editorState.selectedBlockId = null; }
        renderEditor();
        const warn = parsed.skipped ? ` (${parsed.skipped} сложных элементов пропущено)` : '';
        toast(`Импортировано слайдов: ${parsed.slides.length}${warn}`, 'success');
    } catch (e) {
        console.error('pptx import', e);
        toast('Ошибка импорта: ' + (e.message || e), 'error');
    }
}

function initTaskMeta(subtype) {
