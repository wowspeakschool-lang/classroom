/* ============ FORM ============ */

function renderEditorForm(slide) {
    if (!slide) {
        return `<div class="muted" style="padding:14px;">Выбери слайд в ленте слева или создай новый кнопкой <strong>+</strong>.</div>`;
    }
    const t = slide.slide_type;
    let body = '';

    // Type & emoji row
    body += `
        <div class="row-type-emoji">
            <div class="form-field">
                <label>Тип слайда</label>
                <select class="form-input select" data-field="slide_type" data-typechange="1">
                    ${SLIDE_TYPES_ORDERED.map(tp => `<option value="${tp}" ${tp===t?'selected':''}>${SLIDE_TYPE_META[tp].label}</option>`).join('')}
                </select>
            </div>
            <div class="form-field">
                <label>Эмоджи</label>
                <div class="form-field-emoji" onclick="onPickEmoji()">${esc(slide.cover_emoji || SLIDE_TYPE_META[t].defaultEmoji)}</div>
            </div>
        </div>
    `;

    // Type-specific fields
    if (t === 'intro') {
        body += renderFormField('Заголовок', `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Daily routine">`);
        body += renderFormField('Подзаголовок', `<textarea class="form-input" data-field="body" rows="3" placeholder="Today we'll talk about your day">${esc(slide.body || '')}</textarea>`);
    } else if (t === 'outro') {
        body += renderFormField('Заголовок', `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Great job!">`);
        body += renderFormField('Текст-итог', `<textarea class="form-input" data-field="body" rows="3" placeholder="You learned ...">${esc(slide.body || '')}</textarea>`);
    } else if (t === 'vocab') {
        body += renderFormField('Слово (En)', `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Brush your teeth">`);
        body += renderFormField('Перевод (Ru)', `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Чистить зубы">`);
    } else if (t === 'text') {
        body += renderFormField('Заголовок (опц.)', `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Reading: Tom's morning">`);
        body += renderFormField('Текст (markdown)', `<textarea class="form-input" data-field="body" rows="8" placeholder="**Tom** wakes up at 7am. He brushes his teeth and ...">${esc(slide.body || '')}</textarea>`,
            '**жирный** · *курсив* · `код` · переносы строк');
    } else if (t === 'explanation') {
        body += renderFormField('Заголовок', `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Present simple">`);
        body += renderFormField('Объяснение (markdown)', `<textarea class="form-input" data-field="body" rows="8" placeholder="Используем для повторяющихся действий ...">${esc(slide.body || '')}</textarea>`,
            'markdown поддерживается');
    } else if (t === 'task') {
        body += renderTaskForm(slide);
    } else if (t === 'poll') {
        body += renderPollForm(slide);
    } else if (t === 'deck') {
        body += renderDeckForm(slide);
    } else if (t === 'video') {
        body += renderVideoForm(slide);
    } else if (t === 'rate') {
        body += renderRateForm(slide);
    } else if (t === 'outro') {
        body += renderOutroForm(slide);
    } else {
        body += `<div class="muted" style="padding:14px; background:var(--cream-deep); border-radius:8px; font-size:13px;">
            Форма для типа <strong>${esc(SLIDE_TYPE_META[t]?.label || t)}</strong> — в следующих шагах. Сейчас доступно только переключение типа.
        </div>`;
    }

    // Teacher notes
    body += renderFormField(
        '<span style="display:inline-flex; align-items:center; gap:4px;">🙈 Заметки учителя</span>',
        `<textarea class="form-input" data-field="teacher_notes" rows="3" placeholder="Скрыто от ребёнка">${esc(slide.teacher_notes || '')}</textarea>`,
        'видны только учителю'
    );

    body += `
        <div class="form-pane-foot">
            <button class="btn btn-danger btn-sm" onclick="onDeleteSlide()">🗑 Удалить слайд</button>
        </div>
    `;

    return body;
}

function renderFormField(label, control, hint) {
    return `
        <div class="form-field">
            <label>${label}${hint ? ' <span class="hint">· ' + esc(hint) + '</span>' : ''}</label>
            ${control}
        </div>

}

/* ============ TASK FORM ============ */

function renderTaskForm(slide) {
    const subtype = getTaskSubtype(slide) || 'choice';
    // Pills для подтипа
    let pills = `<div class="form-field"><label>Подтип задания</label><div class="subtype-pills">`;
    for (const st of TASK_SUBTYPES_ORDERED) {
        const m = TASK_SUBTYPE_META[st];
        pills += `<button class="subtype-pill ${st===subtype?'active':''}" onclick="onPickTaskSubtype('${st}')" title="${esc(m.desc)}">${esc(m.short)}</button>`;
    }
    pills += `</div></div>`;

    let body = pills;
    if (subtype === 'open')            body += renderOpenForm(slide);
    else if (subtype === 'choice')     body += renderChoiceForm(slide);
    else if (subtype === 'matching')   body += renderMatchingForm(slide);
    else if (subtype === 'fill_blank') body += renderFillBlankForm(slide);
    else if (subtype === 'ordering')   body += renderOrderingForm(slide);
    return body;
}

                    <span class="layout-icon">
                        <span class="li-row"></span>

                        <span class="li-row tall"></span>

                        <span class="li-col"></span>
                    </span>
                    <span>Справа</span>

    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}

function renderChoiceForm(slide) {
    const m = slide.meta || {};
    const options = m.options || [];

    html += renderFormField('Вопрос', `<textarea class="form-input" data-field="title" rows="2" placeholder="What time does Tom wake up?">${esc(slide.title || '')}</textarea>`);

    options.forEach((o, i) => {

        rows += `

function renderOrderingForm(slide) {

/* ============ TASK actions ============ */

function onPickTaskSubtype(st) {
    const slide = currentSlide();
    if (!slide) return;
    if (getTaskSubtype(slide) === st) return;
    if (!confirm('Сменить подтип задания? Содержимое текущего подтипа очистится.')) return;
    slide.meta = initTaskMeta(st);
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}

function onTaskOptAdd() {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.options) return;
    if (slide.meta.options.length >= 6) return;
    slide.meta.options.push({ id: newId(), text: '' });
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onTaskOptDelete(optId) {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.options) return;
    if (slide.meta.options.length <= 2) return;
    slide.meta.options = slide.meta.options.filter(o => o.id !== optId);
    if (slide.meta.correct_id === optId) {
        slide.meta.correct_id = slide.meta.options[0]?.id || null;
    }
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}

function onTaskPairAdd() {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.pairs) return;
    if (slide.meta.pairs.length >= 8) return;
    slide.meta.pairs.push({ id: newId(), left: '', right: '' });
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onTaskPairDelete(pairId) {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.pairs) return;
    if (slide.meta.pairs.length <= 2) return;
    slide.meta.pairs = slide.meta.pairs.filter(p => p.id !== pairId);
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}

function onTaskWordAdd() {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.words) return;
    if (slide.meta.words.length >= 12) return;
    slide.meta.words.push({ id: newId(), text: '' });
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onTaskWordDelete(wordId) {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.words) return;
    if (slide.meta.words.length <= 2) return;
    slide.meta.words = slide.meta.words.filter(w => w.id !== wordId);
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}

function onTaskHelperAdd() {
    const slide = currentSlide();
    if (!slide || !slide.meta) return;
    if (!slide.meta.helper_words) slide.meta.helper_words = [];
    if (slide.meta.helper_words.length >= 12) return;
    slide.meta.helper_words.push({ id: newId(), text: '' });
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onTaskHelperDelete(wId) {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.helper_words) return;
    slide.meta.helper_words = slide.meta.helper_words.filter(w => w.id !== wId);
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onTaskHelperInput(e) {
    const el = e.currentTarget;
    const id = el.getAttribute('data-helper-id');
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.helper_words) return;
    const w = slide.meta.helper_words.find(x => x.id === id);
    if (w) {
        w.text = el.value;
        markDirty();
        rerenderPreview();
    }
}

function attachFormHandlers() {
    const form = $('editorForm');
    if (!form) return;
    form.querySelectorAll('[data-field]').forEach(el => {
        el.addEventListener('input', onFieldInput);
        el.addEventListener('change', onFieldInput);
    });
    // task: choice/fill_blank options
    form.querySelectorAll('[data-opt-id]').forEach(el => {
        el.addEventListener('input', onTaskOptInput);
        el.addEventListener('change', onTaskOptInput);
    });
    // task: matching pairs
    form.querySelectorAll('[data-pair-id]').forEach(el => {
        el.addEventListener('input', onTaskPairInput);
    });
    // task: ordering words
    form.querySelectorAll('[data-word-id]').forEach(el => {
        el.addEventListener('input', onTaskWordInput);
    });
    // task/open: helper words
    form.querySelectorAll('[data-helper-id]').forEach(el => {
        el.addEventListener('input', onTaskHelperInput);
    });
    // Поля, которые сохраняются в slide.meta (deck_id, video_url, ...)
    form.querySelectorAll('[data-meta-field]').forEach(el => {
        el.addEventListener('input', onMetaFieldInput);
        el.addEventListener('change', onMetaFieldInput);
    });
    // Boolean чекбоксы в meta (rate.ask_*, outro.finish_lesson, ...)
    form.querySelectorAll('[data-meta-bool]').forEach(el => {
        el.addEventListener('change', onMetaBoolInput);
    });
    // poll items
    form.querySelectorAll('[data-poll-item-id]').forEach(el => {
        el.addEventListener('input', onPollItemInput);
    });
}

function onMetaBoolInput(e) {
    const el = e.currentTarget;
    const field = el.getAttribute('data-meta-bool');
    const slide = currentSlide();
    if (!slide) return;
    if (!slide.meta) slide.meta = {};
    slide.meta[field] = !!el.checked;
    markDirty();
    rerenderPreview();
}

function onTaskOptInput(e) {
    const el = e.currentTarget;
    const optId = el.getAttribute('data-opt-id');
    const slide = currentSlide();
    if (!slide || !slide.meta) return;

    if (el.hasAttribute('data-opt-radio')) {
        if (el.checked) {
            slide.meta.correct_id = optId;
            markDirty();
            rerenderPreview();
        }
        return;
    }
    const field = el.getAttribute('data-opt-field');
    const opt = (slide.meta.options || []).find(o => o.id === optId);
    if (opt) {
        opt[field] = el.value;
        markDirty();
        rerenderPreview();
    }
}

function onTaskPairInput(e) {
    const el = e.currentTarget;
    const pairId = el.getAttribute('data-pair-id');
    const field = el.getAttribute('data-pair-field');
    const slide = currentSlide();
    if (!slide || !slide.meta) return;
    const p = (slide.meta.pairs || []).find(x => x.id === pairId);
    if (p) {
        p[field] = el.value;
        markDirty();
        rerenderPreview();
    }
}

function onTaskWordInput(e) {
    const el = e.currentTarget;
    const wordId = el.getAttribute('data-word-id');
    const slide = currentSlide();
    if (!slide || !slide.meta) return;
    const w = (slide.meta.words || []).find(x => x.id === wordId);
    if (w) {
        w.text = el.value;
        markDirty();
        rerenderPreview();
    }
}

function onFieldInput(e) {
    const el = e.currentTarget;
    const field = el.getAttribute('data-field');
    const slide = currentSlide();
    if (!slide) return;
    const isTypeChange = el.hasAttribute('data-typechange');

    if (isTypeChange) {
        const newType = el.value;
        const oldType = slide.slide_type;
        slide.slide_type = newType;
        // Если эмоджи был дефолтным для предыдущего типа — обновим под новый
        const wasDefault = Object.values(SLIDE_TYPE_META).some(m => m.defaultEmoji === slide.cover_emoji);
        if (!slide.cover_emoji || wasDefault) {
            slide.cover_emoji = SLIDE_TYPE_META[newType].defaultEmoji;
        }
        // Инициализация meta при переключении в task
        if (newType === 'task' && !getTaskSubtype(slide)) {
            slide.meta = initTaskMeta('choice');
        }
        // При уходе из task сохраняем meta (не очищаем — вдруг вернётся)
        markDirty();
        // Перерендериваем форму (поля меняются) + превью + ленту
        $('editorForm').innerHTML = renderEditorForm(slide);
        attachFormHandlers();
        rerenderPreview();
        $('editorRibbon').innerHTML = renderRibbon();
        return;
    }

    slide[field] = el.value;
    markDirty();
    rerenderPreview();
    // Если поменялся заголовок — обновим ленту? Эмоджи в ленте от title не зависит. Не нужно.
}

// Обработчик полей, которые сохраняются в slide.meta (deck_id, video_url, и т.п.)
function onMetaFieldInput(e) {
    const el = e.currentTarget;
    const field = el.getAttribute('data-meta-field');
    const slide = currentSlide();
    if (!slide) return;
    if (!slide.meta) slide.meta = {};
    let val = el.value;
    if (el.hasAttribute('data-meta-int')) {
        val = parseInt(val) || null;
    }
    slide.meta[field] = val;
    markDirty();
    rerenderPreview();
}

async function onPickEmoji() {
    const slide = currentSlide();
    if (!slide) return;
    const cur = slide.cover_emoji || SLIDE_TYPE_META[slide.slide_type].defaultEmoji;
    const next = prompt('Введи эмоджи для слайда (например 🪥):', cur);
    if (next === null) return;
    slide.cover_emoji = next.trim() || SLIDE_TYPE_META[slide.slide_type].defaultEmoji;
    markDirty();
    // обновить форму (отобразить новое эмоджи в кнопке) + превью + ленту
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
    $('editorRibbon').innerHTML = renderRibbon();
}

async function onDeleteSlide() {
    const slide = currentSlide();
    if (!slide) return;
    if (!confirm('Удалить слайд? Действие нельзя отменить.')) return;
    const { error } = await sb.from('study_slides').delete().eq('id', slide.id);
    if (error) { toast('Ошибка: ' + error.message, 'error'); return; }
    editorState.slides = editorState.slides.filter(s => s.id !== slide.id);
    // выбрать соседний
    if (editorState.slides.length) {
        const idx = Math.max(0, getSlideIndex(slide.id) - 1);
        // getSlideIndex уже не найдёт удалённый — берём idx из старого порядка приближённо
        editorState.selectedId = (editorState.slides[idx] || editorState.slides[0]).id;
    } else {
        editorState.selectedId = null;
    }
    renderEditor();
    toast('Слайд удалён', 'success');
}

/* ============ AUTOSAVE ============ */

function markDirty() {
    editorState.saveStatus = 'dirty';
    updateSaveIndicator();
    if (editorState.saveTimer) clearTimeout(editorState.saveTimer);
    editorState.saveTimer = setTimeout(doSave, 1000);
}

async function doSave() {
    const slide = currentSlide();
    if (!slide) return;
    editorState.saveTimer = null;
    editorState.saveStatus = 'saving';
    updateSaveIndicator();
    const payload = {
        slide_type:    slide.slide_type,
        title:         slide.title,
        body:          slide.body,
        cover_emoji:   slide.cover_emoji,
        image_url:     slide.image_url,
        meta:          slide.meta || {},
        teacher_notes: slide.teacher_notes,
        updated_at:    new Date().toISOString()
    };
    const { error } = await sb.from('study_slides').update(payload).eq('id', slide.id);
    if (error) {
        editorState.saveStatus = 'error';
        toast('Не сохранилось: ' + error.message, 'error');
    } else {
        editorState.saveStatus = 'saved';
    }
    updateSaveIndicator();
    if (editorState.saveStatus === 'saved') {
        setTimeout(() => {
            if (editorState.saveStatus === 'saved') {
                editorState.saveStatus = 'idle';
                updateSaveIndicator();
            }
        }, 2000);
    }
}

async function flushSave() {
    if (editorState.saveTimer) {
        clearTimeout(editorState.saveTimer);
        editorState.saveTimer = null;
        await doSave();
    }
}

async function flushAndNavigate(hash) {
    await flushSave();
    navigateTo(hash);
}

window.addEventListener('beforeunload', (e) => {
    if (editorState.saveStatus === 'dirty' || editorState.saveTimer) {
        // Принудительный sync save через fetch с keepalive не реализован — просто предупредим
        e.preventDefault();
        e.returnValue = '';
    }
});

/* ============ MARKDOWN (мини) ============ */

function md(text) {
    if (!text) return '';
    let out = esc(text);
    out = out.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    out = out.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    out = out.replace(/\n/g, '<br>');
    return out;
}

/* ================================================================
   SCREEN · RUN MODE
   ================================================================ */

const runState = {
    lessonId: null,
    lesson: null,
    slides: [],
    currentIdx: 0,
    notesOpen: false,
    studentName: null,
    studentId: null,        // UUID из students.id
    mkLessonId: null,       // UUID из mk_lessons.id (опц.)
    runId: null,            // ID study_lesson_runs, создаётся лениво
    timer: { value: 0, running: false, intervalId: null },
    interactions: {}
};

async function showRunMode(lessonId) {
    const main = $('appMain');
    main.innerHTML = `<div class="loader">Загружаю урок…</div>`;

    const { data: lesson, error: lErr } = await sb.from('study_lessons')
        .select('id, title')
        .eq('id', lessonId)
        .is('deleted_at', null)
        .maybeSingle();
    if (lErr || !lesson) {
        main.innerHTML = `<div class="empty"><div class="emoji">😕</div><div class="title">Урок не найден</div></div>`;
        return;
    }

    const { data: slides, error: sErr } = await sb.from('study_slides')
        .select('*')
        .eq('lesson_id', lessonId)
        .order('"order"', { ascending: true })
        .order('id', { ascending: true });
    if (sErr || !slides || !slides.length) {
        main.innerHTML = `
            <div class="empty">
                <div class="emoji">📭</div>
                <div class="title">В уроке нет слайдов</div>
                ${hasEditAccess(currentUser) ? `<button class="btn btn-primary" onclick="navigateTo('#/lesson/${lessonId}/edit')" style="margin-top:14px;">Открыть редактор</button>` : ''}
            </div>`;
        return;
    }

    if (slides.some(s => s.slide_type === 'deck')) {
        await loadDeckLibrary();
    }

    runState.lessonId = lessonId;
    runState.lesson = lesson;
    runState.slides = slides;
    runState.currentIdx = 0;
    runState.notesOpen = false;
    runState.interactions = {};
    runState.timer = { value: 0, running: false, intervalId: null };
    runState.runId = null;
    runState.studentName = null;
    runState.studentId = null;
    runState.mkLessonId = null;

    // Парсим query-params: ?student=UUID&mk_lesson=UUID
    // Параметры могут быть как в location.search, так и в hash после ? (для hash-роутинга)
    try {
        const all = new URLSearchParams(window.location.search);
        const hash = window.location.hash || '';
        const qIdx = hash.indexOf('?');
        if (qIdx >= 0) {
            const hashParams = new URLSearchParams(hash.substring(qIdx + 1));
            for (const [k, v] of hashParams) all.set(k, v);
        }
        const studentParam = all.get('student');
        const mkLessonParam = all.get('mk_lesson');
        if (mkLessonParam) runState.mkLessonId = mkLessonParam;

        if (studentParam) {
            // Если выглядит как UUID — грузим имя из БД, иначе используем как display name
            if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(studentParam)) {
                runState.studentId = studentParam;
                const { data: st } = await sb.from('students').select('id, name').eq('id', studentParam).maybeSingle();
                runState.studentName = st ? st.name : null;
            } else {
                runState.studentName = studentParam;
            }
        }
    } catch(_) {}

    renderRunMode();
    attachRunKeyboard();
}

function renderRunMode() {
    const main = $('appMain');
    const slide = runState.slides[runState.currentIdx];
    const total = runState.slides.length;
    const progress = ((runState.currentIdx + 1) / total) * 100;

    main.innerHTML = `
        <div class="run-shell" id="runShell">
            <div class="run-ribbon" id="runRibbon">${renderRunRibbon()}</div>

            <div class="run-main">
                <div class="run-progress"><div class="run-progress-bar" style="width:${progress}%"></div></div>

                <div class="run-topbar">
                    <span class="run-counter">Слайд ${runState.currentIdx + 1} из ${total}</span>
                    ${runState.studentName ? `
                        <div class="run-student-chip">
                            <span class="avatar">${esc(runState.studentName.charAt(0).toUpperCase())}</span>
                            <span>${esc(runState.studentName)}</span>
                        </div>
                    ` : '<div></div>'}
                    <button class="run-close" onclick="exitRunMode()" title="Завершить (Esc)">✕</button>
                </div>

                <div class="run-stage" id="runStage">
                    ${renderRunSlide(slide)}
                </div>

                <div class="run-bottombar">
                    <button class="run-nav prev" onclick="runPrev()" ${runState.currentIdx === 0 ? 'disabled' : ''} title="Назад (←)">‹</button>
                    <div class="run-controls">
                        <div class="run-timer" id="runTimer">${renderRunTimer()}</div>
                        <button class="run-points p1"  onclick="flashPoints(1, event)">⭐ +1</button>
                        <button class="run-points p5"  onclick="flashPoints(5, event)">⭐ +5</button>
                        <button class="run-points p10" onclick="flashPoints(10, event)">🏆 +10</button>
                    </div>
                    <button class="run-nav next" onclick="runNext()" ${runState.currentIdx === total - 1 ? 'disabled' : ''} title="Дальше (→ или пробел)">›</button>
                </div>

                ${runState.notesOpen ? `
                    <div class="run-notes-drawer">${
                        slide.teacher_notes ? esc(slide.teacher_notes) : '<span class="empty">Для этого слайда заметок нет.</span>'
                    }</div>
                ` : ''}

                <button class="run-notes-tab" onclick="toggleRunNotes()">
                    ${runState.notesOpen ? '▼' : '▲'} Заметки учителя
                </button>
            </div>
        </div>
    `;
    // Прокручиваем ленту так чтобы текущий слайд был виден
    setTimeout(() => {
        const cur = document.querySelector('.run-ribbon-slide.current');
        if (cur && cur.scrollIntoView) cur.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }, 50);
}

function renderRunRibbon() {
    let html = '';
    runState.slides.forEach((s, i) => {
        const meta = SLIDE_TYPE_META[s.slide_type] || SLIDE_TYPE_META.text;
        const emoji = s.cover_emoji || meta.defaultEmoji;
        const title = stripLeadingEmoji(s.title) || meta.label;
        const cls = i === runState.currentIdx ? 'run-ribbon-slide current' : 'run-ribbon-slide';
        html += `
            <div class="${cls}" onclick="runJumpTo(${i})" title="${i+1}. ${esc(title)}">
                <div class="rs-head">
                    <span class="rs-num">${i+1}</span>
                    <span class="rs-emoji">${esc(emoji)}</span>
                </div>
                <div class="rs-title">${esc(title)}</div>
            </div>
        `;
    });
    return html;
}

function runJumpTo(idx) {
    if (idx === runState.currentIdx) return;
    if (idx < 0 || idx >= runState.slides.length) return;
    runState.currentIdx = idx;
    renderRunMode();
}

function renderRunSlide(slide) {
    const t = slide.slide_type;
    if (t === 'task')  return renderRunTask(slide);
    if (t === 'poll')  return renderRunPoll(slide);
    if (t === 'deck')  return renderRunDeck(slide);
    if (t === 'video') return renderRunVideo(slide);
    if (t === 'rate')  return renderRunRate(slide);
    if (t === 'outro') return renderRunOutro(slide);
    // intro / outro / text / explanation / vocab — переиспользуем preview
    return renderSlidePreview(slide);
}

/* ============ RUN · TASK ============ */

function renderRunTask(slide) {
    const subtype = getTaskSubtype(slide) || 'open';
    const subMeta = TASK_SUBTYPE_META[subtype] || TASK_SUBTYPE_META.open;
    const chip = `<span class="slide-type-chip" style="background:var(--green-light); color:var(--green-dark);">✓ ${esc(subMeta.label)}</span>`;
    if (subtype === 'open')       return renderRunOpen(slide, chip);
    if (subtype === 'choice')     return renderRunChoice(slide, chip);
    if (subtype === 'matching')   return renderRunMatching(slide, chip);
    if (subtype === 'fill_blank') return renderFillBlankPreview(slide, chip);   // v1 — статика
    if (subtype === 'ordering')   return renderOrderingPreview(slide, chip);    // v1 — статика
    return `<div class="slide-card">${chip}<p class="muted">Неизвестный подтип</p></div>`;
}

function renderRunOpen(slide, chip) {
    const m = slide.meta || {};
    const helpers = m.helper_words || [];
    const layout = m.layout || 'bottom';
    const interaction = getInteraction(slide.id);
    let helperChips = '';
    helpers.forEach(w => { if (w.text) helperChips += `<span class="task-word-chip">${esc(w.text)}</span>`; });
    const titleHtml       = `<h2 style="text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Вопрос')}</h2>`;
    const instructionHtml = slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : '';
    const chipsHtml       = (helpers.length && helperChips) ? `<div class="task-word-chips" style="margin-top:4px;">${helperChips}</div>` : '';
    const textareaHtml    = `<textarea class="open-answer" placeholder="Ответ ученика..." oninput="onRunOpenInput(${slide.id}, this.value)">${esc(interaction.openAnswer || '')}</textarea>`;

    if (layout === 'side') {
        return `
            <div class="slide-card">
                ${chip}
                <div class="task-open-side">
                    <div class="left">
                        ${titleHtml}
                        ${instructionHtml}
                        ${chipsHtml}
                    </div>
                    <div class="right">
                        ${textareaHtml}
                    </div>
                </div>
            </div>
        `;
    }
    if (layout === 'full') {
        return `
            <div class="slide-card task-open-full">
                ${chip}
                <div class="top-line">
                    ${titleHtml}
                    ${chipsHtml}
                </div>
                ${textareaHtml}
            </div>
        `;
    }
    // bottom (default)
    return `
        <div class="slide-card">
            ${chip}
            ${titleHtml}
            ${instructionHtml}
            ${chipsHtml}
            ${textareaHtml}
        </div>
    `;
}

function renderRunChoice(slide, chip) {
    const m = slide.meta || {};
    const options = m.options || [];
    const correctId = m.correct_id;
    const interaction = getInteraction(slide.id);
    const selectedId = interaction.choiceSelected;
    const revealed = interaction.choiceRevealed;

    let optsHtml = '';
    options.forEach((o, i) => {
        const letter = String.fromCharCode(65 + i);
        let cls = 'task-option-box';
        if (revealed) {
            if (o.id === correctId) cls += ' revealed-correct';
            else if (o.id === selectedId) cls += ' revealed-wrong';
        } else if (o.id === selectedId) {
            cls += ' selected';
        }
        optsHtml += `
            <div class="${cls}" onclick="onRunChoicePick(${slide.id}, '${o.id}')">
                <span class="task-option-letter">${letter}.</span>
                <span style="flex:1;">${esc(o.text || '(пусто)')}</span>
                ${revealed && o.id === correctId ? '<span style="color:var(--green-dark); font-weight:700;">✓</span>' : ''}
                ${revealed && o.id === selectedId && o.id !== correctId ? '<span style="color:var(--red); font-weight:700;">✗</span>' : ''}
            </div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:24px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Вопрос')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-options">${optsHtml}</div>
            ${!revealed
                ? `<button class="task-check-btn" onclick="onRunChoiceCheck(${slide.id})" ${!selectedId ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''}>Проверить</button>`
                : `<button class="task-check-btn" onclick="onRunChoiceReset(${slide.id})">Попробовать снова</button>`}
        </div>
    `;
}

function renderRunMatching(slide, chip) {
    const pairs = (slide.meta || {}).pairs || [];
    const interaction = getInteraction(slide.id);
    const matched = interaction.matchedPairs || [];
    const leftSelected = interaction.leftSelected;

    // Правую колонку детерминированно перемешиваем (reverse)
    const rightItems = [...pairs].reverse();

    let leftHtml = '';
    pairs.forEach(p => {
        const me = matched.find(mp => mp.leftId === p.id);
        let cls = 'task-pair-side';
        if (me) cls += ' matched';
        else if (leftSelected === p.id) cls += ' selected';
        leftHtml += `
            <div class="${cls}" onclick="onRunMatchLeftClick(${slide.id}, '${p.id}')">
                ${me ? `<span class="task-pair-num">${me.num}</span>` : ''}
                <span>${esc(p.left || '—')}</span>
            </div>
        `;
    });
    let rightHtml = '';
    rightItems.forEach(p => {
        const me = matched.find(mp => mp.rightId === p.id);
        let cls = 'task-pair-side';
        if (me) cls += ' matched';
        rightHtml += `
            <div class="${cls}" onclick="onRunMatchRightClick(${slide.id}, '${p.id}')">
                ${me ? `<span class="task-pair-num">${me.num}</span>` : ''}
                <span>${esc(p.right || '—')}</span>
            </div>
        `;
    });

    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:24px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Соедини пары')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px 24px;">
                <div style="display:flex; flex-direction:column; gap:10px;">${leftHtml}</div>
                <div style="display:flex; flex-direction:column; gap:10px;">${rightHtml}</div>
            </div>
            ${matched.length ? `<button class="task-check-btn" onclick="onRunMatchReset(${slide.id})">Сбросить</button>` : ''}
        </div>
    `;
}

/* ============ RUN · DECK / VIDEO ============ */

function renderRunDeck(slide) {
    const m = SLIDE_TYPE_META.deck;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const meta = slide.meta || {};
    const deckId = meta.deck_id;
    const lib = deckLibraryCache || { decks: [] };
    const deck = deckId ? lib.decks.find(d => d.id === deckId) : null;
    return `
        <div class="slide-card">
            ${chip}
            ${slide.title ? `<h2 style="text-align:left;">${esc(stripLeadingEmoji(slide.title))}</h2>` : ''}
            ${slide.body ? `<p class="task-instruction" style="font-size:15px;">${esc(slide.body)}</p>` : ''}
            <div class="deck-card-block">
                ${deck ? `
                    <span style="font-size:64px;">${esc(deck.cover_emoji || '📚')}</span>
                    <p style="font-size:22px; margin:8px 0 0; font-weight:600;">${esc(deck.title)}</p>
                    <p style="font-size:14px; margin:0; color:var(--text-mute);">${deck.level ? esc(deck.level) + ' · ' : ''}${deck.word_count || 0} слов</p>
                    <button class="btn btn-primary btn-large" style="margin-top:12px;" onclick="openDeckIframe(${deck.id})">▶ Запустить тренажёр</button>
                ` : `
                    <span style="font-size:64px; opacity:0.4;">📚</span>
                    <p class="muted" style="margin:0;">Колода не выбрана</p>
                `}
            </div>
        </div>
    `;
}

function renderRunVideo(slide) {
    const m = SLIDE_TYPE_META.video;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const meta = slide.meta || {};
    const url = meta.video_url || '';
    const parsed = parseVideoUrl(url);
    let videoBlock;
    if (parsed && parsed.provider === 'youtube') {
        videoBlock = `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${parsed.id}" allowfullscreen></iframe></div>`;
    } else if (parsed && parsed.provider === 'gdrive') {
        videoBlock = `<div class="video-wrap"><iframe src="https://drive.google.com/file/d/${parsed.id}/preview" allowfullscreen></iframe></div>`;
    } else if (parsed && parsed.provider === 'rutube') {
        videoBlock = `<div class="video-wrap"><iframe src="https://rutube.ru/play/embed/${parsed.id}" allowfullscreen></iframe></div>`;
    } else {
        videoBlock = `<div class="video-wrap"><div class="video-placeholder">
            <span style="font-size:56px; opacity:0.4;">🎥</span>
            <span style="font-size:14px;">Видео не настроено</span>
        </div></div>`;
    }
    return `
        <div class="slide-card">
            ${chip}
            ${slide.title ? `<h2 style="text-align:left;">${esc(stripLeadingEmoji(slide.title))}</h2>` : ''}
            ${videoBlock}
            ${slide.body ? `<p class="task-instruction" style="font-size:15px;">${esc(slide.body)}</p>` : ''}
        </div>
    `;
}

/* ============ RUN · POLL ============ */

function renderRunPoll(slide) {
    const m = SLIDE_TYPE_META.poll;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const items = (slide.meta || {}).items || [];
    const interaction = getInteraction(slide.id);
    const checked = interaction.pollChecked || {};
    const saving = !!interaction.pollSaving;
    const saved = !!interaction.pollSaved;

    let rows = '';
    items.forEach(it => {
        if (!it.text) return;
        const isChecked = !!checked[it.id];
        rows += `
            <div class="poll-row ${isChecked ? 'checked' : ''}" onclick="onRunPollToggle(${slide.id}, '${it.id}')">
                <span class="poll-check ${isChecked ? 'on' : ''}">${isChecked ? '✓' : ''}</span>
                <span class="poll-text">${esc(it.text)}</span>
            </div>
        `;
    });

    return `
        <div class="slide-card">
            ${chip}
            <h2 style="text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'What I can do')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="poll-list">${rows}</div>
            <div style="display:flex; gap:10px; align-items:center; flex-shrink:0; margin-top:6px;">
                <button class="task-check-btn" onclick="onRunPollSave(${slide.id})" ${saving ? 'disabled' : ''}>
                    ${saving ? 'Сохраняю...' : (saved ? '✓ Сохранено' : 'Сохранить ответы')}
                </button>
                ${saved ? '<span style="color:var(--green-dark); font-size:13px;">Готово!</span>' : ''}
            </div>
        </div>
    `;
}

function onRunPollToggle(slideId, itemId) {
    const i = getInteraction(slideId);
    if (!i.pollChecked) i.pollChecked = {};
    i.pollChecked[itemId] = !i.pollChecked[itemId];
    i.pollSaved = false;
    rerenderRunStage();
}

async function onRunPollSave(slideId) {
    const i = getInteraction(slideId);
    const slide = runState.slides.find(s => s.id === slideId);
    if (!slide) return;
    const items = (slide.meta || {}).items || [];
    const checked = i.pollChecked || {};
    const answers = items
        .filter(it => it.text)
        .map(it => ({ item_id: it.id, item_text: it.text, answer: !!checked[it.id] }));

    i.pollSaving = true;
    rerenderRunStage();

    // Создаём run если ещё нет
    await ensureRunId();

    const { error } = await sb.from('study_poll_responses').insert({
        run_id: runState.runId,
        slide_id: slideId,
        student_id: runState.studentId || null,
        answers: answers
    });

    i.pollSaving = false;
    if (error) {
        toast('Не удалось сохранить: ' + error.message, 'error');
    } else {
        i.pollSaved = true;
        toast('Ответы сохранены', 'success');
    }
    rerenderRunStage();
}

/* ============ RUN · RATE ============ */

function renderRunRate(slide) {
    const m = SLIDE_TYPE_META.rate;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;
    const meta = slide.meta || {};
    const interaction = getInteraction(slide.id);
    const vals = interaction.rateValues || {};
    const saving = !!interaction.rateSaving;
    const saved = !!interaction.rateSaved;

    const rows = [];
    if (meta.ask_lesson  !== false) rows.push({ key: 'lesson',  label: 'Урок' });
    if (meta.ask_teacher !== false) rows.push({ key: 'teacher', label: 'Учитель' });
    if (meta.ask_mood    !== false) rows.push({ key: 'mood',    label: 'Настроение' });

    let rowsHtml = '';
    rows.forEach(r => {
        const cur = vals[r.key];
        const faces = ['🙁', '😐', '😄'];
        let faceHtml = '';
        faces.forEach((f, i) => {
            const val = i + 1;
            const isSel = cur === val;
            faceHtml += `<button class="rate-face-btn ${isSel ? 'selected' : ''}" onclick="onRunRateSet(${slide.id}, '${r.key}', ${val})">${f}</button>`;
        });
        rowsHtml += `
            <div class="rate-row">
                <span class="rate-label">${esc(r.label)}</span>
                <div class="rate-faces">${faceHtml}</div>
            </div>
        `;
    });

    return `
        <div class="slide-card">
            ${chip}
            <h2 style="text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Оцени урок')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="rate-list run">${rowsHtml}</div>
            <div style="display:flex; gap:10px; align-items:center; flex-shrink:0; margin-top:6px;">
                <button class="task-check-btn" onclick="onRunRateSave(${slide.id})" ${saving ? 'disabled' : ''}>
                    ${saving ? 'Сохраняю...' : (saved ? '✓ Сохранено' : 'Сохранить оценку')}
                </button>
                ${saved ? '<span style="color:var(--green-dark); font-size:13px;">Спасибо!</span>' : ''}
            </div>
        </div>
    `;
}

function onRunRateSet(slideId, key, val) {
    const i = getInteraction(slideId);
    if (!i.rateValues) i.rateValues = {};
    i.rateValues[key] = val;
    i.rateSaved = false;
    rerenderRunStage();
}

async function onRunRateSave(slideId) {
    const i = getInteraction(slideId);
    const vals = i.rateValues || {};
    if (!vals.lesson && !vals.teacher && !vals.mood) {
        toast('Сначала поставь хотя бы одну оценку', 'error');
        return;
    }
    i.rateSaving = true;
    rerenderRunStage();
    await ensureRunId();
    const { error } = await sb.from('study_lesson_ratings').insert({
        run_id: runState.runId,
        lesson_id: runState.lessonId,
        student_id: runState.studentId || null,
        lesson_rating:  vals.lesson  || null,
        teacher_rating: vals.teacher || null,
        mood_rating:    vals.mood    || null
    });
    i.rateSaving = false;
    if (error) {
        toast('Не удалось сохранить: ' + error.message, 'error');
    } else {
        i.rateSaved = true;
        toast('Оценка сохранена', 'success');
    }
    rerenderRunStage();
}

/* ============ RUN · OUTRO ============ */

function renderRunOutro(slide) {
    // Базовая outro-карточка через стандартный preview
    const base = renderSlidePreview(slide);
    const meta = slide.meta || {};
    if (!meta.finish_lesson) return base;
    // Вставляем кнопку перед последним </div> (закрытие slide-card)
    const lastDiv = base.lastIndexOf('</div>');
    if (lastDiv < 0) return base;
    const button = `
        <div style="display:flex; justify-content:center; margin-top:14px; flex-shrink:0;">
            <button class="btn btn-primary btn-large" onclick="onRunFinishLesson()" style="font-size:17px; padding:14px 28px;">
                ✓ Завершить урок
            </button>
        </div>
    `;
    return base.substring(0, lastDiv) + button + base.substring(lastDiv);
}

async function onRunFinishLesson() {
    await ensureRunId();
    if (runState.runId) {
        await sb.from('study_lesson_runs').update({ finished_at: new Date().toISOString() }).eq('id', runState.runId);
    }
    toast('Урок завершён', 'success');
    setTimeout(() => exitRunMode(), 400);
}

/* ============ RUN · helpers ============ */

// Лениво создаёт study_lesson_run при первой записи (poll/rate/finish)
async function ensureRunId() {
    if (runState.runId) return runState.runId;
    const { data, error } = await sb.from('study_lesson_runs').insert({
        lesson_id: runState.lessonId,
        student_id: runState.studentId || null,
        teacher_id: currentUser ? currentUser.id : null,
        mk_lesson_id: runState.mkLessonId || null
    }).select('id').single();
    if (error || !data) {
        console.error('Cannot create run:', error);
        return null;
    }
    runState.runId = data.id;
    return data.id;
}

/* ============ RUN · interactions ============ */

function getInteraction(slideId) {
    if (!runState.interactions[slideId]) runState.interactions[slideId] = {};
    return runState.interactions[slideId];
}

function rerenderRunStage() {
    const stage = $('runStage');
    if (!stage) return;
    const slide = runState.slides[runState.currentIdx];
    stage.innerHTML = renderRunSlide(slide);
}

function onRunOpenInput(slideId, value) {
    getInteraction(slideId).openAnswer = value;
}

function onRunChoicePick(slideId, optId) {
    const i = getInteraction(slideId);
    if (i.choiceRevealed) return;
    i.choiceSelected = optId;
    rerenderRunStage();
}
function onRunChoiceCheck(slideId) {
    const i = getInteraction(slideId);
    if (!i.choiceSelected) return;
    i.choiceRevealed = true;
    rerenderRunStage();
}
function onRunChoiceReset(slideId) {
    const i = getInteraction(slideId);
    i.choiceSelected = null;
    i.choiceRevealed = false;
    rerenderRunStage();
}

function onRunMatchLeftClick(slideId, leftId) {
    const i = getInteraction(slideId);
    i.matchedPairs = i.matchedPairs || [];
    const existing = i.matchedPairs.find(m => m.leftId === leftId);
    if (existing) {
        i.matchedPairs = i.matchedPairs.filter(m => m.leftId !== leftId);
        i.leftSelected = null;
    } else {
        i.leftSelected = leftId;
    }
    rerenderRunStage();
}
function onRunMatchRightClick(slideId, rightId) {
    const i = getInteraction(slideId);
    i.matchedPairs = i.matchedPairs || [];
    const existing = i.matchedPairs.find(m => m.rightId === rightId);
    if (existing) {
        i.matchedPairs = i.matchedPairs.filter(m => m.rightId !== rightId);
        rerenderRunStage();
        return;
    }
    if (i.leftSelected) {
        const nextNum = i.matchedPairs.length + 1;
        i.matchedPairs.push({ leftId: i.leftSelected, rightId, num: nextNum });
        i.leftSelected = null;
        rerenderRunStage();
    }
}
function onRunMatchReset(slideId) {
    const i = getInteraction(slideId);
    i.matchedPairs = [];
    i.leftSelected = null;
    rerenderRunStage();
}

/* ============ RUN · navigation / notes / timer / points ============ */

function runPrev() {
    if (runState.currentIdx > 0) { runState.currentIdx--; renderRunMode(); }
}
function runNext() {
    if (runState.currentIdx < runState.slides.length - 1) { runState.currentIdx++; renderRunMode(); }
}

function toggleRunNotes() {
    runState.notesOpen = !runState.notesOpen;
    renderRunMode();
}

function flashPoints(amount, event) {
    const el = document.createElement('div');
    el.className = 'points-flash';
    el.textContent = '+' + amount + (amount >= 10 ? ' 🏆' : ' ⭐');
    el.style.left = ((event.clientX || window.innerWidth/2) - 60) + 'px';
    el.style.top = ((event.clientY || window.innerHeight/2) - 80) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

function renderRunTimer() {
    const t = runState.timer;
    const mm = String(Math.floor(t.value / 60)).padStart(2, '0');
    const ss = String(t.value % 60).padStart(2, '0');
    const warn = t.value > 0 && t.value % 60 === 0 && t.running;
    return `
        <span class="clock-icon">⏱</span>
        <span class="time ${warn ? 'warn' : ''}">${mm}:${ss}</span>
        <button class="timer-btn" onclick="onRunTimerClick()" title="${t.running ? 'Пауза' : 'Старт'}">${t.running ? '⏸' : '▶'}</button>
        ${(t.value > 0 || t.running) ? `<button class="timer-btn" style="background:transparent; color:var(--text-mute);" onclick="onRunTimerReset()" title="Сбросить">⟳</button>` : ''}
    `;
}
function updateRunTimer() {
    const el = $('runTimer');
    if (el) el.innerHTML = renderRunTimer();
}
function onRunTimerClick() {
    if (runState.timer.running) {
        pauseRunTimer();
    } else {
        startRunTimer();
    }
}
function startRunTimer() {
    runState.timer.running = true;
    if (runState.timer.intervalId) clearInterval(runState.timer.intervalId);
    runState.timer.intervalId = setInterval(() => {
        runState.timer.value++;
        updateRunTimer();
    }, 1000);
    updateRunTimer();
}
function pauseRunTimer() {
    runState.timer.running = false;
    if (runState.timer.intervalId) {
        clearInterval(runState.timer.intervalId);
        runState.timer.intervalId = null;
    }
    updateRunTimer();
}
function onRunTimerReset() {
    pauseRunTimer();
    runState.timer.value = 0;
    updateRunTimer();
}

function openDeckIframe(deckId) {
    const modal = document.createElement('div');
    modal.className = 'run-iframe-modal';
    modal.innerHTML = `
        <iframe src="https://train.wowteach.ru/?deck=${deckId}"></iframe>
        <button class="close" onclick="this.parentNode.remove()" title="Закрыть">✕</button>
    `;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function exitRunMode() {
    pauseRunTimer();
    detachRunKeyboard();
    // Возвращаемся назад через history
    if (history.length > 1) {
        history.back();
    } else {
        navigateTo('#/');
    }
}

let _runKeyHandler = null;
function attachRunKeyboard() {
    detachRunKeyboard();
    _runKeyHandler = (e) => {
        const tag = (e.target && e.target.tagName) || '';
        if (tag === 'TEXTAREA' || tag === 'INPUT') return;
        if (e.key === 'ArrowLeft')  { e.preventDefault(); runPrev(); }
        else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); runNext(); }
        else if (e.key === 'Escape') { e.preventDefault(); exitRunMode(); }
    };
    document.addEventListener('keydown', _runKeyHandler);
}
function detachRunKeyboard() {
    if (_runKeyHandler) {
        document.removeEventListener('keydown', _runKeyHandler);
        _runKeyHandler = null;
    }
}

</script>
</body>
