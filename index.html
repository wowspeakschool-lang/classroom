<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WowSpeak Classroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   WowSpeak Classroom — single-file app
   v1 · скелет: auth + библиотека + курс с юнитами + заготовки
   ================================================================ */

:root {
    --cream: #FFFBF2;
    --cream-deep: #F1EFE8;
    --white: #FFFFFF;

    --purple:       #7F77DD;
    --purple-dark:  #3C3489;
    --purple-light: #EEEDFE;

    --orange:       #BA7517;
    --orange-light: #FAEEDA;
    --orange-dark:  #854F0B;

    --green:        #639922;
    --green-dark:   #27500A;
    --green-light:  #EAF3DE;

    --red:          #A32D2D;
    --red-light:    #FCEBEB;
    --red-mid:      #F0997B;

    --teal:         #0F6E56;
    --teal-light:   #E1F5EE;
    --teal-mid:     #5DCAA5;

    --blue-light:   #E6F1FB;
    --blue-dark:    #0C447C;

    --coral-light:  #FAECE7;
    --coral-dark:   #712B13;

    --pink-light:   #FBEAF0;
    --pink-dark:    #72243E;

    --text:         #2C2C2A;
    --text-soft:    #5F5E5A;
    --text-mute:    #888780;

    --border:       #E8E3D6;
    --border-soft:  #C8C4B6;

    --font-heading: 'Fredoka', system-ui, -apple-system, sans-serif;
    --font-body:    'Nunito', system-ui, -apple-system, sans-serif;
    --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 22px;
    --r-pill: 999px;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    font-family: var(--font-body);
    color: var(--text);
    background: var(--cream);
    background-image: radial-gradient(circle, rgba(120,80,40,0.08) 1px, transparent 1px);
    background-size: 20px 20px;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
}

h1, h2, h3, h4 {
    font-family: var(--font-heading);
    font-weight: 500;
    margin: 0;
    color: var(--text);
}

button { font-family: inherit; }
input, textarea, select { font-family: inherit; }

a { color: var(--purple-dark); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ============== LOGIN ============== */

.login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.login-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 4px 20px rgba(60,40,20,0.04);
}
.login-logo {
    font-family: var(--font-heading);
    font-size: 28px;
    font-weight: 600;
    color: var(--purple-dark);
    text-align: center;
    margin-bottom: 6px;
}
.login-logo .accent { color: var(--orange); }
.login-sub {
    text-align: center;
    color: var(--text-mute);
    font-size: 13px;
    margin-bottom: 28px;
}
.form-group {
    margin-bottom: 14px;
}
.form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 4px;
}
.form-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    font-size: 15px;
    background: var(--white);
    transition: border-color .15s, box-shadow .15s;
}
.form-input:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 0 0 0 3px var(--purple-light);
}
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: var(--r-pill);
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font-body);
    cursor: pointer;
    transition: transform .12s, background .15s, opacity .15s;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
    background: var(--purple);
    color: var(--white);
}
.btn-primary:hover { background: var(--purple-dark); }
.btn-secondary {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--cream-deep); }
.btn-ghost {
    background: transparent;
    color: var(--text-soft);
}
.btn-ghost:hover { background: var(--cream-deep); }
.btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red-mid);
}
.btn-danger:hover { background: var(--red-light); }
.btn-full { width: 100%; }
.btn-large { padding: 12px 24px; font-size: 15px; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.login-actions { margin-top: 22px; }
.login-foot {
    text-align: center;
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-mute);
}
.login-foot a {
    color: var(--purple-dark);
    cursor: pointer;
}

/* ============== HEADER ============== */

#mainApp { display: none; }

.app-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
}
.app-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 16px;
    color: var(--purple-dark);
}
.app-logo .badge {
    width: 26px;
    height: 26px;
    background: var(--purple);
    color: var(--white);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
}
.app-logo .study {
    color: var(--orange);
    font-weight: 500;
}

.subsite-switch {
    display: flex;
    gap: 4px;
    background: var(--cream-deep);
    padding: 3px;
    border-radius: var(--r-pill);
    margin-left: auto;
}
.subsite-btn {
    padding: 5px 12px;
    border-radius: var(--r-pill);
    border: none;
    background: transparent;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.subsite-btn:hover { background: rgba(255,255,255,0.5); text-decoration: none; }
.subsite-btn.active {
    background: var(--white);
    color: var(--purple-dark);
    box-shadow: 0 1px 3px rgba(60,40,20,0.08);
}

.user-block {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
}
.user-name { font-weight: 600; color: var(--text); }
.user-role-badge {
    background: var(--purple-light);
    color: var(--purple-dark);
    padding: 2px 9px;
    border-radius: var(--r-pill);
    font-size: 10px;
    font-weight: 600;
    font-family: var(--font-mono);
    text-transform: lowercase;
}
.user-role-badge.teacher {
    background: var(--green-light);
    color: var(--green-dark);
}
.logout-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-mute);
    padding: 4px 8px;
    border-radius: var(--r-sm);
    font-size: 18px;
}
.logout-btn:hover { background: var(--cream-deep); color: var(--text); }

/* ============== MAIN CONTAINER ============== */

.app-main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 60px;
}

.page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}
.page-title {
    font-size: 24px;
    font-family: var(--font-heading);
    font-weight: 500;
}

/* ============== TABS ============== */

.tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
}
.tab {
    padding: 8px 16px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-soft);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.tab:hover { background: var(--white); }
.tab.active {
    background: var(--purple);
    color: var(--white);
    border-color: var(--purple);
}

/* ============== COURSE GRID ============== */

.course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
}

.course-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    text-decoration: none;
}
.course-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(60,40,20,0.08);
    text-decoration: none;
}
.course-cover {
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
}
.course-body {
    padding: 14px 16px;
}
.course-title {
    font-family: var(--font-heading);
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 4px;
    color: var(--text);
}
.course-meta {
    font-size: 12px;
    color: var(--text-mute);
    display: flex;
    align-items: center;
    gap: 6px;
}
.level-badge {
    background: var(--purple-light);
    color: var(--purple-dark);
    padding: 2px 9px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
}

.course-card-create {
    background: transparent;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--text-mute);
    cursor: pointer;
    min-height: 170px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-body);
    transition: border-color .15s, color .15s;
}
.course-card-create:hover {
    border-color: var(--purple);
    color: var(--purple-dark);
}
.course-card-create .plus { font-size: 32px; line-height: 1; }

/* ============== COURSE DETAIL ============== */

.crumbs {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-mute);
}
.crumbs a {
    color: var(--text-soft);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

.course-hero {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 18px;
    display: flex;
    gap: 18px;
    align-items: center;
    margin-bottom: 24px;
}
.course-hero-cover {
    width: 90px;
    height: 90px;
    border-radius: var(--r-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    flex-shrink: 0;
}
.course-hero-body { flex: 1; min-width: 0; }
.course-hero-kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-mute);
}
.course-hero-title {
    font-family: var(--font-heading);
    font-size: 22px;
    font-weight: 500;
    margin: 2px 0 6px;
}
.course-hero-desc {
    font-size: 13px;
    color: var(--text-soft);
    margin: 0 0 8px;
}
.course-hero-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-soft);
}

/* ============== UNITS ============== */

.unit-section { margin-bottom: 20px; }
.unit-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px 10px;
    cursor: pointer;
    user-select: none;
}
.unit-emoji { font-size: 22px; }
.unit-kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
}
.unit-title {
    font-family: var(--font-heading);
    font-size: 15px;
    font-weight: 500;
}
.unit-count {
    font-size: 12px;
    color: var(--text-mute);
}
.unit-actions { margin-left: auto; display: flex; gap: 4px; }

.lesson-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-left: 12px;
}
.lesson-row {
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 12px;
    align-items: center;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 10px 14px;
}
.lesson-num {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--cream-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
}
.lesson-title {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
    color: var(--text);
}
.lesson-meta {
    font-size: 11px;
    color: var(--text-mute);
    margin: 2px 0 0;
    display: flex;
    gap: 10px;
    align-items: center;
}
.lesson-meta span { display: inline-flex; align-items: center; gap: 3px; }
.lesson-actions { display: flex; gap: 6px; align-items: center; }

.icon-btn {
    background: transparent;
    border: 1px solid var(--border);
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    color: var(--text-mute);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}
.icon-btn:hover { background: var(--cream-deep); color: var(--text); }

.add-row {
    background: transparent;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    padding: 8px;
    font-size: 12px;
    color: var(--text-mute);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-family: var(--font-body);
    font-weight: 600;
    align-self: flex-start;
    margin-left: 12px;
}
.add-row:hover { border-color: var(--purple); color: var(--purple-dark); }
.add-row.wide { align-self: stretch; padding: 14px; margin-left: 0; }

/* ============== EDITOR ============== */

.editor-shell {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    overflow: visible;
}
.editor-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    border-radius: var(--r-lg) var(--r-lg) 0 0;
}
.editor-crumbs {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-mute);
    flex-wrap: wrap;
}
.editor-crumbs a { color: var(--text-soft); cursor: pointer; }
.editor-crumbs .here { color: var(--text); font-weight: 600; }
.editor-tools { display: flex; align-items: center; gap: 14px; }

.save-ind {
    font-size: 12px;
    color: var(--text-mute);
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.save-ind.saved   { color: var(--green-dark); }
.save-ind.saving  { color: var(--orange-dark); }
.save-ind.error   { color: var(--red); }

.editor-3pane {
    display: grid;
    grid-template-columns: 100px 1fr 380px;
    gap: 16px;
    padding: 16px;
    min-height: 520px;
}
@media (max-width: 1100px) {
    .editor-3pane { grid-template-columns: 90px 1fr 320px; }
}
@media (max-width: 880px) {
    .editor-3pane { grid-template-columns: 80px 1fr; }
    .form-pane { grid-column: 1 / -1; }
}

.ribbon {
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    max-height: 70vh;
    overflow-y: auto;
}
.ribbon-slide {
    position: relative;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    height: 68px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    transition: border-color .12s, background .12s;
}
.ribbon-slide:hover { border-color: var(--border-soft); }
.ribbon-slide.sel {
    border: 2px solid var(--purple);
    background: var(--purple-light);
}
.ribbon-slide.dragging  { opacity: 0.35; }
.ribbon-slide.drag-over { border: 2px dashed var(--purple); transform: scale(1.04); }
.rs-num {
    position: absolute;
    top: 3px;
    left: 5px;
    font-size: 10px;
    color: var(--text-mute);
    font-family: var(--font-mono);
    font-weight: 600;
}
.rs-typeicon {
    position: absolute;
    bottom: 3px;
    right: 5px;
    font-size: 11px;
}
.ribbon-add {
    background: transparent;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    padding: 10px;
    color: var(--text-mute);
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    font-family: var(--font-body);
    flex-shrink: 0;
}
.ribbon-add:hover { border-color: var(--purple); color: var(--purple-dark); }

.add-picker {
    /* position задаётся через JS (fixed) — чтобы не клипался overflow ленты */
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 6px;
    z-index: 1000;
    box-shadow: 0 8px 28px rgba(60,40,20,0.15);
    width: 280px;
}
.add-pick-title {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-mute);
    padding: 6px 10px 4px;
}
.add-pick-row {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 10px;
    align-items: center;
    padding: 7px 10px;
    border-radius: var(--r-sm);
    cursor: pointer;
    border: none;
    background: transparent;
    text-align: left;
    width: 100%;
    font-family: var(--font-body);
}
.add-pick-row:hover { background: var(--cream-deep); }
.add-pick-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}
.add-pick-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    display: block;
}
.add-pick-desc {
    font-size: 11px;
    color: var(--text-mute);
    line-height: 1.2;
    margin-top: 2px;
    display: block;
}

.preview-pane, .form-pane {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
}
.preview-stage {
    flex: 1;
    background: var(--cream);
    background-image: radial-gradient(circle, rgba(120,80,40,0.08) 1px, transparent 1px);
    background-size: 16px 16px;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 24px;
    min-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.preview-stage:hover { border-color: var(--border-soft); }

.slide-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-xl);
    padding: 24px 26px;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.slide-type-chip {
    display: inline-flex;
    align-self: flex-start;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: var(--r-pill);
    font-size: 11px;
    font-weight: 600;
}
.slide-card h2 {
    font-family: var(--font-heading);
    font-size: 28px;
    margin: 0;
    text-align: center;
    font-weight: 500;
    line-height: 1.2;
}
.slide-emoji-block {
    background: var(--cream-deep);
    border-radius: var(--r-lg);
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 84px;
    line-height: 1;
}
.slide-card .subtitle {
    text-align: center;
    font-size: 17px;
    color: var(--text-soft);
    margin: 0;
}
.slide-card .markdown {
    font-size: 15px;
    color: var(--text);
    line-height: 1.7;
}
.slide-card .markdown strong { font-weight: 600; }
.slide-card .markdown em { font-style: italic; }
.slide-card .markdown code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--cream-deep);
    padding: 1px 6px;
    border-radius: 4px;
}

.form-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
}
.form-field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    gap: 4px;
}
.form-field label .hint {
    font-weight: 400;
    color: var(--text-mute);
    font-size: 11px;
}
/* ============== POLL ============== */
.poll-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.poll-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
}
.poll-row:hover { background: var(--cream-deep); }
.poll-row.checked {
    background: var(--green-light);
    border-color: var(--green);
}
.poll-check {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border-soft);
    background: var(--white);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    flex-shrink: 0;
}
.poll-check.on {
    background: var(--green);
    border-color: var(--green);
}
.poll-text { flex: 1; }
.run-stage .poll-row { font-size: 18px; padding: 14px 18px; }
.run-stage .poll-check { width: 28px; height: 28px; font-size: 17px; }

/* ============== RATE ============== */
.rate-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.rate-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 0;
}
.rate-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    min-width: 110px;
}
.rate-faces {
    display: flex;
    gap: 6px;
}
.rate-face {
    font-size: 26px;
    opacity: 0.4;
    padding: 4px 6px;
}
.rate-face-btn {
    background: transparent;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 32px;
    cursor: pointer;
    transition: transform .12s, border-color .12s, background .12s;
    opacity: 0.5;
}
.rate-face-btn:hover { opacity: 1; transform: scale(1.1); }
.rate-face-btn.selected {
    opacity: 1;
    border-color: var(--purple);
    background: var(--purple-light);
}
.run-stage .rate-row { padding: 10px 0; gap: 16px; }
.run-stage .rate-label { font-size: 18px; min-width: 140px; }
.run-stage .rate-face-btn { font-size: 42px; padding: 6px 14px; }

/* Toggle строка в форме редактора */
.rate-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-soft);
}
.rate-toggle input[type=checkbox] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    margin: 0;
}
.rate-toggle:hover { color: var(--text); }

/* Form input.select */
.form-input.select {
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='%23888780' stroke-width='1.5'%3e%3cpath d='m4 6 4 4 4-4'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 14px;
    padding-right: 32px;
}

/* Layout-toggle для выбора раскладки open-задачи */
.layout-toggle {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
}
.layout-btn {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 6px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: var(--font-body);
    font-size: 11px;
    color: var(--text-soft);
    transition: background .12s, border-color .12s;
}
.layout-btn:hover { background: var(--cream-deep); }
.layout-btn.active {
    border-color: var(--purple);
    border-width: 2px;
    padding: 8px 5px;
    background: var(--purple-light);
    color: var(--purple-dark);
    font-weight: 600;
}
.layout-icon {
    width: 36px;
    height: 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    background: var(--white);
    border: 1px solid var(--border-soft);
    padding: 3px;
    border-radius: 4px;
}
.layout-icon.side { flex-direction: row; }
.layout-icon .li-row {
    background: var(--text-mute);
    height: 2.5px;
    border-radius: 1px;
}
.layout-icon .li-row.tall { height: 8px; margin-top: 2px; }
.layout-icon .li-row.huge { flex: 1; }
.layout-icon .li-col {
    flex: 1;
    background: var(--text-mute);
    border-radius: 2px;
}
.layout-btn.active .layout-icon { border-color: var(--purple); }
.layout-btn.active .layout-icon .li-row,
.layout-btn.active .layout-icon .li-col {
    background: var(--purple);
}

/* Раскладка task-open: side (вопрос слева, textarea справа) */
.task-open-side {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: stretch;
}
.task-open-side .left {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-width: 0;
}
.task-open-side .right {
    display: flex;
    min-width: 0;
}
.task-open-side .right textarea.open-answer {
    width: 100%;
}
.run-stage .task-open-side {
    flex: 1;
    min-height: 0;
}
.run-stage .task-open-side .left { overflow-y: auto; }
.run-stage .task-open-side .right textarea.open-answer {
    height: 100%;
    max-height: 100%;
    min-height: 0;
    resize: none;
}

/* Раскладка task-open: full (вопрос мелкий сверху, textarea на весь слайд) */
.task-open-full .top-line {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.task-open-full .top-line h2 {
    font-size: 18px !important;
    margin: 0;
    line-height: 1.2;
    font-weight: 600;
}
.task-open-full .top-line .task-word-chips {
    margin-top: 0;
}
.run-stage .slide-card.task-open-full > textarea.open-answer {
    flex: 1;
    height: auto;
    min-height: 200px;
    max-height: none;
}
.run-stage .slide-card.task-open-full .top-line h2 {
    font-size: clamp(16px, 1.6vw, 22px) !important;
}

.row-type-emoji {
    display: grid;
    grid-template-columns: 1fr 60px;
    gap: 8px;
}
.form-field-emoji {
    height: 38px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
}
.form-field-emoji:hover { background: var(--cream-deep); }

textarea.form-input { resize: vertical; min-height: 38px; padding: 8px 14px; line-height: 1.5; }

.form-pane-foot {
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
}
.form-pane-foot button { width: auto; }

/* ============== TASK / SUBTYPES ============== */

.subtype-pills {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}
.subtype-pill {
    padding: 5px 12px;
    border-radius: var(--r-pill);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
}
.subtype-pill.active {
    background: var(--green-light);
    color: var(--green-dark);
    border-color: var(--green);
}
.subtype-pill:hover:not(.active) { background: var(--cream-deep); }

.list-add-btn {
    background: transparent;
    border: 1.5px dashed var(--border-soft);
    border-radius: var(--r-md);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text-mute);
    cursor: pointer;
    width: 100%;
    font-family: var(--font-body);
    font-weight: 600;
    margin-top: 4px;
}
.list-add-btn:hover { border-color: var(--purple); color: var(--purple-dark); }
.list-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.x-btn {
    background: transparent;
    border: none;
    color: var(--text-mute);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    line-height: 1;
    width: 24px;
    height: 24px;
    border-radius: 4px;
}
.x-btn:hover { color: var(--red); background: var(--red-light); }

.opt-edit-row {
    display: grid;
    grid-template-columns: 22px 1fr 28px;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
}
.opt-edit-row input[type=radio] {
    width: 16px; height: 16px;
    accent-color: var(--green-dark);
    cursor: pointer;
    margin: 0;
    justify-self: center;
}

.pair-edit-row {
    display: grid;
    grid-template-columns: 1fr 18px 1fr 28px;
    gap: 6px;
    align-items: center;
    margin-bottom: 6px;
}
.pair-edit-row .arrow { color: var(--text-mute); text-align: center; font-size: 13px; }

.word-edit-row {
    display: grid;
    grid-template-columns: 24px 1fr 28px;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
}
.word-order-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 600;
    text-align: center;
    background: var(--cream-deep);
    border-radius: 4px;
    padding: 2px 0;
}

/* === Preview: task subtypes === */

.task-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.task-option-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 9px 14px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.task-option-letter {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--purple);
    width: 18px;
}
.task-option-box.correct {
    background: var(--green-light);
    border-color: var(--green);
}
.task-option-box.correct .task-option-letter { color: var(--green-dark); }

.task-pairs {
    display: grid;
    grid-template-columns: 1fr 18px 1fr;
    gap: 8px 12px;
    align-items: center;
}
.task-pair-side {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 8px 12px;
    text-align: center;
    font-size: 14px;
}
.task-pairs .arrow { color: var(--text-mute); text-align: center; font-size: 14px; }

.task-sentence {
    font-size: 17px;
    line-height: 1.8;
    color: var(--text);
    margin: 0;
}
.task-blank {
    display: inline-block;
    min-width: 80px;
    border-bottom: 2px dashed var(--border-soft);
    text-align: center;
    color: var(--text-mute);
    padding: 0 8px;
    margin: 0 4px;
    font-style: italic;
    font-size: 14px;
}

.task-target-line {
    border: 1.5px dashed var(--border-soft);
    border-radius: var(--r-md);
    min-height: 44px;
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    color: var(--text-mute);
    font-size: 12px;
    font-style: italic;
}
.task-word-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}
.task-word-chip {
    background: var(--cream-deep);
    padding: 6px 14px;
    border-radius: var(--r-pill);
    font-size: 14px;
    color: var(--text);
    cursor: grab;
}

.task-check-btn {
    align-self: flex-start;
    background: var(--purple-light);
    color: var(--purple-dark);
    border: none;
    padding: 6px 16px;
    border-radius: var(--r-pill);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
}

.task-instruction {
    font-size: 13px;
    color: var(--text-mute);
    margin: 0;
}

.editor-warning {
    background: var(--orange-light);
    color: var(--orange-dark);
    padding: 8px 12px;
    border-radius: var(--r-sm);
    font-size: 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 6px;
}

/* ============== RUN MODE ============== */

.run-shell {
    position: fixed;
    inset: 0;
    background: var(--cream);
    background-image: radial-gradient(circle, rgba(120,80,40,0.10) 1px, transparent 1px);
    background-size: 20px 20px;
    z-index: 200;
    display: flex;
    flex-direction: row;
    padding: 14px;
    gap: 14px;
    overflow: hidden;
}
.run-ribbon {
    width: 180px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    padding-right: 4px;
}
.run-ribbon-slide {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 10px 10px;
    min-height: 58px;
    text-align: left;
    transition: border-color .12s, background .12s, transform .1s;
    overflow: hidden;
    flex-shrink: 0;
}
.run-ribbon-slide:hover { transform: translateX(2px); }
.run-ribbon-slide.current {
    border: 2px solid var(--purple);
    background: var(--purple-light);
}
.run-ribbon-slide .rs-head {
    display: flex;
    align-items: center;
    gap: 6px;
}
.run-ribbon-slide .rs-num {
    font-size: 11px;
    color: var(--text-mute);
    font-family: var(--font-mono);
    font-weight: 600;
    min-width: 14px;
}
.run-ribbon-slide .rs-emoji {
    font-size: 17px;
    line-height: 1;
}
.run-ribbon-slide .rs-title {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
}
.run-ribbon-slide.current .rs-title {
    color: var(--purple-dark);
    font-weight: 700;
}

.run-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
    overflow: hidden;
}

.run-progress {
    height: 6px;
    background: var(--cream-deep);
    border-radius: var(--r-pill);
    overflow: hidden;
    flex-shrink: 0;
}
.run-progress-bar {
    height: 100%;
    background: var(--purple);
    border-radius: var(--r-pill);
    transition: width .3s ease-out;
}
.run-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 6px;
    gap: 14px;
    flex-shrink: 0;
}
.run-counter {
    font-size: 14px;
    color: var(--text-soft);
    font-weight: 600;
}
.run-student-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--purple-light);
    color: var(--purple-dark);
    padding: 5px 14px 5px 5px;
    border-radius: var(--r-pill);
    font-size: 14px;
    font-weight: 600;
}
.run-student-chip .avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--purple);
    color: var(--white);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
}
.run-close {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-size: 18px;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.run-close:hover { background: var(--cream-deep); }

.run-stage {
    flex: 1;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 8px;
    min-height: 0;
    overflow: hidden;
}
.run-stage .slide-card {
    max-width: 1200px;
    width: 100%;
    height: 100%;
    padding: 28px 40px;
    gap: 16px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}
.run-stage .slide-type-chip { flex-shrink: 0; align-self: flex-start; }
.run-stage .slide-card h2 {
    font-size: clamp(24px, 2.6vw, 34px);
    line-height: 1.2;
    flex-shrink: 0;
}
.run-stage .slide-emoji-block {
    flex: 1;
    min-height: 200px;
    font-size: clamp(80px, 16vh, 160px);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}
.run-stage .slide-card .subtitle {
    font-size: clamp(16px, 1.8vw, 22px);
    line-height: 1.45;
    flex-shrink: 0;
}
.run-stage .slide-card .task-instruction {
    font-size: 18px;
    line-height: 1.5;
    flex-shrink: 0;
}
.run-stage .task-options,
.run-stage .task-word-chips {
    flex-shrink: 0;
}
.run-stage textarea.open-answer {
    width: 100%;
    height: 220px;
    min-height: 120px;
    max-height: 50vh;
    padding: 14px 18px;
    font-size: 18px;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    font-family: var(--font-body);
    background: var(--cream);
    resize: vertical;
    line-height: 1.5;
    flex-shrink: 0;
}
.run-stage textarea.open-answer:focus {
    border-style: solid;
    border-color: var(--purple);
    background: var(--white);
    outline: none;
}
.run-stage .video-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    max-height: calc(100vh - 280px);
    margin: 0 auto;
    position: relative;
    flex-shrink: 0;
}
.run-stage .video-wrap iframe,
.run-stage .video-wrap .video-placeholder {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 14px;
}
.run-stage .video-wrap .video-placeholder {
    background: var(--cream-deep);
    color: var(--text-mute);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
}
.run-stage .deck-card-block {
    background: var(--cream-deep);
    border-radius: 18px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    justify-content: center;
    min-height: 240px;
    flex-shrink: 0;
}
.run-stage .task-option-box {
    cursor: pointer;
    padding: 14px 20px;
    font-size: 17px;
    transition: background .15s, border-color .15s;
}
.run-stage .task-option-box:hover { background: var(--white); }
.run-stage .task-option-box.selected {
    border-color: var(--purple) !important;
    border-width: 2px !important;
    background: var(--purple-light);
}
.run-stage .task-option-box.revealed-correct {
    background: var(--green-light);
    border-color: var(--green);
    border-width: 2px;
}
.run-stage .task-option-box.revealed-wrong {
    background: var(--red-light);
    border-color: var(--red-mid);
    border-width: 2px;
}
.run-stage .task-pair-side {
    cursor: pointer;
    padding: 14px 18px;
    font-size: 17px;
    transition: background .15s, border-color .15s;
}
.run-stage .task-pair-side:hover { background: var(--white); }
.run-stage .task-pair-side.selected {
    border-color: var(--purple) !important;
    border-width: 2px !important;
    background: var(--purple-light);
}
.run-stage .task-pair-side.matched {
    background: var(--green-light);
    border-color: var(--green);
}
.task-pair-num {
    display: inline-block;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--purple);
    color: var(--white);
    font-size: 11px;
    line-height: 22px;
    text-align: center;
    margin-right: 8px;
    font-weight: 700;
}
.run-stage textarea.open-answer {
    width: 100%;
    min-height: 100px;
    padding: 14px 18px;
    font-size: 18px;
    border: 2px dashed var(--border-soft);
    border-radius: var(--r-md);
    font-family: var(--font-body);
    background: var(--cream);
    resize: vertical;
    line-height: 1.5;
}
.run-stage textarea.open-answer:focus {
    border-style: solid;
    border-color: var(--purple);
    background: var(--white);
    outline: none;
}

.run-bottombar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 0 6px;
    flex-shrink: 0;
}
.run-nav {

        const m = document.cookie.match(new RegExp('(?:^|; )' + escaped + '=([^;]+)'));
        return m ? decodeURIComponent(m[1]) : null;
    },
    setItem: (key, value) => {
        document.cookie = `${key}=${encodeURIComponent(value)}; domain=.wowteach.ru; path=/; max-age=31536000; secure; samesite=lax`;
    },
    removeItem: (key) => {
        document.cookie = `${key}=; domain=.wowteach.ru; path=/; max-age=0; secure; samesite=lax`;

};

};
const TASK_SUBTYPES_ORDERED = ['open', 'choice', 'matching', 'fill_blank', 'ordering'];

// Короткий случайный id для опций/пар/слов (стабилен между сессиями)
function newId() {
    return Math.random().toString(36).slice(2, 8);
}

// Создаёт свежую meta для нового подтипа задания
function initTaskMeta(subtype) {
    if (subtype === 'open') {
        return { task_type: 'open', helper_words: [] };
    }
    if (subtype === 'choice') {
        const o1 = { id: newId(), text: '' };
        const o2 = { id: newId(), text: '' };
        return { task_type: 'choice', options: [o1, o2], correct_id: o1.id };
    }
    if (subtype === 'matching') {
        return { task_type: 'matching', pairs: [
            { id: newId(), left: '', right: '' },
            { id: newId(), left: '', right: '' }
        ]};
    }
    if (subtype === 'fill_blank') {
        const o1 = { id: newId(), text: '' };
        const o2 = { id: newId(), text: '' };
        return { task_type: 'fill_blank', options: [o1, o2], correct_id: o1.id };
    }
    if (subtype === 'ordering') {
        return { task_type: 'ordering', words: [
            { id: newId(), text: '' },
            { id: newId(), text: '' },
            { id: newId(), text: '' }
        ]};
    }
    return {};
}

function getTaskSubtype(slide) {
    return (slide && slide.meta && slide.meta.task_type) || null;
}

// Состояние редактора
const editorState = {
    lessonId: null,
    lesson: null,   // { id, title, unit:{ id, title, unit_number, course:{id, title} } }
    slides: [],

    saveTimer: null,
    pickerOpen: false
};

// Кэш библиотеки колод из тренажёра (word_decks + deck_folders, без study_ префикса)
let deckLibraryCache = null;

async function loadDeckLibrary() {
    if (deckLibraryCache) return deckLibraryCache;
    const [foldersRes, decksRes] = await Promise.all([
        sb.from('deck_folders')
            .select('id, title, parent_folder_id, cover_emoji, "order"')
            .is('deleted_at', null)
            .eq('is_school_library', true)
            .order('"order"', { ascending: true }),
        sb.from('word_decks')
            .select('id, title, level, cover_emoji, folder_id, word_count')
            .is('deleted_at', null)
            .eq('is_school_library', true)
            .order('title', { ascending: true })
    ]);
    if (foldersRes.error || decksRes.error) {
        console.error('Deck library load error', foldersRes.error || decksRes.error);
        deckLibraryCache = { folders: [], decks: [], folderPaths: {} };
        return deckLibraryCache;
    }
    const folders = foldersRes.data || [];
    const decks   = decksRes.data || [];
    // Строим путь от корня для каждой папки: "Super Minds / SM1"
    const byId = {};
    folders.forEach(f => byId[f.id] = f);
    const folderPaths = {};
    function pathFor(id) {
        if (!id) return '';
        if (folderPaths[id]) return folderPaths[id];
        const f = byId[id];
        if (!f) return '';
        const parent = f.parent_folder_id ? pathFor(f.parent_folder_id) : '';
        folderPaths[id] = parent ? `${parent} / ${f.title}` : f.title;
        return folderPaths[id];
    }
    folders.forEach(f => pathFor(f.id));
    deckLibraryCache = { folders, decks, folderPaths };
    return deckLibraryCache;
}

// Парсер URL для video-слайдов
function parseVideoUrl(url) {
    if (!url) return null;
    let m;
    m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (m) return { provider: 'youtube', id: m[1] };
    m = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
    if (m) return { provider: 'gdrive', id: m[1] };
    m = url.match(/rutube\.ru\/video\/([a-zA-Z0-9]+)/);
    if (m) return { provider: 'rutube', id: m[1] };
    return null;
}

function $(id) { return document.getElementById(id); }
function esc(s) {
    if (s === null || s === undefined) return '';
    return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
// Убираем ведущие эмоджи из заголовка (cover_emoji уже показывается отдельно как иконка слайда)
function stripLeadingEmoji(s) {
    if (!s) return s;
    try {
        const stripped = String(s).replace(/^[\p{Extended_Pictographic}\u{FE0F}\u{200D}\u{2640}-\u{2642}]+\s*/gu, '').trim();
        return stripped || s;
    } catch (_) {
        return s;

}
function toast(msg, type) {
    const c = $('toastContainer');

function hasEditAccess(u) {
    if (!u) return false;
    const roles = Array.isArray(u.roles) ? u.roles : (u.roles ? [u.roles] : []);
    return roles.includes('super_admin') || roles.includes('methodist');
}
function pluralize(n, one, few, many) {
    n = Math.abs(n) % 100;
    const n1 = n % 10;
    if (n > 10 && n < 20) return many;
    if (n1 > 1 && n1 < 5) return few;
    if (n1 === 1) return one;
    return many;
}
function fmtLessons(n)  { return n + ' ' + pluralize(n, 'урок',   'урока',  'уроков');  }

function fmtMin(n)      { return n + ' мин'; }

/* ================================================================

document.addEventListener('DOMContentLoaded', init);

async function init() {
    // 1) сессия
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
        showLogin();
        return;
    }
    // 2) пользователь
    const ok = await loadCurrentUser(session.user.id);

}

async function loadCurrentUser(authUid) {
    const { data, error } = await sb.from('users')
        .select('id, name, email, roles, is_active')
        .eq('auth_id', authUid)
        .maybeSingle();

        return false;

    if (data.is_active === false) {
        alert('Учётная запись отключена. Обратитесь к супер-админу.');
        await sb.auth.signOut();
        return false;
    }
    currentUser = data;
    return true;
}

function showLogin() {

}

function showApp() {

/* ================================================================
   AUTH
   ================================================================ */

async function doLogin() {
    const email = $('email').value.trim();
    const password = $('password').value;
    if (!email || !password) { alert('Заполните email и пароль'); return; }

    const btn = $('loginBtn');
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Вхожу…';

    try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const { data: { session } } = await sb.auth.getSession();
        const ok = await loadCurrentUser(session.user.id);
        if (ok) showApp();
    } catch (e) {
        let msg = e.message || String(e);
        if (/invalid.+(login|credentials)/i.test(msg)) msg = 'Неверный email или пароль';
        alert(msg);
    } finally {
        btn.disabled = false;
        btn.textContent = orig;
    }
}

async function doLogout() {
    await sb.auth.signOut();
    currentUser = null;
    location.hash = '';
    location.reload();

/* ================================================================
   ROUTER
   ================================================================ */

window.addEventListener('hashchange', handleRoute);

function navigateTo(hash) {
    if (window.location.hash === hash) {
        handleRoute(); // forced re-render
    } else {
        window.location.hash = hash;
    }
}

function handleRoute() {
    if (!currentUser) return;
    let hash = (window.location.hash || '#/').slice(1) || '/';
    // Отделяем query-string внутри хеша (#/lesson/4/run?student=UUID — параметры после ?)
    const qIdx = hash.indexOf('?');
    if (qIdx >= 0) hash = hash.substring(0, qIdx);

    // Если уходим из run mode — гасим таймер и слушатель клавиш + закрываем модалки
    const inRun = hash.includes('/run');
    if (!inRun) {
        if (runState.timer && runState.timer.intervalId) {
            clearInterval(runState.timer.intervalId);
            runState.timer.intervalId = null;
            runState.timer.running = false;
        }
        detachRunKeyboard();
        document.querySelectorAll('.run-iframe-modal').forEach(m => m.remove());
    }

    const parts = hash.split('/').filter(Boolean);

    if (parts.length === 0) {
        return showLibrary();
    }
    if (parts[0] === 'course' && parts[1]) {
        return showCourse(parseInt(parts[1]));
    }
    if (parts[0] === 'lesson' && parts[1]) {
        const lessonId = parseInt(parts[1]);
        const mode = parts[2] || 'edit';
        if (mode === 'run')  return showRunMode(lessonId);
        if (mode === 'edit') return showEditor(lessonId);
    }
    // fallback
    showLibrary();
}

function renderAddPicker() {
    let rows = '';
    for (const t of SLIDE_TYPES_ORDERED) {
        const m = SLIDE_TYPE_META[t];
        rows += `
            <button class="add-pick-row" onclick="onPickAddSlideType('${t}')">

    }

        <div class="add-picker" id="addPicker">
            <div class="add-pick-title">Выбери тип</div>
            ${rows}
        </div>
    `;

function toggleAddPicker(e) {
    if (e) e.stopPropagation();
    // Если уже открыт — закрыть
    const existing = document.getElementById('addPicker');
    if (existing) {
        existing.remove();
        editorState.pickerOpen = false;
        return;
    }
    const btn = (e && e.currentTarget) || document.querySelector('.ribbon-add');
    if (!btn) return;

    editorState.pickerOpen = true;

    // Создаём popover отдельно и крепим к body
    const wrap = document.createElement('div');
    wrap.innerHTML = renderAddPicker();
    const picker = wrap.firstElementChild;

    const rect = btn.getBoundingClientRect();
    picker.style.position = 'fixed';
    picker.style.left = (rect.right + 8) + 'px';
    // Picker «растёт» вверх от кнопки: нижний край совпадает с нижним краем кнопки
    picker.style.bottom = (window.innerHeight - rect.bottom) + 'px';
    picker.style.top = 'auto';
    picker.style.right = 'auto';

    document.body.appendChild(picker);

    // Защита от выхода за правый край экрана
    const pickerRect = picker.getBoundingClientRect();
    if (pickerRect.right > window.innerWidth - 12) {
        // если не вмещается справа — рендерим слева от кнопки
        picker.style.left = Math.max(12, rect.left - pickerRect.width - 8) + 'px';
    }
    // и за верхний край
    if (pickerRect.top < 12) {
        picker.style.bottom = 'auto';
        picker.style.top = '12px';
    }

    setTimeout(() => {
        document.addEventListener('click', closeAddPickerOnOutsideClick, { once: true });
    }, 50);
}

function closeAddPickerOnOutsideClick(e) {
    if (e.target.closest && e.target.closest('#addPicker')) {
        // клик внутри popover — оставляем открытым, ждём следующего клика
        document.addEventListener('click', closeAddPickerOnOutsideClick, { once: true });
        return;
    }
    const existing = document.getElementById('addPicker');
    if (existing) existing.remove();
    editorState.pickerOpen = false;
}

/* ============ DRAG-TO-REORDER ленты ============ */

let _dragSlideId = null;

function attachRibbonDragHandlers() {
    const ribbon = $('editorRibbon');
    if (!ribbon) return;
    ribbon.querySelectorAll('.ribbon-slide').forEach(el => {
        el.addEventListener('dragstart', (e) => {
            _dragSlideId = parseInt(el.getAttribute('data-id'));
            el.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            try { e.dataTransfer.setData('text/plain', String(_dragSlideId)); } catch(_) {}
        });
        el.addEventListener('dragend', () => {
            el.classList.remove('dragging');
            ribbon.querySelectorAll('.ribbon-slide').forEach(s => s.classList.remove('drag-over'));
            _dragSlideId = null;
        });
        el.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            el.classList.add('drag-over');
        });
        el.addEventListener('dragleave', () => {
            el.classList.remove('drag-over');
        });
        el.addEventListener('drop', (e) => {
            e.preventDefault();
            el.classList.remove('drag-over');
            const dropId = parseInt(el.getAttribute('data-id'));
            if (_dragSlideId && dropId && _dragSlideId !== dropId) {
                reorderSlides(_dragSlideId, dropId);
            }
        });
    });
}

async function reorderSlides(dragId, dropId) {
    await flushSave();
    const slides = editorState.slides;
    const fromIdx = slides.findIndex(s => s.id === dragId);
    const toIdx   = slides.findIndex(s => s.id === dropId);
    if (fromIdx < 0 || toIdx < 0) return;

    const [moved] = slides.splice(fromIdx, 1);
    slides.splice(toIdx, 0, moved);
    // Пересчитываем order
    slides.forEach((s, i) => s.order = i + 1);

    renderEditor();
    editorState.saveStatus = 'saving';
    updateSaveIndicator();

    // Сохраняем все order в БД
    let anyError = null;
    for (const s of slides) {
        const { error } = await sb.from('study_slides').update({ order: s.order }).eq('id', s.id);
        if (error) { anyError = error; break; }
    }
    if (anyError) {
        editorState.saveStatus = 'error';
        toast('Не сохранилось: ' + anyError.message, 'error');
    } else {
        editorState.saveStatus = 'saved';
        toast('Порядок сохранён', 'success');
    }
    updateSaveIndicator();
    setTimeout(() => {
        if (editorState.saveStatus === 'saved') {
            editorState.saveStatus = 'idle';
            updateSaveIndicator();
        }
    }, 1500);
}

async function selectSlide(id) {
    await flushSave();
    editorState.selectedId = id;
    renderEditor();
}

async function onPickAddSlideType(type) {
    await flushSave();
    const m = SLIDE_TYPE_META[type];
    const maxOrder = editorState.slides.reduce((mx, s) => Math.max(mx, s.order || 0), 0);
    let initialMeta = {};
    if (type === 'task') initialMeta = initTaskMeta('open');
    else if (type === 'poll') initialMeta = { items: [
        { id: newId(), text: '' },
        { id: newId(), text: '' },
        { id: newId(), text: '' }
    ] };
    else if (type === 'rate') initialMeta = { ask_lesson: true, ask_teacher: true, ask_mood: true };
    else if (type === 'outro') initialMeta = { finish_lesson: false };
    const { data, error } = await sb.from('study_slides').insert({
        lesson_id: editorState.lessonId,
        slide_type: type,
        order: maxOrder + 1,
        cover_emoji: m.defaultEmoji,
        title: '',
        body: '',
        meta: initialMeta
    }).select().single();
    if (error) { toast('Ошибка: ' + error.message, 'error'); return; }
    editorState.slides.push(data);
    editorState.selectedId = data.id;
    editorState.pickerOpen = false;
    const picker = document.getElementById('addPicker');
    if (picker) picker.remove();
    renderEditor();
}

/* ============ PREVIEW ============ */

function renderSlidePreview(slide) {
    if (!slide) {
        return `<div class="muted" style="text-align:center;">
            <div style="font-size:48px; margin-bottom:8px;">📭</div>
            <div>В уроке пока нет слайдов.<br>Нажми <strong>+</strong> в ленте слева.</div>
        </div>`;
    }
    const t = slide.slide_type;
    const m = SLIDE_TYPE_META[t] || SLIDE_TYPE_META.text;
    const chip = `<span class="slide-type-chip" style="background:${m.bg}; color:${m.fg};">${m.icon} ${esc(m.label)}</span>`;

    if (t === 'intro' || t === 'outro') {
        return `
            <div class="slide-card">
                ${chip}
                <div class="slide-emoji-block">${esc(slide.cover_emoji || m.defaultEmoji)}</div>
                <h2>${esc(stripLeadingEmoji(slide.title) || (t === 'intro' ? 'Без названия' : 'Great job!'))}</h2>
                ${slide.body ? `<p class="subtitle">${esc(slide.body)}</p>` : ''}
            </div>
        `;
    }
    if (t === 'vocab') {
        return `
            <div class="slide-card">
                ${chip}
                <h2>${esc(stripLeadingEmoji(slide.title) || '—')}</h2>
                <div class="slide-emoji-block">${esc(slide.cover_emoji || m.defaultEmoji)}</div>
                ${slide.body ? `<p class="subtitle">${esc(slide.body)}</p>` : ''}
            </div>
        `;
    }
    if (t === 'text') {
        return `
            <div class="slide-card">
                ${chip}
                ${slide.title ? `<h2 style="font-size:22px; text-align:left;">${esc(stripLeadingEmoji(slide.title))}</h2>` : ''}
                <div class="markdown">${md(slide.body || '_(пусто)_')}</div>
            </div>
        `;
    }
    if (t === 'explanation') {
        return `
            <div class="slide-card">
                ${chip}
                <h2 style="font-size:22px; text-align:left;">${esc(slide.title || '—')}</h2>
                <div class="markdown">${md(slide.body || '_(пусто)_')}</div>
            </div>
        `;
    }
    if (t === 'task') {
        return renderTaskPreview(slide, chip);
    }
    if (t === 'poll') {
        return renderPollPreview(slide, chip);
    }
    if (t === 'deck') {
        return renderDeckPreview(slide, chip);
    }
    if (t === 'video') {
        return renderVideoPreview(slide, chip);
    }
    if (t === 'rate') {
        return renderRatePreview(slide, chip);
    }
    // прочие типы (пока сюда нечего попасть)
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || m.label)}</h2>
            <p class="muted" style="text-align:center; font-size:13px;">Превью для типа <code>${esc(t)}</code> — в следующих шагах.</p>
        </div>
    `;
}

/* ============ DECK ============ */

function renderDeckForm(slide) {
    const m = slide.meta || {};
    const selectedId = m.deck_id;
    const lib = deckLibraryCache || { folders: [], decks: [], folderPaths: {} };

    // Группируем колоды по пути папки
    const groups = {};
    for (const d of lib.decks) {
        const path = lib.folderPaths[d.folder_id] || 'Без папки';
        (groups[path] ||= []).push(d);
    }
    const sortedPaths = Object.keys(groups).sort();

    let optgroups = '';
    for (const path of sortedPaths) {
        optgroups += `<optgroup label="${esc(path)}">`;
        for (const d of groups[path]) {
            const extras = [d.level, d.word_count ? d.word_count + ' слов' : ''].filter(Boolean).join(' · ');
            const label = `${d.cover_emoji || '📚'} ${d.title}${extras ? ' · ' + extras : ''}`;
            optgroups += `<option value="${d.id}" ${d.id === selectedId ? 'selected' : ''}>${esc(label)}</option>`;
        }
        optgroups += `</optgroup>`;
    }

    let html = '';
    html += renderFormField('Заголовок (опц.)',
        `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Тренировка слов">`);
    html += renderFormField('Описание (опц.)',
        `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Закрепляем новые слова">`);

    if (!lib.decks.length) {
        html += `<div class="editor-warning">⚠️ Колоды не загружены или их нет в библиотеке школы.</div>`;
    } else {
        html += `
            <div class="form-field">
                <label>Колода <span class="hint">· из библиотеки тренажёра</span></label>
                <select class="form-input select" data-meta-field="deck_id" data-meta-int="1">
                    <option value="">— Выбери колоду —</option>
                    ${optgroups}
                </select>
            </div>
        `;
    }

    if (selectedId) {
        const selected = lib.decks.find(d => d.id === selectedId);
        if (selected) {
            const path = lib.folderPaths[selected.folder_id] || 'Без папки';
            html += `
                <div style="background:var(--cream-deep); padding:10px 12px; border-radius:8px; font-size:12px; margin-bottom:10px;">
                    <div style="font-size:14px;">${esc(selected.cover_emoji || '📚')} <strong>${esc(selected.title)}</strong></div>
                    <div style="color:var(--text-mute); margin-top:3px;">
                        ${esc(path)}${selected.level ? ' · ' + esc(selected.level) : ''}${selected.word_count ? ' · ' + selected.word_count + ' слов' : ''}
                    </div>
                </div>
            `;
        }
    }
    return html;
}

function renderDeckPreview(slide, chip) {
    const m = slide.meta || {};
    const deckId = m.deck_id;
    const lib = deckLibraryCache || { folders: [], decks: [], folderPaths: {} };
    const deck = deckId ? lib.decks.find(d => d.id === deckId) : null;

    return `
        <div class="slide-card">
            ${chip}
            ${slide.title ? `<h2 style="font-size:22px; text-align:left;">${esc(stripLeadingEmoji(slide.title))}</h2>` : ''}
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div style="background:var(--cream-deep); border-radius:14px; padding:20px; display:flex; flex-direction:column; gap:6px; align-items:center; justify-content:center; min-height:160px;">
                ${deck ? `
                    <span style="font-size:42px;">${esc(deck.cover_emoji || '📚')}</span>
                    <p style="font-size:16px; margin:0; font-weight:600;">${esc(deck.title)}</p>
                    <p style="font-size:12px; margin:0; color:var(--text-mute);">${deck.level ? esc(deck.level) + ' · ' : ''}${deck.word_count || 0} слов</p>
                    <button class="btn btn-primary btn-sm" style="margin-top:6px;">▶ Запустить тренажёр</button>
                ` : `
                    <span style="font-size:48px; opacity:0.4;">📚</span>
                    <p class="muted" style="margin:0; font-size:13px;">Колода не выбрана</p>
                `}
            </div>
        </div>
    `;
}

/* ============ VIDEO ============ */

function renderVideoForm(slide) {
    const m = slide.meta || {};
    const url = m.video_url || '';
    const parsed = parseVideoUrl(url);

    let html = '';
    html += renderFormField('Заголовок',
        `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Daily routine song">`);
    html += renderFormField('Описание (опц.)',
        `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Послушай и подпевай">`);
    html += renderFormField('Ссылка на видео',
        `<input class="form-input" data-meta-field="video_url" value="${esc(url)}"
            placeholder="https://youtube.com/... · drive.google.com/... · rutube.ru/...">`,
        'YouTube, Google Drive или Rutube');

    if (url) {
        if (parsed) {
            const providerName = { youtube: 'YouTube', gdrive: 'Google Drive', rutube: 'Rutube' }[parsed.provider];
            html += `<div style="background:var(--green-light); color:var(--green-dark); padding:8px 12px; border-radius:8px; font-size:12px; margin-bottom:10px;">
                ✓ Распознано: <strong>${providerName}</strong> · ID <code style="font-size:11px;">${esc(parsed.id)}</code>
            </div>`;
        } else {
            html += `<div class="editor-warning">⚠️ Не распознан провайдер. Поддерживаются: YouTube, Google Drive, Rutube.</div>`;
        }
    }
    return html;
}

function renderVideoPreview(slide, chip) {
    const m = slide.meta || {};
    const url = m.video_url || '';
    const parsed = parseVideoUrl(url);

    let videoBlock;
    if (parsed && parsed.provider === 'youtube') {
        const thumb = `https://i.ytimg.com/vi/${parsed.id}/hqdefault.jpg`;
        videoBlock = `
            <div style="background:#2C2C2A; border-radius:14px; position:relative; aspect-ratio:16/9; overflow:hidden;">
                <img src="${esc(thumb)}" style="width:100%; height:100%; object-fit:cover;" alt="YouTube preview">
                <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
                    <span style="width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.95); display:inline-flex; align-items:center; justify-content:center; color:#2C2C2A; font-size:26px;">▶</span>
                </div>
            </div>
        `;
    } else if (parsed) {
        videoBlock = `
            <div style="background:#2C2C2A; border-radius:14px; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; color:white;">
                <span style="width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.95); display:inline-flex; align-items:center; justify-content:center; color:#2C2C2A; font-size:26px;">▶</span>
                <span style="font-size:12px; opacity:0.8;">${esc(parsed.provider)}</span>
            </div>

            <div style="background:var(--cream-deep); border-radius:14px; aspect-ratio:16/9; display:flex; align-items:center; justify-content:center; color:var(--text-mute); flex-direction:column; gap:6px;">

/* ============ TASK PREVIEW ============ */

function renderTaskPreview(slide, chip) {
    const subtype = getTaskSubtype(slide) || 'choice';
    const subMeta = TASK_SUBTYPE_META[subtype] || TASK_SUBTYPE_META.choice;
    const subChip = `<span class="slide-type-chip" style="background:var(--green-light); color:var(--green-dark);">✓ ${esc(subMeta.label)}</span>`;

    if (subtype === 'open')       return renderOpenPreview(slide, subChip);
    if (subtype === 'choice')     return renderChoicePreview(slide, subChip);
    if (subtype === 'matching')   return renderMatchingPreview(slide, subChip);
    if (subtype === 'fill_blank') return renderFillBlankPreview(slide, subChip);
    if (subtype === 'ordering')   return renderOrderingPreview(slide, subChip);
    return `<div class="slide-card">${chip}<p class="muted">Неизвестный подтип</p></div>`;
}

function renderOpenPreview(slide, chip) {
    const m = slide.meta || {};
    const helpers = m.helper_words || [];
    const layout = m.layout || 'bottom';
    let helperChips = '';
    helpers.forEach(w => {
        if (w.text) helperChips += `<span class="task-word-chip">${esc(w.text)}</span>`;
    });
    const titleHtml       = `<h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Вопрос')}</h2>`;
    const instructionHtml = slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : '';
    const chipsHtml       = (helpers.length && helperChips) ? `<div class="task-word-chips" style="margin-top:4px;">${helperChips}</div>` : '';
    const textareaHtml    = `<textarea class="form-input open-answer" placeholder="Ответ ученика..." rows="3" disabled style="background:var(--cream); resize:none; border-style:dashed; cursor:default;"></textarea>`;

    if (layout === 'side') {
        return `
            <div class="slide-card">
                ${chip}
                <div class="task-open-side">
                    <div class="left">
                        ${titleHtml}
                        ${instructionHtml}
                        ${chipsHtml}
                    </div>
                    <div class="right">
                        ${textareaHtml}
                    </div>
                </div>
            </div>
        `;
    }
    if (layout === 'full') {
        return `
            <div class="slide-card task-open-full">
                ${chip}
                <div class="top-line">
                    ${titleHtml}
                    ${chipsHtml}
                </div>
                ${textareaHtml}
            </div>
        `;
    }
    // bottom (default)
    return `
        <div class="slide-card">
            ${chip}
            ${titleHtml}
            ${instructionHtml}
            ${chipsHtml}
            ${textareaHtml}
        </div>
    `;
}

function renderChoicePreview(slide, chip) {
    const m = slide.meta || {};
    const options = m.options || [];
    const correctId = m.correct_id;
    let optsHtml = '';
    options.forEach((o, i) => {
        const letter = String.fromCharCode(65 + i); // A,B,C...
        const correct = o.id === correctId;
        optsHtml += `
            <div class="task-option-box ${correct?'correct':''}">
                <span class="task-option-letter">${letter}.</span>
                <span>${esc(o.text || '(пусто)')}</span>
                ${correct ? '<span style="margin-left:auto; color:var(--green-dark);">✓</span>' : ''}
            </div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Вопрос')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-options">${optsHtml || '<div class="muted" style="text-align:center;">Нет вариантов</div>'}</div>
            <button class="task-check-btn">Проверить</button>
        </div>
    `;
}

function renderMatchingPreview(slide, chip) {
    const pairs = (slide.meta || {}).pairs || [];
    let html = '';
    pairs.forEach(p => {
        html += `
            <div class="task-pair-side">${esc(p.left || '—')}</div>
            <div class="arrow">⟷</div>
            <div class="task-pair-side">${esc(p.right || '—')}</div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Соедини пары')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-pairs">${html || '<div class="muted">Нет пар</div>'}</div>
        </div>
    `;
}

function renderFillBlankPreview(slide, chip) {
    const m = slide.meta || {};
    const options = m.options || [];
    const correctId = m.correct_id;
    // В title — предложение с маркером ___ (тройное подчёркивание)
    const sentence = slide.title || 'Sentence with ___ blank.';
    const sentenceHtml = esc(sentence).replace(/___/g, '<span class="task-blank">_____</span>');
    let optsHtml = '';
    options.forEach(o => {
        const correct = o.id === correctId;
        optsHtml += `
            <div class="task-option-box ${correct?'correct':''}" style="display:inline-flex;">
                <span>${esc(o.text || '(пусто)')}</span>
                ${correct ? '<span style="margin-left:6px; color:var(--green-dark);">✓</span>' : ''}
            </div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <p class="task-sentence">${sentenceHtml}</p>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">${optsHtml || '<div class="muted">Нет вариантов</div>'}</div>
        </div>
    `;
}

function renderOrderingPreview(slide, chip) {
    const words = (slide.meta || {}).words || [];
    // В превью покажем слова в обратном порядке как "перемешанные" — детерминированно
    const shuffled = [...words].reverse();
    let chipsHtml = '';
    shuffled.forEach(w => {
        chipsHtml += `<span class="task-word-chip">${esc(w.text || '—')}</span>`;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Составь предложение')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="task-target-line">сюда перетащи слова</div>
            <div class="task-word-chips">${chipsHtml || '<div class="muted">Нет слов</div>'}</div>
            <div class="muted" style="font-size:11px;">Правильный порядок: ${words.map(w => esc(w.text || '—')).join(' ')}</div>
        </div>
    `;
}

function rerenderPreview() {
    const stage = $('editorPreview');
    if (!stage) return;
    stage.innerHTML = renderSlidePreview(currentSlide());
}

function onPreviewClick() {
    // открывает run mode (когда будет готов)
    if (editorState.lessonId) {
        flushAndNavigate('#/lesson/' + editorState.lessonId + '/run');
    }
}

/* ============================================================
   POLL · форма редактирования, превью
   ============================================================ */

function renderPollForm(slide) {
    const m = slide.meta || {};
    const items = m.items || [];
    let html = '';
    html += renderFormField('Заголовок опроса',
        `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="What I can do today">`);
    html += renderFormField('Описание (опц.)',
        `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Отметь чему ты научился">`);

    let rows = '';
    items.forEach((it, i) => {
        rows += `
            <div class="word-edit-row" data-row-id="${it.id}">
                <span class="word-order-num">${i + 1}.</span>
                <input class="form-input" type="text" value="${esc(it.text || '')}"
                       placeholder="I can name 4 types of homes"
                       data-poll-item-id="${it.id}">
                <button class="x-btn" onclick="onPollItemDelete('${it.id}')" title="Удалить" ${items.length <= 1 ? 'disabled' : ''}>×</button>
            </div>
        `;
    });
    const canAdd = items.length < 8;
    html += `
        <div class="form-field">
            <label>Пункты опроса <span class="hint">· ученик отметит галочкой что освоил</span></label>
            <div>${rows}</div>
            <button class="list-add-btn" onclick="onPollItemAdd()" ${canAdd?'':'disabled'}>+ Добавить пункт</button>
        </div>
        <div style="background:var(--cream-deep); padding:10px 12px; border-radius:8px; font-size:12px; color:var(--text-soft); margin-bottom:10px;">
            💡 Ответы ученика сохраняются в БД — можно будет посмотреть в аналитике что он не освоил.
        </div>
    `;
    return html;
}

function renderPollPreview(slide, chip) {
    const items = (slide.meta || {}).items || [];
    let rows = '';
    items.forEach(it => {
        if (!it.text) return;
        rows += `
            <div class="poll-row">
                <span class="poll-check"></span>
                <span class="poll-text">${esc(it.text)}</span>
            </div>
        `;
    });
    return `
        <div class="slide-card">
            ${chip}
            <h2 style="font-size:20px; text-align:left;">${esc(stripLeadingEmoji(slide.title) || 'Опрос')}</h2>
            ${slide.body ? `<p class="task-instruction">${esc(slide.body)}</p>` : ''}
            <div class="poll-list">${rows || '<p class="muted" style="font-size:13px;">Добавь пункты ниже →</p>'}</div>
        </div>
    `;
}

function onPollItemAdd() {
    const slide = currentSlide();
    if (!slide || !slide.meta) return;
    if (!slide.meta.items) slide.meta.items = [];
    if (slide.meta.items.length >= 8) return;
    slide.meta.items.push({ id: newId(), text: '' });
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onPollItemDelete(itemId) {
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.items) return;
    if (slide.meta.items.length <= 1) return;
    slide.meta.items = slide.meta.items.filter(x => x.id !== itemId);
    markDirty();
    $('editorForm').innerHTML = renderEditorForm(slide);
    attachFormHandlers();
    rerenderPreview();
}
function onPollItemInput(e) {
    const el = e.currentTarget;
    const id = el.getAttribute('data-poll-item-id');
    const slide = currentSlide();
    if (!slide || !slide.meta || !slide.meta.items) return;
    const it = slide.meta.items.find(x => x.id === id);
    if (it) {
        it.text = el.value;
        markDirty();
        rerenderPreview();
    }
}

/* ============================================================
   RATE · форма, превью
   ============================================================ */

function renderRateForm(slide) {
    const m = slide.meta || {};
    let html = '';
    html += renderFormField('Заголовок',
        `<input class="form-input" data-field="title" value="${esc(slide.title || '')}" placeholder="Оцени урок">`);
    html += renderFormField('Описание (опц.)',
        `<input class="form-input" data-field="body" value="${esc(slide.body || '')}" placeholder="Как тебе сегодня было?">`);
    const rows = [
        { key: 'ask_lesson',  label: 'Спросить про урок' },
        { key: 'ask_teacher', label: 'Спросить про учителя' },
        { key: 'ask_mood',    label: 'Спросить про настроение' },
    ];
    let toggles = '';
    rows.forEach(r => {
        const checked = m[r.key] !== false;  // default true
        toggles += `
            <label class="rate-toggle">
                <input type="checkbox" data-meta-bool="${r.key}" ${checked ? 'checked' : ''}>
                <span>${esc(r.label)}</span>
            </label>
        `;
    });
    html += `
        <div class="form-field">
            <label>Что спрашиваем</label>
            ${toggles}
        </div>

function renderRatePreview(slide, chip) {
